meta:
  generated: '2026-05-01'
  source_yaml: rebuild/content.yaml
  method: 'Per-spot wild-camping verdict built from: (1) Nominatim reverse geocode for canton/country; (2) Swisstopo (api3.geo.admin.ch)
    identify against federal protection layers (jagdbanngebiete, auen, hochmoore, flachmoore, amphibien, vogelreservate, BLN,
    UNESCO-Weltnaturerbe, paerke, biosphaerenreservate, moorlandschaften, trockenwiesen, wildruhezonen_portal); (3) Swisstopo
    height service via WGS84->LV95 conversion; (4) Per-canton and named-area research (SAC, Pro Natura, cantonal authorities,
    press 2024-2025) for known overrides.'
  verdict_legend:
    tolerated: Above tree line, outside protected areas. SAC single-night bivouac OK (dusk-dawn, no fire, no trace, small
      group).
    restricted: Above tree line BUT inside a sensitive zone (BLN, park, UNESCO, biosphere). Tolerated with extra rules.
    discouraged: Below tree line or near settlements/private land. Not a SAC bivouac site; risk of fines, often technically
      forbidden.
    forbidden: 'Hard ban: federal hunting reserve, fen/bog/floodplain, amphibian site, named cantonal ban, paid commercial
      site, or named nature reserve.'
    unknown: Outside Switzerland or data lookup failed — manual check required.
  sources:
  - SAC – "Camping and bivouacking in the Swiss mountains" leaflet (Swiss Alpine Club, 2014, still current)
  - Swisstopo geo.admin.ch identify API (federal protection inventories)
  - 'Pro Natura: Aletschwald, Etang de la Gruère, Creux du Van reserves'
  - 'Appenzell Innerrhoden Standeskommission (Alpstein wild-camping ban, 2024-2025 press: appenzellerzeitung.ch, fm1today.ch,
    appenzell.ch)'
  - 'Glarus Süd municipality (Muttsee/Limmernsee/Klöntal ban, 2024: 20min.ch, srf.ch, glarnerland.ch)'
  - Préfecture Haute-Savoie / La Chamoniarde (Aiguilles Rouges + Mont-Blanc bivouac rules)
  - Cantonal hiking/tourism portals
  rule_of_thumb: 'Switzerland: tolerated above the tree line outside protected areas, single night, dusk-dawn, no fire, no
    trace, small group (SAC). Below tree line or in any federal hunting reserve / fen / bog / floodplain / amphibian site
    / named cantonal nature reserve = forbidden. Always check the local situation: the cantonal geoportals on kkgeo.ch list
    the cantonal nature reserves that this dataset does NOT cover (only federal layers).'
  verdict_counts:
    discouraged: 25
    forbidden: 29
    restricted: 58
