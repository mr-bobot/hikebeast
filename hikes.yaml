- id: engstlensee-route-lakeshore-loop
  sac_grade: T1
  effort_label: Easy
  duration_min: 60
  gain_m: 50
  start: Hotel Engstlenalp, end of the toll road
  transit:
    bus: Engstlenalp (PostAuto 161 terminus, summer only)
    train: Innertkirchen (then PostAuto 161)
  visits:
  - engstlensee
  description_extra: The lake sits at about 1,850 m near Joch Pass, reached on the road or PostAuto 161 from Innertkirchen up to the Hotel Engstlenalp. From the hotel parking, a gravel
    path drops down to the shore in roughly five minutes. The shore loop is around 1.3 km on the western side, with the eastern shore narrower and rockier. Total walking is about an
    hour with maybe 50 m of cumulative up-and-down, basically flat. The lake doubles as a hydropower reservoir feeding the Innertkirchen power stations, so water level can shift through
    the season. Boats can be hired at the hotel reception. Pair with a climb up to Joch Pass for a bigger day.
  sources:
  - https://en.wikipedia.org/wiki/Engstlensee
  - https://jungfrauregion.swiss/en/map/detail/engstlensee-493643c7-eba3-42dd-bf3c-652909b97fe9.html
