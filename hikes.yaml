- id: the_ice_cave-winter-approach
  visits:
  - the_ice_cave
  name: Winter approach from Zinal village
  start: Plats de la Lée parking (end of the road in Zinal village)
  start_maps_url: https://www.google.com/maps/place/?q=46.12784,7.629728&z=16
  sac_grade: T4
  effort_label: Expert (deep winter only)
  duration_min: 270
  gain_m: 500
  distance_km: 11
  equipment_list:
  - Snowshoes (or ski-touring setup with skins)
  - Crampons or microspikes for icy sections
  - Avalanche transceiver, probe, shovel
  - Headlamp (mandatory inside the cave)
  - Tripod (it is darker than it looks)
  - Warm layers, waterproof shell, gloves, hat
  - 1.5-2 L water, food
  - Sturdy mountaineering / alpine boots
  - Trekking poles
  transit:
    bus: Sierre (SBB) + PostBus 452 up Val d'Anniviers to Zinal, end of line
  description_extra: 'Winter-only approach up the Glacier de Zinal from the Plats de la Lée parking at the end of the road (about 1,675 m) to the seasonal ice caves that form in the
    glacier tongue around 2,150 m. Around 11 km return on foot with roughly 500 m of cumulative gain, 4-5 hours total in snowshoes (about 4h 30 with stops). Caves are ephemeral and only
    exist from about December through March, and only after a sustained cold period — they collapse the moment temperatures rise. The Val d''Anniviers tourist office is explicit: do
    not go alone, never after warm days or fresh snow, and access without a guide is officially discouraged because of crevasse, avalanche, and collapse hazard. People die in alpine
    ice caves every year. Check the avalanche bulletin (slf.ch), tell someone your plan, turn back if anything feels off. Hire a local mountain guide for the actual cave entry — independent
    visits are at your own risk. Graded T4 / ski-tour-equivalent: no technical climbing, but the consequences of getting it wrong are fatal.'
  sources:
  - https://www.valdanniviers.ch/en/Z32755/caves-of-the-zinal-glacier
  - https://www.valdanniviers.ch/en/P123878/guided-hike-to-the-zinal-glacier-caves
  - https://www.martainthemountains.com/zinal-glacier-ice-cave/
  cable_car_ids:
  - zinal-sorebois-cable-car
  quickest_for:
  - the_ice_cave
