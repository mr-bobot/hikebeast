  quickest_for:
  - tannhorn
  equipment_list:
  - Sturdy hiking boots
  - Poles
  cable_car_ids:
  - brienz-rothorn-bahn
- id: augstmatthorn-route-85
  sac_grade: T3
  effort_label: Mid
  duration_min: 100
  gain_m: 580
  start: Lombachalp
  description_extra: Augstmatthorn at 2,137 m is a Brienzergrat summit on the Habkern side of Lake Brienz. Approach from Lombachalp (drive or postbus from Habkern). About one hour 40
    minutes up, 580 m of gain, T3 mountain trail. The Augstmatthorn was the site of the first alpine ibex reintroduction in canton Bern, and the colony is usually visible on or above
    the trail.
