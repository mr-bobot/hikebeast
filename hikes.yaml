  visits:
  - grappelensee
  description_extra: 'Drive or taxi up from Unterwasser to the Laui parking, the closest you can get to the lake by car. From there it is roughly 3.25 km and 250 m of climbing on a clear
    path through pasture and patches of woodland, about 50 minutes one way. The lake sits at 1,307 m in a protected moorland basin, around 140 m long, with two grilling spots and a small
    wooden jetty on the eastern shore. Swimming is allowed: the water is cold but clean. For the long version, start at the Iltios cable car parking in Unterwasser and do the full loop
    via the Thur waterfalls and Chüeboden, around 12 km and 525 m of climbing.'
