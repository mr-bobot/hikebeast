- id: ponte_tibetano-route-from-mornera
  sac_grade: T2
  effort_label: Moderate
  duration_min: 60
  gain_m: 100
  start: Mornera upper cable car station
  transit:
    bus: Bellinzona, line 2 to Monte Carasso, Funivia stop
    train: Bellinzona (then bus 2)
    cable_car: Monte Carasso to Curzútt to Mornera cable car, 8-person cabin every 15 minutes
  visits:
  - ponte_tibetano
  description_extra: Take bus line 2 from Bellinzona to the Monte Carasso funivia stop, then ride the Monte Carasso to Curzútt to Mornera cable car up to about 1,400 m. From Mornera,
    the path drops through chestnut woods to the bridge in roughly 45 to 60 minutes, on the longer descent from above; the bridge is also about 45 to 60 minutes from Curzútt. The Carasc
    bridge itself is 270 m long, with a deck of around 1 m of larch wood, at an elevation of 696 m, 130 m above the Sementina ravine. On the far side is the restored stone village of
    Curzútt with a guesthouse and restaurant. Loop back via the Curzútt mid-station rather than climbing back up to Mornera. Cars cannot reach the bridge; access is by cable car or by
    a 1h 30 hike from Monte Carasso or Sementina.
