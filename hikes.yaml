- id: piz_gloria-cable-car-to-summit
  name: Cable car (Stechelberg → Schilthorn)
  start: Stechelberg cable car
  transit:
    train: Lauterbrunnen (BLS) + bus to Stechelberg
  duration_min: 30
  sac_grade: T1
  effort_label: Cable car ride
  description_extra: Schilthornbahn cable car from Stechelberg up to the 2,970 m summit, in stages through Gimmelwald, Mürren, and Birg. The revolving Piz Gloria restaurant at the top
    rotates once every 45 minutes and was featured in the 1969 James Bond film On Her Majesty's Secret Service. Clear-weather views over the Jungfrau, Mönch, and Eiger across the Lauterbrunnen
