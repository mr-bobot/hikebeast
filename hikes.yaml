- id: schrattenfluh-schratteflue-crossing
  name: Schratteflue crossing (advanced)
  start: Sörenberg or Bumbach
  transit:
    bus: Postbus to Sörenberg
  duration_min: 360
  sac_grade: T5
  effort_label: Expert
  description_extra: 'The full ridge runs about 6 km with four prominent peaks: Schibegütsch, Hängst, Hächle, and Strick. T5 with II scrambling. About 16 km and 7 h 45 in total; the
    two end peaks (Hächle and Strick) are the more demanding sections. The plateau holds one of the largest karst fields in Switzerland with deep potholes off the marked line, so staying
    on the trail matters. Sure-footedness, a head for heights, and good visibility required. Postbus to Sörenberg or Bumbach.'
  visits:
  - schrattenfluh
  sources:
