  quickest_for:
  - bachalpsee
- id: bachalpsee-bussalp-alternative
  name: From Bussalp
  start: Bussalp parking
  transit:
    bus: Bus 122 from Grindelwald
  duration_min: 100
  gain_m: 470
  sac_grade: T2
  effort_label: Moderate
  description_extra: Quieter alternative to the Firstbahn approach. Drive or take bus 122 from Grindelwald to the Bussalp parking, then climb the open meadow trail northeast to the lake.
    About 470 m of vertical gain over 1h 40, mostly on grass paths. Far fewer people because most visitors don't want to climb. The route approaches Bachalpsee from the back side — different
    angle for photos, with the lake in the foreground and the Firstbahn ridge visible across.
  visits:
  - bachalpsee
  sources:
  - https://www.sac-cas.ch/en/huts-and-tours/sac-route-portal/faulhorn-597/mountain-hiking/
  - https://en.wikipedia.org/wiki/Bachalpsee
- id: iseltwald-default
  description_extra: Iseltwald sits on the south shore of Lake Brienz — a small village famous for its 19th-century castle and pier, both made famous by Korean K-drama tourism in recent
    years. Drive in directly or take the ferry from Interlaken. The pier and castle are accessible from village parking in under five minutes. Famously crowded most of the day; early
    morning or last light is the only window for clean photos. T1.
  visits:
  - iseltwald
  sources:
  - https://en.wikipedia.org/wiki/Iseltwald
  quickest_for:
  - iseltwald
- id: oeschinensee-kandersteg-foot
  name: From Kandersteg on foot
  start: Kandersteg train station
  transit:
    train: Kandersteg (SBB)
  duration_min: 60
  gain_m: 418
  sac_grade: T1
  effort_label: Easy
  description_extra: Standard approach without the cable car. From Kandersteg train station the trail follows the Öschibach east through forest, climbing steadily about 400 metres over
    the hour to the lake at 1,578 m. The path is signposted throughout and wide enough for two-way traffic without trouble. No exposure on this stretch. If you want the morning reflection
    on the lake, start by 7. By mid-morning the wind off the Hohtürli side ripples the surface and the photo's gone.
  visits:
  - oeschinensee
  sources:
  - https://www.sac-cas.ch/en/huts-and-tours/sac-route-portal/oeschinensee-7848/mountain-hiking/
  - https://www.myswitzerland.com/en-us/experiences/gondola-to-lake-oeschinen/
  - https://en.wikipedia.org/wiki/Oeschinen_Lake
- id: oeschinensee-cable-car
  name: Cable car from Kandersteg + short walk
  start: Kandersteg cable car valley station
  transit:
    train: Kandersteg (SBB), then 10 min walk or shuttle to Bergbahnen
  duration_min: 15
  gain_m: 30
  sac_grade: T1
  effort_label: Trivial
  cable_car:
    line: Bergbahnen Oeschinensee
    cost_chf_raw: Around 32 CHF return
  visits:
  - oeschinensee
  description_extra: Quickest way in. The Bergbahnen Oeschinensee cable car from Kandersteg drops you at 1,683 m, about ten minutes' walk from the lake on a wide gravel path. Round-trip
    ticket runs around 32 CHF and operates from late May through October, with breaks for snow conditions in the shoulder months. The walk down from the top station to the lake is stroller-accessible
    and signposted. Most families take this option.
  sources:
  - https://www.myswitzerland.com/en-us/experiences/gondola-to-lake-oeschinen/
  - https://www.oeschinensee.ch/
  quickest_for:
  - oeschinensee
- id: oeschinensee-hohturli-extension
  name: Continuation to Hohtürli + Griesalp
  start: Oeschinensee
  duration_min: 360
  gain_m: 1100
  sac_grade: T3
  effort_label: Full day, demanding
  description_extra: Real mountain day from the lake. The trail climbs out of the basin toward the Blüemlisalp hut and over the Hohtürli pass at 2,778 m, then drops on the south side
    to Griesalp in the Kien valley. About six hours total once you're at Oeschinensee. The crux is the steep section above Unterbergli with big drop-offs to the lake basin — the trail
    is cabled where it matters, but exposure is real. Sure-footedness and a head for heights required. T3.
  visits:
  - oeschinensee
  sources:
  - https://www.sac-cas.ch/en/huts-and-tours/sac-route-portal/fruendenhuette-sac-2147000102/mountain-hiking/from-oeschinensee-or-kandersteg-closed-474/
  - https://www.outdooractive.com/en/route/mountain-hike/kandersteg/kandersteg-oeschinensee-hohtuerli-griesalp/51641556/
- id: piz_gloria-cable-car-to-summit
  name: Cable car (Stechelberg → Schilthorn)
  start: Stechelberg cable car
  transit:
    train: Lauterbrunnen (BLS) + bus to Stechelberg
  duration_min: 30
  sac_grade: T1
  effort_label: Cable car ride
  cable_car:
    line: Schilthornbahn (4 stages · Stechelberg → Gimmelwald → Mürren → Birg → Schilthorn)
  description_extra: Four-stage Schilthornbahn cable car from Stechelberg up to the 2,970 m summit. Total ride time about 30 minutes through Gimmelwald, Mürren, Birg, and finally Schilthorn.
    The revolving Piz Gloria restaurant at the top rotates once every 45 minutes and is famous as the location of the 1969 James Bond film 'On Her Majesty's Secret Service'. Clear-weather
    views over the Jungfrau, Mönch, and Eiger across the Lauterbrunnen valley.
  visits:
  - piz_gloria
  sources:
  - https://en.wikipedia.org/wiki/Schilthorn
