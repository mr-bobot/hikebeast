- id: brienzer_rothorn-brienz-via-planalp
  name: Foot ascent from Brienz via Planalp
  start: Brienz station
  transit:
    train: Brienz (BLS)
  duration_min: 360
  gain_m: 1800
  sac_grade: T2
  effort_label: Big vertical
  description_extra: Six-hour foot ascent from Brienz station to the Rothorn ridge at 2,350 m. About 1,800 m of vertical gain over 9.8 km, T2. The Milibach stream route is closed since
    the August 2024 debris flow, so the trail now follows the Trachtbach via Gäldried to Planalp at 1,344 m, then climbs another two-plus hours across alpine meadows to the ridge. The
    cog railway runs back down from Planalp or Rothorn, June through October.
  visits:
  - brienzer_rothorn
  sources:
  - https://www.outdooractive.com/en/route/hiking-trail/holiday-region-interlaken/hike-to-the-brienzer-rothorn/23490971/
  - https://en.wikipedia.org/wiki/Brienzer_Rothorn
- id: hardergrat_trail-rothorn-to-harder-kulm
  name: 'Full Brienzergrat traverse: Brienzer Rothorn to Harder Kulm'
  sac_grade: T5
  effort_label: Expert
  duration_min: 720
  gain_m: 1075
  descent_m: 2015
  distance_km: 24
  equipment_list:
  - Sturdy mountaineering boots
  - Poles
  - Helmet
  - Bivouac / emergency kit if splitting over two days
  start: Brienzer Rothorn summit station (top of Brienz Rothorn Bahn cog railway)
  transit:
    train: Brienz BLS
    cable_car: Brienz Rothorn Bahn (cog railway, June to October)
  description_extra: 'About 24 km from the Brienzer Rothorn summit station west along the Brienzergrat to Harder Kulm above Interlaken. Schweizer Wanderwege rates the route SAC T5 to
    T6 (sehr schwierig): a knife-edge grass ridge with steep drops on both sides, very few protective fixtures, and the Tannhorn passage in the middle as the most demanding section.
    Most parties do the traverse one-way starting at the cog railway summit and descending via the Harderbahn funicular at the Interlaken end. About 1,075 m of cumulative climb against
    2,015 m of descent, 10 to 13 hours of walking. Sure-footedness, head for heights, and real alpine experience required. Skip in wet or windy weather. Trail runners do it in a single
    day; many hikers split it with a bivouac near Augstmatthorn or Tannhorn.'
  sources:
  - https://www.schweizer-wanderwege.ch/de/wandertipps/ausgesetzte-gratwanderung-ueber-den-hardergrat/
  - https://www.hardergrat.com/
  - https://www.brienzergrat.com/brienzergrat_to_hardergrat.html
  cable_car_ids:
  - brienz-rothorn-bahn
  - harderbahn
  visits:
  - hardergrat_trail
  - brienzer_rothorn
  - tannhorn
  - augstmatthorn
- id: tannhorn-brienzergrat-segment
  name: 'Brienzergrat segment: Rothorn to Tannhorn to Planalp'
  start: Brienzer Rothorn summit (top of Brienz cog railway)
  transit:
    train: Brienz BLS + Rothorn Bahn
  duration_min: 360
  gain_m: 500
  distance_km: 14
  sac_grade: T5
  effort_label: Expert
  description_extra: Six-hour ridge segment from Brienzer Rothorn (top of the Brienz cog railway) along the Brienzergrat to Tannhorn and down to Planalp. About 600 m of cumulative climb
    against 1,600 m of descent. SAC's portal lists this section as T5 minus and describes the Tannhorn as crossed on exposed grass ridges, forming the most demanding passage of the entire
    Brienzergrat. Take the cog railway down from Planalp.
  visits:
  - tannhorn
  - brienzer_rothorn
  - hardergrat_trail
  sources:
  - https://www.sac-cas.ch/en/huts-and-tours/sac-route-portal/tannhorn-1933/mountain-hiking/
  - https://en.wikipedia.org/wiki/Tannhorn
  quickest_for:
