  start: Flühli
  transit:
    bus: Postbus to Flühli
  duration_min: 240
  sac_grade: T2
  effort_label: Moderate
  description_extra: Longer approach via Flühli (bus from Schüpfheim). About four hours of T2 mountain trail with views over the Entlebuch valley and Mariental at Sörenberg. The ridge
