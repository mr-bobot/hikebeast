hikes:
- id: engstligen_falls-route-48
  sac_grade: T1
  effort_label: Easy
  duration_min: 70
  gain_m: 395
  equipment_required: false
  start: Adelboden, Unter dem Birg
  transit:
    bus: Adelboden, Unter dem Birg
  visits:
  - engstligen_falls
  description_extra: Engstligenfälle is one of Switzerland's higher waterfall systems, dropping in two stages off the Engstligenalp plateau above Adelboden. The main viewing area is
    at the foot of the lower fall — a 20-minute walk from Unter dem Birg. Combine with the cable car up to the Engstligenalp plateau (1h 10 hike if walking up the side trail, 395 m of
    gain). The alp is a federal BLN-protected landscape. Best photographed when overcast — direct sun blows out the falls.
  sources:
  - https://www.myswitzerland.com/en-us/destinations/engstligen-falls/
  - https://en.wikipedia.org/wiki/Engstligenfall
  quickest_for:
  - engstligen_falls
- id: oltschibachfall-from-meiringen
  name: From Meiringen
  start: Meiringen train station
  transit:
    train: Meiringen (BLS)
  duration_min: 90
  gain_m: 500
  sac_grade: T2
  effort_label: Moderate
  description_extra: Hike up the slope above Meiringen to reach the base of the upper Oltschibachfall, which drops freely about 140 m from an overhanging cliff. The trail climbs roughly
    500 m over 1.5 hours through forest and open ground. Marked but not heavily trafficked. The lower cascade visible from the trail is impressive in spring snowmelt; the upper fall
    is best from mid-summer when the rock around it dries out and the wind isn't blowing the spray sideways.
  visits:
  - oltschibachfall
  sources:
  - https://www.outdooractive.com/en/poi/bernese-oberland/oltschibachfall-meiringen/8649167/
  - https://de.wikipedia.org/wiki/Oltschibachfall
  quickest_for:
  - oltschibachfall
- id: rosenlaui-route-99
  start: Parkplatz Gletscherschlucht
  transit:
    bus: Rosenlaui, Gletscherschlucht
  description_extra: Rosenlaui waterfall is in the Reichenbach valley between Meiringen and Grindelwald. Drive in from Meiringen via the Grosse Scheidegg road or postbus. The lower viewpoint,
    accessible by a five-minute walk from the road, gives the cleanest angle on the falls. Path starts beside the toilet block at the parking. T1. Combine with the Rosenlaui glacier
    gorge a few minutes further up the valley for a half-day.
  visits:
  - rosenlaui
  sources:
  - https://en.wikipedia.org/wiki/Rosenlaui
  quickest_for:
  - rosenlaui
- id: rosenlaui_public_waterfall-route-99
  start: Parkplatz Gletscherschlucht
  transit:
    bus: Rosenlaui, Gletscherschlucht
  description_extra: Same Rosenlaui falls — the public viewpoint accessible from the Grosse Scheidegg road. Five-minute walk from the parking on a path starting beside the toilet block.
    The view from below is the postcard angle. T1. The valley also has the famous Rosenlauischlucht ice-blue glacier gorge a kilometre further along the road.
  visits:
  - rosenlaui_public_waterfall
  quickest_for:
  - rosenlaui_public_waterfall
- id: rosenlauifall-route-99
  start: Parkplatz Gletscherschlucht
  transit:
    bus: Rosenlaui, Gletscherschlucht
  description_extra: The waterfall itself, dropping out of the Rosenlaui glacier above. Best photographed from the lower viewpoint reached via the five-minute trail next to the parking
    toilet block. Approach the falls in the morning when the sun is on the spray and the rainbow forms across the basin. T1.
  visits:
  - rosenlauifall
  quickest_for:
  - rosenlauifall
- id: triftbrucke-route-40
  sac_grade: T2
  effort_label: Easy
  duration_min: 80
  gain_m: 415
  equipment_required: false
  start: Triftbahn
  transit:
    bus: Nessental, Triftbahn
  hut:
    name: Windegghütte SAC
    cost_chf_raw: 92 CHF
    open_raw: June 1 - Oct 11
    website: https://www.windegghuette.ch/
  cable_car:
    line: Cable car required to start the hike. Cable car cost 26 CHF and must be booked in advance here
    cost_chf_raw: 92 CHF
    open_raw: June 1 - Oct 11
  visits:
  - triftbrucke
  description_extra: Triftbrücke is a 170-metre-long suspension footbridge 100 metres above the Trift glacier basin near Innertkirchen. Reach the trailhead via the Triftbahn cable car
    (must be booked in advance, around 26 CHF). From the top, 1h 20 walk on a T2 mountain trail with 415 m of gain to the bridge. Nessental, Triftbahn is the postbus stop. Continue past
    the bridge to the Windegghütte SAC (92 CHF dorm, June to mid-October) for an overnight.
  sources:
  - https://www.windegghuette.ch/
  - https://www.grimselwelt.ch/en/sports/hiking/trift-bridge/
  quickest_for:
  - triftbrucke
- id: triftsee-route-40
  sac_grade: T2
  effort_label: Easy
  duration_min: 80
  gain_m: 415
  equipment_required: false
  start: Triftbahn
  transit:
    bus: Nessental, Triftbahn
  hut:
    name: Windegghütte SAC
    cost_chf_raw: 92 CHF
    open_raw: June 1 - Oct 11
    website: https://www.windegghuette.ch/
  cable_car:
    line: Cable car required to start the hike. Cable car cost 26 CHF and must be booked in advance here
    cost_chf_raw: 92 CHF
    open_raw: June 1 - Oct 11
  visits:
  - triftsee
  description_extra: Triftsee is the milky-blue glacial lake fed by the retreating Trift glacier in the Innertkirchen back-country. Reached via the Triftbahn cable car and the same trail
    as the Triftbrücke suspension bridge. About 1h 30 from the cable car top station, T2, 400+ m of gain. The lake is one of Switzerland's most recently-formed natural lakes — it only
    appeared as the glacier receded in the early 2000s. Camping not permitted, fragile alpine landscape.
  sources:
  - https://www.grimselwelt.ch/en/sports/hiking/triftsee/
  quickest_for:
  - triftsee
- id: gelmersee-default
  hut:
    name: Gelmerhutte
    cost_chf_raw: 45 CHF
    open_raw: Mid June - Mid Oct
    website: https://www.gelmerhuette.ch/
  description_extra: Gelmersee reservoir sits at 1,860 m above the Grimsel road. Accessed via the Gelmerbahn funicular from the valley — one of Switzerland's steepest at 106 % gradient.
    The funicular runs June to October. From the top, a flat 1-1.5 hour walk loops the reservoir. T1 once you're up. The water is drinking-water green and the surrounding granite walls
    give it an alpine-Patagonia feel. The Gelmerhütte SAC sits at the far end of the lake for those continuing further.
  visits:
  - gelmersee
  sources:
  - https://en.wikipedia.org/wiki/Gelmersee
  quickest_for:
  - gelmersee
- id: brienzer_rothorn-default
  hut:
    name: Berghaus Rothorn
    cost_chf_raw: 120 CHF
    open_raw: June 8 - Oct 20
    website: https://brienz-rothorn-bahn.ch/fahrplan-preise/
  visits:
  - brienzer_rothorn
  description_extra: Brienzer Rothorn is the easternmost peak of the Brienzergrat ridge, at 2,350 m. Most visitors take the historic steam cog railway from Brienz to the summit — about
    an hour each way. June to October operations. From the top, easy ridge walks to the west open up the Brienzergrat traverse for stronger parties. Berghaus Rothorn at the summit serves
    food and has overnight rooms.
  sources:
  - https://en.wikipedia.org/wiki/Brienzer_Rothorn
  - https://en.wikipedia.org/wiki/Brienz_Rothorn_Bahn
- id: brienzer_rothorn-cog-railway
  name: Brienz Rothorn Bahn (cog railway)
  start: Brienz station
  transit:
    train: Brienz (BLS)
  duration_min: 60
  sac_grade: T1
  effort_label: Cog railway ride
  cable_car:
    line: Brienz Rothorn Bahn (steam cog railway, Jun-Oct)
  description_extra: Historic steam cog railway from Brienz at lake level up to the Rothorn summit at 2,350 m. About an hour each way. Operates June to October. The Brienzer Rothorn
    Bahn is one of Switzerland's oldest steam-driven mountain railways and still uses original locomotives on most departures. From the summit, easy walks lead along the ridge with views
    over both Lake Brienz and Lake Lucerne on a clear day.
  visits:
  - brienzer_rothorn
  sources:
  - https://en.wikipedia.org/wiki/Brienz_Rothorn_Bahn
  - https://en.wikipedia.org/wiki/Brienzer_Rothorn
  quickest_for:
  - brienzer_rothorn
- id: brienzer_rothorn-brienz-via-planalp
  name: From Brienz on foot via Planalp
  start: Brienz station
  transit:
    train: Brienz (BLS)
  duration_min: 360
  gain_m: 1800
  sac_grade: T2
  effort_label: Big vertical
  description_extra: Six-hour foot ascent from Brienz station to the Rothorn ridge at 2,350 m. About 1,800 m of vertical gain. First section to Planalp is 5.3 km, 2h 45, 778 m of gain
    — a well-signposted varied trail along the Trachtbach stream via Gäldried. Note the Milibach stream route is closed since the August 2024 debris flow. From Planalp at 1,344 m, the
    path continues another two-plus hours up across alpine meadows to the ridge. Take the cog railway back down to spare the knees. T2 throughout.
  visits:
  - brienzer_rothorn
  sources:
  - https://www.outdooractive.com/en/route/hiking-trail/holiday-region-interlaken/hike-to-the-brienzer-rothorn/23490971/
  - https://en.wikipedia.org/wiki/Brienzer_Rothorn
- id: hardergrat_trail-harder-to-rothorn
  name: Harder Kulm → Brienzer Rothorn
  start: Harder Kulm
  transit:
    train: Interlaken Ost + Harder cable car
  duration_min: 720
  gain_m: 2000
  sac_grade: T4
  effort_label: Very long, exposed
  equipment_required: true
  description_extra: Twenty-four kilometres along the ridge between Harder Kulm above Interlaken and Brienzer Rothorn above Brienz. The trail is mostly narrow grass spine with big drops
    on both sides. Sections near Augstmatthorn and Tannhorn are knife-edge. Trail runners do the full traverse as a long single day; hikers usually split it with a bivouac. T4 in places,
    exposed, weather-dependent, not for anyone uneasy with heights. Ibex frequently sighted on the Augstmatthorn cliffs.
  visits:
  - hardergrat_trail
  sources:
  - https://www.outdooractive.com/en/hikes/interlaken/hikes-in-the-municipality-of-interlaken/1453743/
  - https://www.myswitzerland.com/en-ch/experiences/route/trail-run-brienzergrat/
  - https://en.wikipedia.org/wiki/Augstmatthorn
  quickest_for:
  - hardergrat_trail
- id: tannhorn-brienzergrat-segment
  name: Rothorn → Tannhorn → Planalp
  start: Brienzer Rothorn summit (top of Brienz cog railway)
  transit:
    train: Brienz BLS + Rothorn Bahn
  duration_min: 360
  gain_m: 500
  distance_km: 14
  sac_grade: T4
  effort_label: Exposed grass ridges
  equipment_required: true
  description_extra: Six-hour segment from Brienzer Rothorn (top of the Brienz cog railway) along the ridge to Tannhorn and down to Planalp. About 14 km, 500 m of cumulative climb, but
    1,500 m of descent — knees-on-the-line. The Tannhorn passage is the most demanding section of the entire Brienzergrat, traversed on exposed grass ridges where there's nothing to
    hold on to. T4. Take cog railway down from Planalp. Don't attempt in wet or windy conditions.
  visits:
  - tannhorn
  sources:
  - https://www.sac-cas.ch/en/huts-and-tours/sac-route-portal/tannhorn-1933/mountain-hiking/
  - https://en.wikipedia.org/wiki/Tannhorn
  quickest_for:
  - tannhorn
- id: augstmatthorn-route-85
  sac_grade: T3
  effort_label: Mid
  duration_min: 100
  gain_m: 580
  equipment_required: false
  start: Lombachalp
  description_extra: Augstmatthorn at 2,137 m is the highest point reachable on the Brienzergrat without going full T4 exposure. Approach from Lombachalp (drive or postbus from Habkern).
    One hour and 40 minutes up, 580 m of gain, T3 mountain trail. The ridge above Augstmatthorn is a protected ibex sanctuary — at dawn and dusk in summer the colony is usually visible
    from the trail. Sunrise here puts the sun directly over Lake Brienz; sunset turns the ridge red. Both work, photographically very different.
  visits:
  - augstmatthorn
  sources:
  - https://www.sac-cas.ch/en/huts-and-tours/sac-route-portal/augstmatthorn-1928/mountain-hiking/
  - https://en.wikipedia.org/wiki/Augstmatthorn
  quickest_for:
  - augstmatthorn
- id: fronalpstock-route-72
  sac_grade: T1
  effort_label: Easy
  duration_min: 120
