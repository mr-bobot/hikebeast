- id: engstligen_falls-route-48
  sac_grade: T1
  effort_label: Easy
  duration_min: 70
  gain_m: 395
  start: Adelboden, Unter dem Birg
  transit:
    bus: Adelboden, Unter dem Birg
  visits:
  - engstligen_falls
  description_extra: Engstligenfälle drops in two stages off the Engstligenalp plateau above Adelboden, roughly 370 m total. The main viewing area is at the foot of the lower fall, a
    20-minute walk from Unter dem Birg. Combine with the cable car up to the Engstligenalp plateau, or hike up the side trail (1 h 10, 395 m of gain). The site has been protected since
    1948 and is on Switzerland's federal landscape inventory.
  sources:
  - https://www.myswitzerland.com/en-us/destinations/engstligen-falls/
  - https://en.wikipedia.org/wiki/Engstligenfall
  quickest_for:
  - engstligen_falls
  equipment_list: []
  cable_car_ids:
  - engstligenalp-cable-car
- id: oltschibachfall-from-meiringen
  name: From Meiringen
  start: Meiringen train station
  transit:
    train: Meiringen (BLS)
  duration_min: 90
  gain_m: 500
  sac_grade: T2
  effort_label: Moderate
  description_extra: Walk up from Meiringen in the Haslital to the base of the Oltschibachfall. The upper section drops about 140 m, partly free-falling from overhanging rock, with a
    longer cascading section below across rock steps. A footpath in the mountain forest leads up to viewpoints under the fall. About 1h 30 from town and roughly 500 m of gain. T2. The
    lower cascade is impressive in spring snowmelt.
  visits:
  - oltschibachfall
  sources:
  - https://www.outdooractive.com/en/poi/bernese-oberland/oltschibachfall-meiringen/8649167/
  - https://de.wikipedia.org/wiki/Oltschibachfall
  quickest_for:
  - oltschibachfall
- id: rosenlaui-route-99
  start: Parkplatz Gletscherschlucht
  transit:
    bus: Rosenlaui, Gletscherschlucht
  description_extra: 'Rosenlaui sits in the Reichenbach valley between Meiringen and Grindelwald at 1,328 m. Drive in from Meiringen via the Grosse Scheidegg road, or postbus (May to
    October). The Rosenlaui glacier gorge is the main draw: a narrow gorge cut by meltwater from the Rosenlaui glacier, accessed via a short footpath from the parking. T1. Combine with
    the surrounding Reichenbach valley for a half-day.'
  visits:
  - rosenlaui
  sources:
  - https://en.wikipedia.org/wiki/Rosenlaui
  quickest_for:
  - rosenlaui
- id: rosenlaui_public_waterfall-route-99
  start: Parkplatz Gletscherschlucht
  transit:
    bus: Rosenlaui, Gletscherschlucht
  description_extra: The public Rosenlaui waterfall viewpoint, accessible from the Grosse Scheidegg road. Park at the Parkplatz Gletscherschlucht (postbus stop Rosenlaui, Gletscherschlucht)
    and walk a few minutes from beside the toilet block. T1. The valley also has the Rosenlauischlucht glacier gorge a kilometre further along the road.
  visits:
  - rosenlaui_public_waterfall
  quickest_for:
  - rosenlaui_public_waterfall
- id: rosenlauifall-route-99
  start: Parkplatz Gletscherschlucht
  transit:
    bus: Rosenlaui, Gletscherschlucht
  description_extra: The waterfall drops out of the Rosenlaui valley above the Gletscherschlucht parking. A five-minute trail from the parking reaches the lower viewpoint. T1. Reached
    by Postbus to Rosenlaui, Gletscherschlucht.
  visits:
  - rosenlauifall
  quickest_for:
  - rosenlauifall
- id: triftbrucke-route-40
  sac_grade: T2
  effort_label: Easy
  duration_min: 80
  gain_m: 415
  start: Triftbahn
  transit:
    bus: Nessental, Triftbahn
  visits:
  - triftbrucke
  description_extra: Triftbrücke is a suspension footbridge above the Trift glacier basin near Innertkirchen. Reach the trailhead via the Triftbahn cable car (booking advised, around
    26 CHF). From the top station, about 1h 20 on a T2 mountain trail with 415 m of gain to the bridge. The Postbus stop is Nessental, Triftbahn. Continue past the bridge to the Windegghütte
    for an overnight (June to mid-October).
  sources:
  - https://www.windegghuette.ch/
  - https://www.grimselwelt.ch/en/sports/hiking/trift-bridge/
  quickest_for:
  - triftbrucke
  equipment_list: []
  cable_car_ids:
  - triftbahn-cable-car
  hut_ids:
  - windegghutte-sac
- id: triftsee-route-40
  sac_grade: T2
  effort_label: Easy
  duration_min: 80
  gain_m: 415
  start: Triftbahn
  transit:
    bus: Nessental, Triftbahn
  visits:
  - triftsee
  description_extra: Triftsee is the proglacial lake fed by the retreating Trift glacier in the Innertkirchen back-country. Reached via the Triftbahn cable car (10-minute ride) and the
    same approach as the Triftbrücke suspension bridge, about 1 h 30 from the top station, T2, around 400 m of gain. The lake formed in the late 1990s as the glacier retreated and expanded
    significantly after 2001. Camping not permitted.
  sources:
  - https://www.grimselwelt.ch/en/sports/hiking/triftsee/
  quickest_for:
  - triftsee
  equipment_list: []
  cable_car_ids:
  - triftbahn-cable-car
  hut_ids:
  - windegghutte-sac
- id: gelmersee-default
  description_extra: Gelmersee reservoir sits at 1,850 m above the Grimsel road, completed in 1932. Accessed via the Gelmerbahn funicular from the valley, with a maximum gradient of
    106 percent. The funicular runs roughly June to October. From the top, a flat 1 to 1.5 hour walk loops the reservoir. T1 once you're up. The Gelmerhütte SAC sits at the far end of
    the lake for those continuing further.
  visits:
  - gelmersee
  sources:
  - https://en.wikipedia.org/wiki/Gelmersee
  quickest_for:
  - gelmersee
  hut_ids:
  - gelmerhutte
  cable_car_ids:
  - gelmerbahn-funicular
- id: brienzer_rothorn-default
  visits:
  - brienzer_rothorn
  description_extra: Brienzer Rothorn is the highest summit of its range at 2,350 m, on the cantonal corner of Bern, Lucerne, and Obwalden, overlooking Lake Brienz. The historic Brienz
    Rothorn Bahn rack railway runs from Brienz to the summit station at 2,244 m, mostly with steam locomotives, in about an hour. Typical operating season is June to October. From the
    top, easy ridge walks to the west open up the Brienzergrat for stronger parties. A cable car from Sörenberg reaches the summit area from the north side.
  sources:
  - https://en.wikipedia.org/wiki/Brienzer_Rothorn
  - https://en.wikipedia.org/wiki/Brienz_Rothorn_Bahn
  hut_ids:
  - berghaus-rothorn
  cable_car_ids:
  - brienz-rothorn-bahn
- id: brienzer_rothorn-cog-railway
  name: Brienz Rothorn Bahn (cog railway)
  start: Brienz station
  transit:
    train: Brienz (BLS)
  duration_min: 60
  sac_grade: T1
  effort_label: Cog railway ride
  description_extra: Steam rack railway from Brienz at lake level up to the Rothorn at 2,350 m, the highest summit of the Emmental Alps. About 50 minutes each way on a 7.6 km line with
    a maximum 25 percent gradient, operating June through October. Most departures still run with original-design steam locomotives. From the summit, easy walks along the ridge with
    views over Lake Brienz and Interlaken.
  visits:
  - brienzer_rothorn
  sources:
  - https://en.wikipedia.org/wiki/Brienz_Rothorn_Bahn
  - https://en.wikipedia.org/wiki/Brienzer_Rothorn
  quickest_for:
  - brienzer_rothorn
  cable_car_ids:
  - brienz-rothorn-bahn
- id: brienzer_rothorn-brienz-via-planalp
  name: From Brienz on foot via Planalp
  start: Brienz station
  transit:
    train: Brienz (BLS)
  duration_min: 360
  gain_m: 1800
  sac_grade: T2
  effort_label: Big vertical
  description_extra: Six-hour foot ascent from Brienz station to the Rothorn ridge at 2,350 m. About 1,800 m of vertical gain over 9.8 km, T2. The Milibach stream route is closed since
    the August 2024 debris flow, so the trail now follows the Trachtbach via Gäldried to Planalp at 1,344 m, then climbs another two-plus hours across alpine meadows to the ridge. The
    cog railway runs back down from Planalp or Rothorn, June through October.
  visits:
  - brienzer_rothorn
  sources:
  - https://www.outdooractive.com/en/route/hiking-trail/holiday-region-interlaken/hike-to-the-brienzer-rothorn/23490971/
  - https://en.wikipedia.org/wiki/Brienzer_Rothorn
- id: hardergrat_trail-harder-to-rothorn
  name: Harder Kulm → Brienzer Rothorn
  start: Harder Kulm
  transit:
    train: Interlaken Ost + Harder cable car
  duration_min: 720
  gain_m: 2000
  sac_grade: T4
  effort_label: Very long, exposed
  description_extra: About 24 km along the ridge between Harder Kulm above Interlaken and Brienzer Rothorn above Brienz, high above both Lake Brienz and Lake Thun. The trail is a narrow
    ridge with steep drops on both sides. T4 in places, exposed, weather-dependent. Trail runners do the full traverse in a single day; most hikers split it with a bivouac. Augstmatthorn
    (2,137 m), partway along, hosts one of the oldest reintroduced alpine ibex colonies in Bern, established in the early 20th century, so ibex sightings are common on the cliffs.
  visits:
  - hardergrat_trail
  sources:
  - https://www.outdooractive.com/en/hikes/interlaken/hikes-in-the-municipality-of-interlaken/1453743/
  - https://www.myswitzerland.com/en-ch/experiences/route/trail-run-brienzergrat/
  - https://en.wikipedia.org/wiki/Augstmatthorn
  quickest_for:
  - hardergrat_trail
  equipment_list:
  - Sturdy hiking boots
  - Poles
  - Helmet (rockfall sections)
  cable_car_ids:
  - harderbahn
  - brienz-rothorn-bahn
- id: tannhorn-brienzergrat-segment
  name: Rothorn → Tannhorn → Planalp
  start: Brienzer Rothorn summit (top of Brienz cog railway)
  transit:
    train: Brienz BLS + Rothorn Bahn
  duration_min: 360
  gain_m: 500
  distance_km: 14
  sac_grade: T4
  effort_label: Exposed grass ridges
  description_extra: Six-hour ridge segment from Brienzer Rothorn (top of the Brienz cog railway) along the Brienzergrat to Tannhorn and down to Planalp. About 600 m of cumulative climb
    against 1,600 m of descent. SAC's portal lists this section as T5 minus and describes the Tannhorn as crossed on exposed grass ridges, forming the most demanding passage of the entire
    Brienzergrat. Take the cog railway down from Planalp.
