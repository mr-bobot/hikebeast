- id: hardergrat_trail-rothorn-to-harder-kulm
  name: 'Full Brienzergrat traverse: Brienzer Rothorn to Harder Kulm'
  sac_grade: T5
  effort_label: Expert
  duration_min: 600
  gain_m: 1400
  descent_m: 2400
  distance_km: 25
  equipment_list:
  - Sturdy mountaineering boots
  - Poles
  - Helmet
  - Bivouac / emergency kit if splitting over two days
  start: Brienzer Rothorn summit station (top of Brienz Rothorn Bahn cog railway)
  transit:
    train: Brienz BLS
    cable_car: Brienz Rothorn Bahn (cog railway, June to October)
  description_extra: 'About 25 km from the Brienzer Rothorn summit station west along the Brienzergrat to Harder Kulm above Interlaken. SAC rating T5 (sehr schwierig): a knife-edge grass
    ridge with steep drops on both sides, very few protective fixtures, and the Tannhorn passage in the middle as the most demanding section. Most parties do the traverse one-way starting
    at the cog railway summit and descending via the Harderbahn funicular at the Interlaken end. Around 1,400 m of cumulative climb against 2,400 m of descent, 9 to 12 hours of walking.
    Sure-footedness, head for heights, and real alpine experience required. Skip in wet or windy weather. Trail runners do it in a single day; many hikers split it with a bivouac near
    Augstmatthorn or Tannhorn.'
  sources:
  - https://www.brienzergrat.com/brienzergrat_to_hardergrat.html
  - https://www.hardergrat.com/
  cable_car_ids:
  - brienz-rothorn-bahn
  - harderbahn
  visits:
  - hardergrat_trail
  - brienzer_rothorn
  - tannhorn
  - augstmatthorn
  start_maps_url: https://maps.app.goo.gl/kGusxAUtXnSJ8tvT7
