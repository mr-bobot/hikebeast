  start: Oeschinensee
  duration_min: 360
  gain_m: 1100
  sac_grade: T3
  effort_label: Full day, demanding
  description_extra: Real mountain day from the lake. The trail climbs out of the basin toward the Blüemlisalp hut and over Hohtürli at 2,779 m, then drops on the south side to Griesalp
