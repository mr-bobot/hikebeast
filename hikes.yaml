  quickest_for:
  - piz_gloria
- id: piz_gloria-gimmelwald-on-foot
  name: From Gimmelwald on foot
  start: Gimmelwald
  transit:
    train: Lauterbrunnen + Stechelberg-Gimmelwald cable car
  duration_min: 300
  gain_m: 1600
  sac_grade: T3
  effort_label: Long, big vertical
  description_extra: Five-hour foot ascent from Gimmelwald to the Schilthorn summit. About 1,600 m of vertical gain on a marked trail that climbs steadily, crossing below the cable car
    line and passing through Mürren and Birg. T3 — the upper section above Birg is exposed and steep. Most people take cable cars one way and walk down or vice versa. Bring water and
    layers; the summit is regularly windy and 15 °C cooler than the valley.
  visits:
  - piz_gloria
  sources:
  - https://en.wikipedia.org/wiki/Schilthorn
- id: riffelsee-default
  description_extra: 'Riffelsee in Zermatt at 2,757 m — the famous lake that mirrors the Matterhorn. Reached by the Gornergrat railway from Zermatt: stop at Rotenboden, then a 10-minute
    walk to the lake. Round-trip train ticket runs around 110 CHF in 2026. The reflection works best on still mornings before the wind picks up across the surface — typically early morning,
