- id: iffigfalle-lenk-to-iffigenalp
  name: Lenk → Iffigfall → Iffigenalp
  start: Lenk train station
  transit:
    train: Lenk im Simmental (BLS)
  duration_min: 150
  gain_m: 500
  sac_grade: T2
  effort_label: Moderate
  description_extra: Well-marked trail from Lenk train station via Teufebode, Färiche, and Langersite up to the Iffigfall waterfall and on to Iffigenalp at 1,584 m. About 2.5 hours one
    way, 500 m of gain. The trail follows the Iffigbach stream the whole way. In summer the Iffigenalp post bus runs from Lenk and skips the lower section if you want to start at the
    waterfall. The Gelten-Iffigen nature reserve above hosts rare alpine flora. Continue to Iffigsee for a full day.
  visits:
