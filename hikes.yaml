- id: iffigfalle-lenk-to-iffigenalp
  name: Lenk → Iffigfall → Iffigenalp
  start: Lenk train station
  transit:
    train: Lenk im Simmental (BLS)
  duration_min: 150
  gain_m: 500
  sac_grade: T2
  effort_label: Moderate
  description_extra: Well-marked trail from Lenk station via Teufebode, Färiche, and Langersite up to the Iffigfall waterfall and on to Iffigenalp at 1,584 m. About 2.5 hours one way,
    500 m of gain, T2. The trail follows the Iffigbach stream the whole way. In summer the Iffigenalp postbus runs from Lenk and skips the lower section if you want to start at the waterfall.
    Continue to Iffigsee at 2,065 m for a full day.
  visits:
