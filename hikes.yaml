  duration_min: 60
  sac_grade: T1
  effort_label: Cog railway ride
  description_extra: Steam rack railway from Brienz at lake level up to the Rothorn at 2,350 m. About 50 minutes each way on a 7.6 km line with a maximum 25 percent gradient, operating
    June through October. Most departures still run with original-design steam locomotives. From the summit, easy walks along the ridge.
