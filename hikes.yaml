- id: fronalpstock-route-72
  sac_grade: T1
  effort_label: Easy
  duration_min: 120
  start: Schwyz, Stoosbahn
  description_extra: 'Fronalpstock at 1,922 m looks out over Lake Lucerne. Standard approach: funicular from Schwyz to Stoos, then short walk to the Klingenstock cable car. The ridge
    between the two summits is the actual walking, about two hours on grass and gravel paths. T2 with brief exposed sections. Designated camping spot on the summit with a small fee paid
    at the Fronalpstock Hotel.'
