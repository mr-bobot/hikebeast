- id: iseltwald-default
  description_extra: Iseltwald sits on a delta on the south shore of Lake Brienz, 14 km from Interlaken. The village became a draw for visitors after appearing in the Korean drama Crash
    Landing on You, with the small pier as the main photo spot. Drive in, or take the summer steamship from Interlaken. The pier is a few minutes from village parking. T1.
