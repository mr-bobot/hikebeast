- id: schrattenfluh-schratteflue-crossing
  name: Schratteflue crossing (advanced)
  start: Sörenberg or Bumbach
  transit:
    bus: Postbus to Sörenberg
  duration_min: 360
  sac_grade: T4
  effort_label: Long, exposed karst
  equipment_required: true
  description_extra: 'Six-kilometre limestone ridge with four peaks: Schibegütsch, Hängst, Hächle, and Strick. Full crossing takes about six hours, T4 territory with exposed scrambling.
    The ridge is also riddled with deep karst potholes off the marked line — staying on the trail matters here. Starts and ends at Sörenberg or Bumbach (bus from Schüpfheim). For advanced
    hikers only. Sure-footedness, a head for heights, and good visibility required.'
  visits:
  - schrattenfluh
  sources:
