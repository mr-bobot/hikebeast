  description_extra: 'Fronalpstock at 1,922 m looks out over Lake Lucerne. Standard approach: funicular from Schwyz to Stoos, then a two-minute walk to the Klingenstock cable car. The
    hike ridge between the two summits is the actual walking — about 2 hours along grass and gravel paths. T2 with brief exposed sections. Wide-angle view of the four-canton lake from
    the summit. Designated camping spot on the summit with a small fee paid at the Fronalpstock Hotel.'
  visits:
  - fronalpstock
  sources:
