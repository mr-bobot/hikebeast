  description_extra: The historic Brienz Rothorn Bahn rack railway runs from Brienz to the summit station at 2,244 m, mostly with steam locomotives, in about an hour. Typical operating
    season is June to October. From the top, easy ridge walks to the west open up the Brienzergrat for stronger parties. A cable car from Sörenberg reaches the summit area from the north
    side.
