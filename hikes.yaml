  description_extra: Well-marked trail from Lenk station via Murersrohr, Lenkerseeli, Teufebode, Under der Flue, and Brunnersgüetli up to the Iffigfall waterfall and on to Iffigenalp
    at 1,584 m. About 2 h 30 to the waterfall and 2 h 50 to Iffigenalp, 575 m of gain over 8.8 km, T2. The trail follows the Iffigbach stream the whole way. In summer the Iffigenalp
