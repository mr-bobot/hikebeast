- id: piz_gloria-gimmelwald-on-foot
  name: From Gimmelwald on foot
  start: Gimmelwald
  transit:
    train: Lauterbrunnen + Stechelberg-Gimmelwald cable car
  duration_min: 300
  gain_m: 1600
  sac_grade: T3
  effort_label: Long, big vertical
  description_extra: Foot ascent from Gimmelwald (reached by cable car from Stechelberg) up to the Schilthorn summit at 2,970 m. About five hours and 1,600 m of gain for a fit walker.
    T3. The trail climbs steadily, crossing below the cable car line and passing through Mürren and Birg. Most people walk one direction and ride the cable car the other. Bring layers;
    the summit is regularly windy and significantly cooler than the valley. The Piz Gloria revolving restaurant at the top featured in On Her Majesty's Secret Service.
  visits:
  - piz_gloria
  sources:
  - https://en.wikipedia.org/wiki/Schilthorn
- id: riffelsee-default
  description_extra: Riffelsee at 2,757 m in Zermatt, the small alpine lake below the Riffelhorn that reflects the Matterhorn on still mornings. Reached from Rotenboden station (2,815
    m) on the Gornergrat railway from Zermatt, then a short walk down (the station sits about 58 m above the lake). The Kulmhotel Gornergrat and Riffelhaus 1853 are walking distance
    along the ridge.
  visits:
  - riffelsee
  sources:
  - https://www.gornergrat.ch/
  - https://en.wikipedia.org/wiki/Riffelsee
  quickest_for:
  - riffelsee
- id: riffelalp-easy-round-trip
  name: Easy round-trip via Grünsee
  start: Riffelalp station
  transit:
    train: Zermatt + Gornergrat Bahn to Riffelalp
  duration_min: 90
  distance_km: 3
  sac_grade: T1
