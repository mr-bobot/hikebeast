  duration_min: 100
  gain_m: 470
  sac_grade: T2
  effort_label: Moderate
  description_extra: Quieter approach to Bachalpsee than the Firstbahn side. Drive or take bus 122 from Grindelwald to the Bussalp parking, then climb the meadow trail to the lake. About
