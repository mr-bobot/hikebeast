  effort_label: Long day
  description_extra: Six-hour summit day in the French Bornes Massif (Haute-Savoie). From Le Petit-Bornand-les-Glières the trail climbs steadily through pastures and forest to the rocky
    upper section of the Pic de Jallouvre at 2,408 m. About 1,300 m of vertical gain. T3 — final section involves easy scrambling. Summit gives long views over the Aravis chain and toward
    Mont Blanc. Done as part of a longer Bornes traverse, the peak sits between Le Grand-Bornand and Le Petit-Bornand on the chain.
