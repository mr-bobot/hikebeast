  description_extra: Four-hour climb from Tré-le-Champ (above Argentière) into the Aiguilles Rouges nature reserve. The trail ascends through forest then quickly above the treeline,
    crosses fixed ladders on the Aiguillette de Argentière, and reaches the Grand Balcon Sud. Continues past three small Cheserys lakes and the Refuge du Lac Blanc. The lakes give the
    most famous reflection of the Mont Blanc range in Chamonix. T3 — sustained exposure on the ladder section, head for heights required. Descend by cable car from La Flégère.
