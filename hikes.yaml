  effort_label: Moderate, steep zigzag
  description_extra: Four-hour climb from the Chalet du Glacier des Bossons up to La Jonction at the head of the glacier. The trail follows the ridge separating the Bossons and Taconnaz
    glaciers — historic ground, used by Balmat and Paccard on their 1786 first ascent of Mont Blanc. About 800 m of vertical gain on steady zig-zags through forest, then exposed glacier-side
