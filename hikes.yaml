- id: bachalpsee-route-38
  sac_grade: T1
  effort_label: Easy
  duration_min: 60
  gain_m: 161
  equipment_required: false
  start: Berggasthaus First
  transit:
    train: Grindelwald
  description_extra: Standard Bachalpsee day from the First gondola top station. Wide gravel path heads east-northeast, climbing gradually through alpine pasture with views back across
    Grindelwald. About an hour each way, almost no exposure. The famous reflection of the Schreckhorn works best on still mornings before the wind picks up — by 10 the lake is usually
    busy. Continue 10 minutes past the main lake to a smaller second one that nobody walks to.
  visits:
  - bachalpsee
  sources:
