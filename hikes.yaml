- id: zinal_glacier-route-petit-mountet
  sac_grade: T2
  effort_label: Moderate
  duration_min: 210
  gain_m: 500
  start: Zinal village, south end parking near the Navisence river
  transit:
    bus: Zinal, Poste (PostAuto 452 from Sierre via Vissoie)
    train: Sierre / Siders (then PostAuto)
  visits:
  - zinal_glacier
  description_extra: Park at the south end of Zinal where the road ends near the river, then follow signs for Cabane du Petit Mountet. The path is a wide gravel track along the west
    side of the Navisence, climbing through larch forest and pasture. Roughly 5 km and 500 m of climbing one way, about 2 hours up and 90 minutes down, total 3.5 hours round trip. The
    hut at 2,142 m sits on an old lateral moraine looking up at the Zinal glacier tongue, which is 5.8 km long, visibly retreating, and largely stone-covered in its lower section. T2
    throughout, no exposure. Snow can linger on the upper track into early July.
  sources:
  - https://en.wikipedia.org/wiki/Zinal_Glacier
  - https://www.valais.ch/en/activities/natural-sites/glaciers/zinal-glacier
