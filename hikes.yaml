- id: gelmersee-default
  description_extra: Accessed via the Gelmerbahn funicular from the valley. The funicular runs roughly June to October. From the top station, a marked lakeshore loop circles the reservoir
    at 1,850 m — about 2 hours, around 170 m of cumulative climb and descent. The path on the north shore is carved into the rock face with exposed sections, rated T3 — sure-footedness
    and a head for heights required. The Gelmerhütte SAC sits at the far end of the lake for those continuing further.
