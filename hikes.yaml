  description_extra: Take the S-Bahn to Dallenwil, ride the small cable car up to Niederrickenbach, then walk roughly 30 minutes to the base of the Haldigrat chairlift. The chairlift
    drops you onto the western Haldigrat ridge at around 1,940 m, the easiest way up the mountain. From there it is a 2-hour ridge walk east to the Brisen summit at 2,404 m, T3 with
    exposed sections. Counting the chairlift access you gain about 460 m. Descend the way you came, or continue down to Niederrickenbach via the Brisenhaus, roughly 4.5 hours total.
