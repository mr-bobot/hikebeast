- id: schrattenfluh-schratteflue-crossing
  name: Schratteflue crossing (advanced)
  start: Hirsegg parking (Marbachegg side)
  duration_min: 465
  sac_grade: T5
  effort_label: Expert
  description_extra: 'Start at the Hirsegg parking on the Marbachegg side. The full Schrattenfluh ridge runs about 6 km with four prominent peaks: Schibegütsch, Hängst, Hächle, and Strick.
    T5 with II scrambling. About 16 km and 7 h 45 in total, with ~1,050 m of cumulative climb and the same descent; the two end peaks (Hächle and Strick) are the more demanding sections.
    The plateau holds one of the largest karst fields in Switzerland with deep potholes off the marked line, so staying on the trail matters. Sure-footedness, a head for heights, and
    good visibility required.'
  visits:
  - schrattenfluh
  sources:
  - https://www.outdooractive.com/en/route/mountain-hike/district-entlebuch/schratteflue-crossing-for-advanced-hikers/801971278/
  quickest_for:
  - schrattenfluh
  equipment_list:
