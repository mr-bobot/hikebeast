<style>
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    min-height: 100dvh;
    background: #0c0c0d;
    color: #fff;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .hero {
    position: relative;
    width: 100vw;
    height: 100dvh;
    background-image: url('/images/home-hero-tannhorn.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }
  .hero::after {
    content: '';
    position: absolute;
    inset: auto 0 0 0;
    height: 60%;
    background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.45) 100%);
    pointer-events: none;
  }

  .hero-title {
    position: absolute;
    bottom: clamp(24px, 5vh, 56px);
    left: clamp(20px, 5vw, 56px);
    margin: 0;
    z-index: 2;
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    /* On narrow mobiles the title shares the bottom row with the CTA pill,
       so cap small-viewport size to leave room. Goes huge on tablet+. */
    font-size: clamp(32px, 8.5vw, 132px);
    line-height: 0.95;
    letter-spacing: -0.04em;
    color: rgba(255,255,255,0.88);
    /* Soft diffuse halo · multiple high-blur shadows stacked to create
       a wide, gentle glow around the title, like the reference. The
       white text is slightly translucent so the photo shows through
       just enough to feel embedded in the image. */
    text-shadow:
      0 0 24px rgba(0,0,0,0.35),
      0 6px 32px rgba(0,0,0,0.40),
      0 24px 72px rgba(0,0,0,0.35),
      0 48px 120px rgba(0,0,0,0.20);
    pointer-events: none;
    user-select: none;
  }

  .hero-cta {
    position: absolute;
    bottom: clamp(24px, 5vh, 56px);
    right: clamp(20px, 5vw, 56px);
    z-index: 2;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 18px;
    background: #fff;
    color: #0c0c0d;
    border-radius: 999px;
    text-decoration: none;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: clamp(13px, 1.6vw, 17px);
    letter-spacing: -0.005em;
    box-shadow:
      0 4px 18px rgba(0,0,0,0.20),
      0 12px 40px rgba(0,0,0,0.15);
    transition: transform 150ms ease, box-shadow 200ms ease;
    -webkit-tap-highlight-color: transparent;
  }
  .hero-cta:hover {
    transform: translateY(-1px);
    box-shadow:
      0 6px 24px rgba(0,0,0,0.25),
      0 16px 48px rgba(0,0,0,0.18);
  }
  .hero-cta:active { transform: translateY(0); }
  .hero-cta svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* Top-right pill row · login + lang switch. Subtle so they don't
     compete with the title. Login is for returning buyers who already
     have the guide. */
  .topnav {
    position: absolute;
    top: clamp(16px, 3vh, 28px);
    right: clamp(16px, 4vw, 32px);
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .topnav a {
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.08em;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(0,0,0,0.20);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    -webkit-tap-highlight-color: transparent;
    transition: background 150ms ease;
  }
  .topnav a:hover { background: rgba(0,0,0,0.32); }
  .topnav .login-link { letter-spacing: 0.04em; }
</style>

<body>
<main class="hero">
  <nav class="topnav" aria-label="Site">
    <a class="login-link" href="/login/">Login</a>
    <a class="lang-switch" href="/" hreflang="en" onclick="try{localStorage.setItem('hb_lang','en')}catch(e){}" aria-label="English version">EN</a>
  </nav>

  <h1 class="hero-title">Swiss Gems</h1>

  <a class="hero-cta" href="/de/map8/" data-fbq-event="ViewContent" data-fbq-params='{"content_name":"Swiss Gems of Switzerland Map","content_category":"Map","value":27.00,"currency":"CHF"}'>
    <span>Hol dir den Guide</span>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg>
  </a>
</main>

<script>
  document.querySelectorAll('[data-fbq-event]').forEach((el) => {
    el.addEventListener('click', () => {
      if (!window.fbq) return;
      const event = el.dataset.fbqEvent;
      let params = {};
      try { params = JSON.parse(el.dataset.fbqParams || '{}'); } catch {}
      fbq('track', event, params);
    });
  });
</script>
