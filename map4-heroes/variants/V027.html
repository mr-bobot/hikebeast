<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>V027</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@500&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; width:1400px; height:787px; overflow:hidden; background:#000; }
  .hero { position:relative; width:1400px; height:787px; overflow:hidden; }
  .hero img.photo {
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; object-position:50% 50%;
    display:block;
  }
  .scrim {
    position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 38%, rgba(0,0,0,0) 70%, rgba(0,0,0,0.42) 100%);
    pointer-events:none;
  }
  .meta-top {
    position:absolute;
    top:48px; left:80px; right:80px;
    display:flex; justify-content:space-between;
    color:rgba(255,255,255,0.78);
    font-family:'Inter', sans-serif;
    font-weight:500;
    font-size:12px;
    letter-spacing:0.36em;
    text-transform:uppercase;
  }
  .copy {
    position:absolute;
    left:50%; bottom:88px;
    transform:translateX(-50%);
    color:#f6efe1;
    text-align:center;
    max-width:1120px;
  }
  .price {
    margin:0;
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-weight:500;
    font-size:36px;
    letter-spacing:0.02em;
    color:#f6cf80;
    margin-bottom:8px;
  }
  .copy h1 {
    margin:0;
    font-family:'Playfair Display', serif;
    font-weight:500;
    font-size:78px;
    line-height:1.02;
    letter-spacing:-0.012em;
    text-shadow:0 2px 28px rgba(0,0,0,0.4);
  }
  .copy h1 .num {
    font-weight:700;
    font-style:italic;
  }
  .rule {
    width:1px; height:34px; background:rgba(246,239,225,0.55);
    margin:24px auto 0;
  }
</style>
</head>
<body>
  <div class="hero">
    <img class="photo" src="/map4-heroes/emotional/limmernsee1.jpg" alt="">
    <div class="scrim"></div>
    <div class="meta-top">
      <span>Swiss Gems</span>
      <span>Edition 26</span>
    </div>
    <div class="copy">
      <div class="price">27 CHF.</div>
      <h1>The <span class="num">141</span> places worth the walk.</h1>
      <div class="rule"></div>
    </div>
  </div>
</body>
</html>
