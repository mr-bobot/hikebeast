<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>V038</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; width:1400px; height:787px; overflow:hidden; background:#0a121b; }
  .hero { position:relative; width:1400px; height:787px; overflow:hidden; }
  .photo-wrap {
    position:absolute; inset:0;
    background:#0a121b;
  }
  .photo-wrap img {
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover; object-position:50% 40%;
    filter: grayscale(1) brightness(0.85) contrast(1.08);
    display:block;
  }
  .tone-shadow {
    position:absolute; inset:0;
    background: #0d1e30;
    mix-blend-mode: multiply;
    pointer-events:none;
  }
  .tone-highlight {
    position:absolute; inset:0;
    background: #8aa3bd;
    mix-blend-mode: lighten;
    opacity:0.65;
    pointer-events:none;
  }
  .tone-tint {
    position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(15,30,48,0.4) 0%, rgba(15,30,48,0.0) 35%, rgba(15,30,48,0.0) 60%, rgba(8,14,22,0.7) 100%);
    pointer-events:none;
  }
  .grain {
    position:absolute; inset:0;
    background-image:
      radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 3px 3px;
    mix-blend-mode: overlay;
    opacity:0.4;
    pointer-events:none;
  }
  .copy {
    position:absolute;
    left:0; right:0;
    bottom:88px;
    text-align:center;
    color:#e2dfd2;
    font-family:'EB Garamond', serif;
  }
  .copy .ornament {
    font-family:'EB Garamond', serif;
    font-size:18px;
    letter-spacing:0.5em;
    color: rgba(226,223,210,0.55);
    margin-bottom:22px;
  }
  .copy h1 {
    margin:0;
    font-weight:400;
    font-size: 84px;
    line-height: 1.0;
    letter-spacing: -0.005em;
    text-shadow: 0 2px 30px rgba(0,0,0,0.55);
  }
  .copy h1 .em { font-style: italic; }
  .copy .sub {
    margin-top: 28px;
    font-family:'Inter', sans-serif;
    font-weight:500;
    font-size:11px;
    letter-spacing:0.42em;
    text-transform:uppercase;
    color:rgba(226,223,210,0.55);
  }
  .corner-mark {
    position:absolute;
    top:42px;
    left:50%;
    transform: translateX(-50%);
    font-family:'Inter', sans-serif;
    font-size:10px;
    letter-spacing:0.5em;
    text-transform:uppercase;
    color: rgba(226,223,210,0.5);
  }
</style>
</head>
<body>
  <div class="hero">
    <div class="photo-wrap">
      <img src="/map4-heroes/emotional/hardgergrat%20camping.jpeg" alt="">
      <div class="tone-shadow"></div>
      <div class="tone-highlight"></div>
      <div class="tone-tint"></div>
      <div class="grain"></div>
    </div>

    <div class="corner-mark">Swiss Gems</div>

    <div class="copy">
      <div class="ornament">&#10047; &nbsp; &#10047; &nbsp; &#10047;</div>
      <h1>Die Alpen kennen<br><span class="em">ihre Lieblinge.</span></h1>
      <div class="sub">141 Spots</div>
    </div>
  </div>
</body>
</html>
