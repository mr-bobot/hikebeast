<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>V016</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; width:1400px; height:787px; overflow:hidden; background:#000; }
  .hero { position:relative; width:1400px; height:787px; overflow:hidden; }
  .photo {
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; object-position:50% 50%;
  }
  .scrim {
    position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0) 55%, rgba(0,0,0,0.55) 100%),
      linear-gradient(90deg, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0) 35%);
  }

  /* highlight ring drawn near where the finger might point — bottom-right area */
  .ring {
    position:absolute;
    right: 240px; bottom: 200px;
    width: 120px; height: 120px;
    border: 2px solid #ffd86b;
    border-radius: 50%;
    box-shadow: 0 0 0 6px rgba(255,216,107,0.18), 0 0 40px rgba(255,216,107,0.35);
    transform: rotate(-6deg);
  }
  .ring::after {
    content:"";
    position:absolute;
    inset: -2px;
    border: 2px dashed rgba(255,216,107,0.35);
    border-radius: 50%;
    transform: scale(1.18);
  }
  /* hand-drawn arrow from "there" word to the ring */
  .arrow {
    position:absolute;
    right: 320px; bottom: 280px;
    width: 240px; height: 120px;
    pointer-events:none;
  }
  .arrow path { stroke:#ffd86b; stroke-width:2.4; fill:none; stroke-linecap:round; }
  .arrow .head { stroke-width: 2.2; }

  .copy {
    position:absolute;
    left: 80px; bottom: 90px;
    color: #fbf6e8;
    max-width: 820px;
  }
  .copy h1 {
    margin: 0;
    font-family:'Instrument Serif', serif;
    font-weight: 400;
    font-size: 88px;
    line-height: 0.96;
    letter-spacing: -0.015em;
  }
  .copy h1 .a {
    display:inline-block;
    background: linear-gradient(180deg, transparent 62%, rgba(255,216,107,0.45) 62%, rgba(255,216,107,0.45) 88%, transparent 88%);
    padding: 0 6px;
  }
  .copy h1 .b {
    font-style: italic;
    color: #ffd86b;
  }
  .copy h1 .c {
    color: rgba(251,246,232,0.7);
    font-size: 56px;
    display:block;
    margin-top: 10px;
  }
  .badge {
    position:absolute;
    top: 56px; right: 80px;
    font-family:'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.3);
    padding: 8px 14px;
    border-radius: 999px;
    backdrop-filter: blur(6px);
  }
</style>
</head>
<body>
  <div class="hero">
    <img class="photo" src="/map4-heroes/emotional/pic%20de%20jallouvre.jpeg" alt="">
    <div class="scrim"></div>

    <div class="badge">141 unmarked spots</div>

    <div class="ring"></div>
    <svg class="arrow" viewBox="0 0 240 120">
      <path d="M 8 16 C 60 26, 110 30, 168 64" />
      <path class="head" d="M 156 50 L 174 66 L 158 78" />
    </svg>

    <div class="copy">
      <h1>
        <span class="a">There.</span>
        <span class="b">That one.</span>
        <span class="c">You've never heard of it.</span>
      </h1>
    </div>
  </div>
</body>
</html>
