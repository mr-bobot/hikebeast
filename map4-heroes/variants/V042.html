<!-- V042 · Nostalgia · sepia · layout=polaroid-single · treatment=cross-process · img=/map4-heroes/emotional/stoos_kapelle2.jpg -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>V042</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; width:1400px; height:787px; overflow:hidden;
    background:#ede4d1;
  }
  .hero { position:relative; width:1400px; height:787px; overflow:hidden;
    background:
      radial-gradient(ellipse at 40% 45%, #f1e9d6 0%, #e3d8c0 65%, #c6b896 100%);
  }
  /* large polaroid */
  .polaroid {
    position:absolute;
    top:62px; left:380px;
    width:640px;
    background:#f8f1de;
    padding:30px 30px 96px 30px;
    box-shadow:
      0 28px 64px rgba(50,35,15,0.4),
      0 6px 14px rgba(50,35,15,0.2);
    transform:rotate(-3.4deg);
  }
  .polaroid .frame {
    width:100%; aspect-ratio:1/1;
    overflow:hidden;
    position:relative;
    background:#222;
  }
  .polaroid .frame img {
    width:100%; height:100%;
    object-fit:cover; object-position:50% 50%;
    display:block;
  }
  /* cross-process feel via filter + svg color matrix layer */
  .polaroid .frame img {
    filter: contrast(1.15) saturate(1.35) hue-rotate(-8deg) sepia(0.18);
  }
  .polaroid .frame::after {
    content:""; position:absolute; inset:0;
    background:
      radial-gradient(ellipse at 30% 30%, rgba(255,180,80,0.18) 0%, transparent 50%),
      linear-gradient(160deg, rgba(20,40,90,0.18) 0%, transparent 40%, rgba(255,140,40,0.14) 100%);
    mix-blend-mode:screen;
  }
  .polaroid .frame::before {
    content:""; position:absolute; inset:0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(20,10,0,0.45) 100%);
    z-index:2;
  }
  .polaroid .cap {
    position:absolute;
    bottom:34px; left:0; right:0;
    text-align:center;
    font-family:'Caveat', cursive;
    font-size:34px;
    color:#3a2c14;
    letter-spacing:0.005em;
  }
  /* tape strips */
  .tape {
    position:absolute;
    width:120px; height:34px;
    background: rgba(220,200,140,0.45);
    box-shadow: inset 0 0 0 1px rgba(180,150,80,0.25);
  }
  .tape.t1 { top:36px; left:560px; transform:rotate(-8deg); }
  .tape.t2 { top:712px; left:850px; transform:rotate(6deg); }
  /* paper grain */
  .grain { position:absolute; inset:0; pointer-events:none; opacity:0.6; mix-blend-mode:multiply; }
</style>
</head>
<body>
  <div class="hero">
    <div class="tape t1"></div>
    <div class="polaroid">
      <div class="frame"><img src="/map4-heroes/emotional/stoos_kapelle2.jpg" alt=""></div>
      <div class="cap">Switzerland, before the algorithm.</div>
    </div>
    <div class="tape t2"></div>

    <svg class="grain" width="1400" height="787" xmlns="http://www.w3.org/2000/svg">
      <filter id="g42">
        <feTurbulence type="fractalNoise" baseFrequency="1.1" numOctaves="2" stitchTiles="stitch"/>
        <feColorMatrix values="0 0 0 0 0.25  0 0 0 0 0.18  0 0 0 0 0.08  0 0 0 0.4 0"/>
      </filter>
      <rect width="100%" height="100%" filter="url(#g42)"/>
    </svg>
  </div>
</body>
</html>
