<!DOCTYPE html>

<head>

<style>

    position:absolute; inset:0;

  }
  .copy {
    position:absolute;
    left:0; right:0;

    color:#f4f1ea;
    text-shadow: 0 2px 30px rgba(0,0,0,0.5);
  }
  .copy h1 {
    margin:0;
    font-family:'Cormorant Garamond', serif;
    font-weight:300;
    font-size:78px;
    line-height:1.04;
    letter-spacing:0.005em;
  }
  .copy h1 .em {
    font-style:italic;
    font-weight:400;
  }
  .rule {
    width:64px; height:1px;
    background:rgba(244,241,234,0.5);
    margin:34px auto 0;
  }
  .foot {
    position:absolute;
    bottom:38px;
    left:0; right:0;
    text-align:center;
    font-family:'Inter', sans-serif;
    font-weight:400;
    font-size:12px;
    letter-spacing:0.42em;
    text-transform:uppercase;
    color:rgba(244,241,234,0.55);
  }
</style>
</head>
<body>
  <div class="hero">
    <img class="photo" src="/map4-heroes/emotional/seealpsee.jpeg" alt="">

    <div class="copy">
      <h1>Genug Platz <span class="em">für genau dich.</span></h1>
      <div class="rule"></div>
    </div>
    <div class="foot">Seealpsee, ein Mensch.</div>
