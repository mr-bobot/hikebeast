<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>V008</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; width:1400px; height:787px; overflow:hidden; background:#0a0a0a; font-family:'Inter',sans-serif; }
  .hero { position:relative; width:1400px; height:787px; overflow:hidden; display:flex; }
  .half { position:relative; width:700px; height:787px; overflow:hidden; flex: 0 0 700px; }
  .half img {
    width:100%; height:100%;
    object-fit:cover; object-position:50% 50%;
    display:block;
  }
  .label {
    position:absolute;
    top: 40px;
    font-family:'Inter', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.38em;
    color: #fff;
    text-transform:uppercase;
    padding: 6px 12px;
    border: 1px solid rgba(255,255,255,0.75);
  }
  .left .label { left: 40px; }
  .right .label { right: 40px; background: rgba(0,0,0,0.6); }
  .left .tag {
    position:absolute;
    bottom: 56px; left: 40px;
    font-family:'Inter', sans-serif;
    font-weight: 500;
    font-size: 16px;
    color: rgba(255,255,255,0.85);
  }
  .right .tag {
    position:absolute;
    bottom: 56px; right: 40px;
    font-family:'Inter', sans-serif;
    font-weight: 500;
    font-size: 16px;
    color: rgba(255,255,255,0.85);
    text-align:right;
  }
  .center-card {
    position:absolute;
    left:50%; top:50%;
    transform: translate(-50%, -50%);
    width: 480px;
    background:#fff;
    color:#0a0a0a;
    padding: 36px 40px 32px 40px;
    box-sizing:border-box;
    text-align:center;
    box-shadow: 0 20px 80px rgba(0,0,0,0.45);
  }
  .center-card h1 {
    font-family:'Inter', sans-serif;
    font-weight: 800;
    font-size: 58px;
    line-height: 0.96;
    letter-spacing: -0.04em;
    margin: 0 0 14px 0;
  }
  .center-card .sub {
    font-family:'Inter', sans-serif;
    font-weight: 400;
    font-size: 16px;
    line-height: 1.4;
    color: #444;
  }
  .vs {
    position:absolute;
    top:50%; left:50%;
    transform: translate(-50%, -50%);
    font-family:'Inter', sans-serif;
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.4);
    z-index: 0;
    display:none;
  }
  .seam {
    position:absolute;
    left:700px; top:0; bottom:0;
    width:1px;
    background: rgba(255,255,255,0.18);
  }
</style>
</head>
<body>
  <div class="hero">
    <div class="half left">
      <img src="/map4-heroes/emotional/tannhorn.jpeg" alt="">
    </div>
    <div class="half right">
      <img src="/map4-heroes/spots/zermatt_village/main.jpg" alt="">
    </div>
    <div class="seam"></div>
    <div class="center-card">
      <h1>Choose<br>your Tuesday.</h1>
      <div class="sub">Office or alps. Same week, two endings.</div>
    </div>
  </div>
</body>
</html>
