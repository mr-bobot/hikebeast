<style>

    object-fit:cover; object-position:60% 50%;

  }
  .scrim {
    position:absolute; inset:0;

    position:absolute;
    left:0; right:0;

    text-align:center;
    color:#fff;
  }
  .copy h1 {
    margin:0;
    font-family:'Inter', sans-serif;
    font-weight:900;
    font-size:184px;
    line-height:0.92;
    letter-spacing:-0.05em;
    text-shadow: 0 6px 50px rgba(0,0,0,0.4);
  }
  .copy h1 .em {
    font-weight:400;
    font-style:italic;
    color:rgba(255,255,255,0.86);
  }
  .meta {
    position:absolute;
    top:64px;
    left:0; right:0;
    text-align:center;
    font-family:'Inter', sans-serif;
    font-weight:700;
    font-size:12px;
    letter-spacing:0.5em;
    text-transform:uppercase;
    color:rgba(255,255,255,0.78);
    text-shadow: 0 1px 14px rgba(0,0,0,0.4);
  }
  .meta::before, .meta::after {
    content:"";
    display:inline-block;
    width:42px; height:1px;
    background:rgba(255,255,255,0.5);
    vertical-align:middle;
    margin: 0 22px;
  }
  .foot {
    position:absolute;
    bottom:52px;
    left:0; right:0;
    text-align:center;
    font-family:'Inter', sans-serif;
    font-weight:500;
    font-size:13px;
    letter-spacing:0.36em;
    text-transform:uppercase;
    color:rgba(255,255,255,0.78);

<body>
  <div class="hero">
    <img class="photo" src="/map4-heroes/emotional/rosenlaui.jpg" alt="">
