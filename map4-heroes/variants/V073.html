<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>V073</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; width:1400px; height:787px; overflow:hidden; font-family:'Inter', sans-serif; }
  .hero { position:relative; width:1400px; height:787px; background:#000; }
  .hero img.bg { width:100%; height:100%; object-fit:cover; object-position:50% 45%; display:block; }
  .grad { position:absolute; inset:0; background:linear-gradient(105deg, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.2) 38%, rgba(0,0,0,0) 60%); pointer-events:none; }
  .grad-b { position:absolute; left:0; right:0; bottom:0; height:50%; background:linear-gradient(to top, rgba(0,0,0,0.65), rgba(0,0,0,0)); pointer-events:none; }
  /* left vertical column */
  .stamp-col { position:absolute; left:50px; top:50%; transform:translateY(-50%); writing-mode:vertical-rl; font-family:'Inter', sans-serif; font-size:11px; letter-spacing:0.5em; text-transform:uppercase; color:rgba(255,255,255,0.6); font-weight:600; }
  .stamp-col span { display:inline-block; padding-top:14px; }
  /* main headline left half */
  .copy { position:absolute; left:120px; top:80px; bottom:80px; width:760px; display:flex; flex-direction:column; justify-content:center; }
  .crossout { font-family:'Fraunces', serif; font-size:28px; font-style:italic; color:rgba(255,255,255,0.55); margin-bottom:22px; text-decoration:line-through; text-decoration-color:rgba(255,210,150,0.7); }
  .head { font-family:'Fraunces', serif; font-weight:300; font-size:72px; line-height:1.02; letter-spacing:-0.02em; color:#fff; }
  .head em { font-style:italic; font-weight:500; color:#ffd28a; }
  .div { margin:34px 0; height:1px; background:rgba(255,255,255,0.45); width:140px; }
  .small { font-family:'Inter', sans-serif; font-size:14px; line-height:1.6; color:rgba(255,255,255,0.78); max-width:520px; }
  .small strong { color:#fff; font-weight:600; }
  /* clock badge bottom right */
  .clock { position:absolute; right:80px; bottom:80px; width:200px; height:200px; border-radius:50%; background:rgba(20,20,16,0.55); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.2); display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .clock .num { font-family:'Fraunces', serif; font-weight:300; font-size:64px; color:#fff; letter-spacing:-0.02em; line-height:1; }
  .clock .num .colon { color:#ffd28a; }
  .clock .label { font-size:10px; letter-spacing:0.36em; text-transform:uppercase; color:rgba(255,255,255,0.7); margin-top:8px; }
  .clock .ring { position:absolute; inset:8px; border-radius:50%; border:0.5px solid rgba(255,255,255,0.25); }
  .clock .tick { position:absolute; left:50%; top:8px; width:1px; height:8px; background:rgba(255,255,255,0.6); transform-origin:50% 92px; }
  /* corner */
  .corner-t { position:absolute; top:40px; right:80px; color:rgba(255,255,255,0.7); font-size:11px; letter-spacing:0.36em; text-transform:uppercase; font-weight:500; }
</style>
</head>
<body>
  <div class="hero">
    <img class="bg" src="/map4-heroes/emotional/riffelsee4.jpg" alt="">
    <div class="grad"></div>
    <div class="grad-b"></div>
    <div class="stamp-col"><span>Riffelsee · Zermatt · 06:12 Uhr · Sommer 2026</span></div>
    <div class="corner-t">2757 m · vor dem ersten Liftgast</div>
    <div class="copy">
      <div class="crossout">Du brauchst den langen Urlaub …</div>
      <div class="head">Du brauchst<br>nicht den <em>langen Urlaub</em>.<br>Du brauchst<br><em>diesen Morgen</em>.</div>
      <div class="div"></div>
      <div class="small">Eine Tasse Kaffee, ein Stativ, Matterhorn-Spiegel.<br><strong>Vier Stunden auf, eine ganze Woche im Kopf.</strong></div>
    </div>
    <div class="clock">
      <div class="ring"></div>
      <div class="tick" style="transform:rotate(0deg)"></div>
      <div class="tick" style="transform:rotate(90deg)"></div>
      <div class="tick" style="transform:rotate(180deg)"></div>
      <div class="tick" style="transform:rotate(270deg)"></div>
      <div class="num">06<span class="colon">:</span>12</div>
      <div class="label">der Morgen</div>
    </div>
  </div>
</body>
</html>
