<!DOCTYPE html>

<head>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  html, body { margin:0; padding:0; width:1400px; height:787px; overflow:hidden; background:#0a0a0a; }
  .hero { position:relative; width:1400px; height:787px; overflow:hidden; }

    opacity:0.85;
    pointer-events:none;
  }
  .vignette {
    position:absolute; inset:0;
    background: radial-gradient(ellipse at 50% 52%, rgba(0,0,0,0) 60%, rgba(0,0,0,0.45) 100%);
    pointer-events:none;
  }
  /* horizon-line bar where the type sits */

    position:absolute;
    left:0; right:0;
    top:412px;
    height:1px;
    background:linear-gradient(90deg, rgba(244,236,217,0) 0%, rgba(244,236,217,0.4) 18%, rgba(244,236,217,0.4) 82%, rgba(244,236,217,0) 100%);

    left:0; right:0;
    top:340px;
    text-align:center;
    color:#f1e5cc;
  }
  .copy h1 {
    font-family:'Cormorant Garamond', serif;
    font-weight:300;
    font-style:italic;
    font-size:50px;
    line-height:1.16;
    letter-spacing:0.005em;
    margin:0 auto;
    max-width:1080px;
    text-shadow: 0 1px 22px rgba(0,0,0,0.5);
  }
  .copy h1 .neverhad {
    font-weight:400;
    font-style:normal;
    letter-spacing:-0.005em;
  }
  .tick-l, .tick-r {
    position:absolute;
    top:412px;
    width:8px; height:8px;
