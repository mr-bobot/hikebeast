<!-- V013 · Belonging · tribe · layout=polaroid-collage · treatment=grain · img=/map4-heroes/emotional/riffelsee4.jpg -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>V013</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; width:1400px; height:787px; overflow:hidden; background:#e6dfd0; }
  .hero { position:relative; width:1400px; height:787px; overflow:hidden;
    background:
      radial-gradient(circle at 20% 0%, #f0e8d5, transparent 60%),
      radial-gradient(circle at 100% 100%, #d8cdb4, transparent 60%),
      #e6dfd0;
  }
  /* paper grain texture using svg noise */
  .paper-grain {
    position:absolute; inset:0;
    background-image:
      radial-gradient(rgba(80,60,30,0.06) 1px, transparent 1px),
      radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 4px 4px, 6px 6px;
    background-position: 0 0, 2px 2px;
    pointer-events:none;
    opacity: 0.9;
  }

  .polaroid {
    position:absolute;
    background:#fff;
    padding: 10px 10px 36px 10px;
    box-shadow: 0 18px 30px rgba(0,0,0,0.18), 0 4px 8px rgba(0,0,0,0.1);
    box-sizing: content-box;
  }
  .polaroid .frame {
    position:relative;
    overflow:hidden;
    background:#222;
  }
  .polaroid img {
    width:100%; height:100%;
    object-fit:cover; object-position:50% 50%;
    display:block;
    filter: saturate(0.92) contrast(1.02);
  }
  .polaroid .grain {
    position:absolute; inset:0;
    background-image:
      radial-gradient(rgba(0,0,0,0.18) 1px, transparent 1px),
      radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
    background-size: 3px 3px, 5px 5px;
    background-position: 0 0, 1px 1px;
    mix-blend-mode: overlay;
    pointer-events:none;
  }
  .polaroid .caption {
    position:absolute;
    left:10px; right:10px; bottom: 6px;
    text-align:center;
    font-family:'Caveat', cursive;
    font-weight:500;
    font-size: 18px;
    color: #555;
  }

  /* layout 6 polaroids */
  .p1 { left: 60px;  top: 70px;   width: 280px; transform: rotate(-7deg); }
  .p1 .frame { width: 280px; height: 200px; }

  .p2 { left: 290px; top: 110px;  width: 290px; transform: rotate(3deg); }
  .p2 .frame { width: 290px; height: 240px; }

  .p3 { left: 100px; top: 410px;  width: 240px; transform: rotate(5deg); }
  .p3 .frame { width: 240px; height: 220px; }

  .p4 { left: 340px; top: 480px;  width: 230px; transform: rotate(-4deg); z-index: 5; }
  .p4 .frame { width: 230px; height: 200px; }

  /* hero polaroid Riffelsee (front and center) */
  .hero-pol { left: 620px; top: 170px;  width: 380px; transform: rotate(-2deg); z-index: 8; }
  .hero-pol .frame { width: 380px; height: 320px; }
  .hero-pol .caption { font-family:'Caveat', cursive; font-size: 22px; }

  .p5 { left: 980px;  top: 60px;   width: 260px; transform: rotate(6deg); }
  .p5 .frame { width: 260px; height: 220px; }
  .p6 { left: 1060px; top: 380px;  width: 270px; transform: rotate(-5deg); }
  .p6 .frame { width: 270px; height: 240px; }

  .note {
    position:absolute;
    left: 720px; top: 600px;
    transform: rotate(-3deg);
    background: #ffe98a;
    padding: 18px 22px;
    box-shadow: 0 14px 26px rgba(0,0,0,0.18);
    max-width: 460px;
    font-family:'Caveat', cursive;
    font-weight: 600;
    font-size: 32px;
    line-height: 1.08;
    color:#3a2c0a;
    z-index: 12;
  }
  .tape {
    position:absolute;
    width: 60px; height: 22px;
    background: rgba(255,255,255,0.55);
    border-left: 1px dashed rgba(0,0,0,0.12);
    border-right: 1px dashed rgba(0,0,0,0.12);
  }
  .tape.t1 { left: 680px; top: 158px; transform: rotate(-12deg); z-index: 9; }
  .tape.t2 { left: 1080px; top: 50px;  transform: rotate(18deg); z-index: 9; }
</style>
</head>
<body>
  <div class="hero">
    <div class="paper-grain"></div>

    <div class="polaroid p1">
      <div class="frame">
        <img src="/map4-heroes/spots/oeschinensee/main.jpg" alt="">
        <div class="grain"></div>
      </div>
    </div>

    <div class="polaroid p2">
      <div class="frame">
        <img src="/map4-heroes/spots/rosenlaui/main.jpg" alt="">
        <div class="grain"></div>
      </div>
    </div>

    <div class="polaroid p3">
      <div class="frame">
        <img src="/map4-heroes/spots/limmernsee/main.jpg" alt="">
        <div class="grain"></div>
      </div>
    </div>

    <div class="polaroid p4">
      <div class="frame">
        <img src="/map4-heroes/spots/lac_de_taney/main.jpg" alt="">
        <div class="grain"></div>
      </div>
    </div>

    <div class="tape t1"></div>
    <div class="polaroid hero-pol">
      <div class="frame">
        <img src="/map4-heroes/emotional/riffelsee4.jpg" alt="">
        <div class="grain"></div>
      </div>
    </div>

    <div class="tape t2"></div>
    <div class="polaroid p5">
      <div class="frame">
        <img src="/map4-heroes/spots/bachalpsee/main.jpg" alt="">
        <div class="grain"></div>
      </div>
    </div>

    <div class="polaroid p6">
      <div class="frame">
        <img src="/map4-heroes/spots/seealpsee/main.jpg" alt="">
        <div class="grain"></div>
      </div>
    </div>

    <div class="note">Du bist nicht der Einzige,<br>der das sucht.</div>
  </div>
</body>
</html>
