<!-- V006 · Freedom · weightless · layout=sun-flare · treatment=sun-flare-boost · img=/map4-heroes/emotional/tannhorn.jpeg -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>V006</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; width:1400px; height:787px; overflow:hidden; background:#000; }
  .hero { position:relative; width:1400px; height:787px; overflow:hidden; }
  .hero img.photo {
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; object-position:50% 50%;
    display:block;
    filter: saturate(1.18) contrast(1.05);
  }
  /* sun flare boost from right */
  .flare-r {
    position:absolute; inset:0;
    background:
      radial-gradient(circle at 92% 38%, rgba(255,234,170,0.85) 0%, rgba(255,210,140,0.42) 14%, rgba(255,180,90,0.18) 28%, rgba(255,180,90,0) 50%);
    mix-blend-mode: screen;
    pointer-events:none;
  }
  .flare-haze {
    position:absolute; inset:0;
    background:
      radial-gradient(circle at 78% 48%, rgba(255,235,180,0.22) 0%, rgba(255,235,180,0) 60%);
    mix-blend-mode: screen;
    pointer-events:none;
  }
  /* warm bottom-left lift */
  .warm {
    position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 50%, rgba(40,20,0,0.35) 100%);
    pointer-events:none;
  }
  .copy {
    position:absolute;
    left: 64px; bottom: 64px;
    max-width: 780px;
    color:#fff;
  }
  h1 {
    font-family:'Archivo', sans-serif;
    font-weight:800;
    font-size: 96px;
    line-height: 0.96;
    letter-spacing:-0.035em;
    margin:0;
    color:#fff;
    text-shadow: 0 2px 20px rgba(40,20,0,0.45);
  }
  .arrow {
    margin-top: 26px;
    width: 110px; height: 1px; background:#fff;
    position:relative;
  }
  .arrow:after{
    content:""; position:absolute; right:-1px; top:-5px;
    width: 11px; height: 11px;
    border-top:1px solid #fff; border-right:1px solid #fff;
    transform: rotate(45deg);
  }
</style>
</head>
<body>
  <div class="hero">
    <img class="photo" src="/map4-heroes/emotional/tannhorn.jpeg" alt="">
    <div class="flare-haze"></div>
    <div class="flare-r"></div>
    <div class="warm"></div>
    <div class="copy">
      <h1>Geh weiter<br>als die Markierung.</h1>
      <div class="arrow"></div>
    </div>
  </div>
</body>
</html>
