<!-- V047 · Anticipation · brewing · layout=full-bleed · treatment=none · img=/map4-heroes/emotional/riffelsee4.jpg -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>V047</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; width:1400px; height:787px; overflow:hidden; background:#000; }
  .hero { position:relative; width:1400px; height:787px; overflow:hidden; }
  .photo {
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; object-position:50% 45%;
    display:block;
  }
  .scrim {
    position:absolute; inset:0;
    background:
      linear-gradient(90deg, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.18) 38%, rgba(0,0,0,0) 60%);
    pointer-events:none;
  }
  /* left-side stacked agenda layout */
  .agenda {
    position:absolute;
    left:80px; top:120px;
    width:580px;
    color:#fff;
  }
  .clock {
    font-family:'JetBrains Mono', monospace;
    font-weight:500;
    font-size:13px;
    letter-spacing:0.4em;
    color: rgba(255,217,161,0.9);
    margin-bottom:24px;
  }
  .clock .dot {
    display:inline-block; width:8px; height:8px; border-radius:50%;
    background:#ffd49a; margin-right:14px; vertical-align:middle;
    box-shadow: 0 0 18px rgba(255,212,154,0.9);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.45;} }
  h1 {
    margin:0;
    font-family:'Fraunces', serif;
    font-weight:300;
    font-size:96px;
    line-height:0.96;
    letter-spacing:-0.022em;
    text-shadow: 0 4px 40px rgba(0,0,0,0.5);
  }
  h1 .pack {
    font-style:italic;
    font-weight:500;
    color:#fbe2b2;
  }
  .sub {
    margin-top:38px;
    padding-top:24px;
    border-top: 1px solid rgba(255,235,200,0.34);
    font-family:'Fraunces', serif;
    font-weight:300;
    font-style:italic;
    font-size:30px;
    line-height:1.3;
    color: rgba(255,245,224,0.92);
  }
  .sub b {
    font-style:normal;
    font-weight:500;
    color:#ffd49a;
  }
  /* tiny ticket strip bottom */
  .ticket {
    position:absolute;
    left:80px; bottom:46px;
    display:flex; gap:0;
    color: rgba(255,245,224,0.78);
    font-family:'JetBrains Mono', monospace;
    font-weight:400;
    font-size:11px;
    letter-spacing:0.32em;
  }
  .ticket .seg {
    padding: 12px 22px;
    border:1px solid rgba(255,235,200,0.35);
    border-right:none;
  }
  .ticket .seg:last-child {
    border-right:1px solid rgba(255,235,200,0.35);
    color:#ffd49a;
  }
</style>
</head>
<body>
  <div class="hero">
    <img class="photo" src="/map4-heroes/emotional/riffelsee4.jpg" alt="">
    <div class="scrim"></div>

    <div class="agenda">
      <div class="clock"><span class="dot"></span>NEXT EVENT · 05:42</div>
      <h1>Set the alarm.<br><span class="pack">Pack the coffee.</span></h1>
      <div class="sub">The <b>Matterhorn</b> shows up at <b>5:42</b>.</div>
    </div>

    <div class="ticket">
      <div class="seg">RIFFELSEE</div>
      <div class="seg">2'757 M</div>
      <div class="seg">N 45°59' · E 7°45'</div>
      <div class="seg">SUNRISE 05:42</div>
    </div>
  </div>
</body>
</html>
