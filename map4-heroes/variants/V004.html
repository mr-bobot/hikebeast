<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>V004</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; width:1400px; height:787px; overflow:hidden; background:#0a0907; }
  .hero { position:relative; width:1400px; height:787px; overflow:hidden; }
  .hero img.photo {
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; object-position:50% 50%;
    display:block;
  }
  /* dark vignette like inside-the-tent feel */
  .aperture {
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse 88% 75% at 50% 52%, transparent 38%, rgba(0,0,0,0.35) 64%, rgba(0,0,0,0.85) 100%);
    pointer-events:none;
  }
  .copy {
    position:absolute;
    left:62px;
    bottom:54px;
    max-width:560px;
    color:#e9dfc9;
  }
  .copy .mini {
    font-family:'Inter', sans-serif;
    font-size:11px;
    letter-spacing:0.36em;
    color: rgba(233,223,201,0.55);
    text-transform:uppercase;
    margin-bottom: 14px;
  }
  .copy h1 {
    font-family:'EB Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 44px;
    line-height: 1.18;
    letter-spacing:-0.005em;
    margin:0;
    color:#f0e7d2;
    text-shadow: 0 1px 30px rgba(0,0,0,0.6);
  }
  .copy h1 b {
    font-style: normal;
    font-weight: 500;
    color:#fff;
  }
  .corner-r {
    position:absolute;
    right: 56px; bottom: 54px;
    width: 1px; height: 80px;
    background: rgba(233,223,201,0.45);
  }
</style>
</head>
<body>
  <div class="hero">
    <img class="photo" src="/map4-heroes/emotional/camping_cheserys.jpg" alt="">
    <div class="aperture"></div>
    <div class="copy">
      <h1>Du bist nicht <b>zu spät</b>.<br>Du bist nur am falschen Ort.</h1>
    </div>
    <div class="corner-r"></div>
  </div>
</body>
</html>
