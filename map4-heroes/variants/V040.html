<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>V040</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; width:1400px; height:787px; overflow:hidden; background:#1a120a; }
  .hero { position:relative; width:1400px; height:787px; overflow:hidden; background:#1a120a; }
  .canvas {
    position:absolute; inset:0;
    overflow:hidden;
  }
  .canvas img {
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover; object-position:50% 50%;
    filter:
      saturate(0.78)
      brightness(0.6)
      contrast(1.45)
      sepia(0.35)
      hue-rotate(-8deg)
      blur(1.2px);
    display:block;
  }
  .strokes-h {
    position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(2deg,
        rgba(255,235,200,0.04) 0 1px,
        transparent 1px 5px,
        rgba(20,10,4,0.08) 5px 7px,
        transparent 7px 14px);
    mix-blend-mode: overlay;
    pointer-events:none;
  }
  .strokes-d {
    position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(-22deg,
        rgba(255,210,150,0.05) 0 2px,
        transparent 2px 9px,
        rgba(30,15,8,0.07) 9px 11px,
        transparent 11px 22px);
    mix-blend-mode: overlay;
    pointer-events:none;
  }
  .strokes-v {
    position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(91deg,
        rgba(255,235,200,0.03) 0 1px,
        transparent 1px 8px);
    mix-blend-mode: soft-light;
    pointer-events:none;
  }
  .glow {
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 28%, rgba(255,180,90,0.32) 0%, rgba(255,160,80,0.10) 35%, rgba(0,0,0,0) 60%),
      linear-gradient(180deg, rgba(255,200,120,0.08) 0%, rgba(0,0,0,0) 35%, rgba(0,0,0,0.55) 100%);
    pointer-events:none;
  }
  .vignette {
    position:absolute; inset:0;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0) 30%, rgba(0,0,0,0.6) 95%);
    pointer-events:none;
  }
  .craquelure {
    position:absolute; inset:0;
    background-image:
      radial-gradient(rgba(0,0,0,0.06) 1px, transparent 1.5px),
      radial-gradient(rgba(255,210,150,0.04) 1px, transparent 1.5px);
    background-size: 7px 7px, 11px 11px;
    background-position: 0 0, 3px 5px;
    mix-blend-mode: overlay;
    opacity: 0.7;
    pointer-events:none;
  }
  .frame {
    position:absolute;
    inset:24px;
    border:14px solid;
    border-image: linear-gradient(135deg, #8a6a30 0%, #d8b06a 30%, #4a3617 60%, #d8b06a 80%, #6e4f1f 100%) 1;
    pointer-events:none;
    box-shadow:
      inset 0 0 80px rgba(0,0,0,0.5),
      0 0 0 4px rgba(0,0,0,0.4),
      0 30px 60px rgba(0,0,0,0.7);
  }
  .plaque {
    position:absolute;
    left:50%;
    bottom: 64px;
    transform: translateX(-50%);
    text-align:center;
    color:#f3e3c2;
    font-family:'Cormorant Garamond', serif;
    max-width: 1080px;
  }
  .plaque h1 {
    margin:0;
    font-style:italic;
    font-weight:500;
    font-size:62px;
    line-height:1.05;
    letter-spacing:0.005em;
    color: #f5e6c4;
    text-shadow:
      0 2px 4px rgba(0,0,0,0.8),
      0 0 30px rgba(80,30,0,0.6);
  }
  .plaque h1 .roman {
    font-style:normal;
    font-weight:600;
    color:#e3b86a;
  }
  .signature {
    margin-top:22px;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:18px;
    letter-spacing:0.18em;
    color: rgba(243,227,194,0.58);
  }
  .signature span { color:#e3b86a; }
  .titlecard {
    position:absolute;
    top: 56px;
    left:50%;
    transform: translateX(-50%);
    font-family:'Cormorant Garamond', serif;
    font-size: 14px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: rgba(227,184,106,0.78);
  }
</style>
</head>
<body>
  <div class="hero">
    <div class="canvas">
      <img src="/map4-heroes/emotional/lac%20de%20cheserys.jpeg" alt="">
      <div class="glow"></div>
      <div class="strokes-h"></div>
      <div class="strokes-d"></div>
      <div class="strokes-v"></div>
      <div class="craquelure"></div>
      <div class="vignette"></div>
    </div>
    <div class="frame"></div>

    <div class="titlecard">Cheserys &middot; Studie No. III</div>

    <div class="plaque">
      <h1><span class="roman">Vor uns malten sie.</span><br><em>Jetzt wandern wir.</em></h1>
      <div class="signature">Swiss Gems &nbsp;&middot;&nbsp; <span>141</span> &nbsp;&middot;&nbsp; L. Helg</div>
    </div>
  </div>
</body>
</html>
