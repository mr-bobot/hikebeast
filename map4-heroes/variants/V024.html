<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>V024</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; width:1400px; height:787px; overflow:hidden; background:#f5efe3; }
  .hero { position:relative; width:1400px; height:787px; overflow:hidden; background:#f5efe3; }
  .paper {
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse at 30% 30%, #f9f2e4 0%, #ece2cd 70%, #d9cdb2 100%);
  }
  .paint-frame {
    position:absolute;
    left:80px; top:60px; right:80px; bottom:140px;
    overflow:hidden;
    -webkit-mask-image: radial-gradient(ellipse at 50% 50%, rgba(0,0,0,1) 60%, rgba(0,0,0,0.85) 80%, rgba(0,0,0,0) 100%);
            mask-image: radial-gradient(ellipse at 50% 50%, rgba(0,0,0,1) 60%, rgba(0,0,0,0.85) 80%, rgba(0,0,0,0) 100%);
  }
  .paint-frame img {
    width:100%; height:100%;
    object-fit:cover; object-position:50% 60%;
    filter: url(#watercolor) saturate(0.78);
    display:block;
  }
  .paint-frame::after {
    content:"";
    position:absolute; inset:0;
    background:
      linear-gradient(135deg, rgba(245,239,227,0.18), rgba(245,239,227,0) 30%, rgba(245,239,227,0) 70%, rgba(245,239,227,0.32) 100%);
    mix-blend-mode:soft-light;
    pointer-events:none;
  }
  .title {
    position:absolute;
    left:80px; bottom:60px;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:300;
    font-size:62px;
    line-height:1;
    letter-spacing:-0.005em;
    color:#3a3424;
    max-width:900px;
  }
  .sig {
    position:absolute;
    right:96px; bottom:68px;
    font-family:'Caveat', cursive;
    font-weight:600;
    color:#7a6a4a;
    font-size:28px;
    transform:rotate(-3deg);
  }
</style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute">
    <filter id="watercolor" x="0" y="0" width="100%" height="100%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.6" result="blur"/>
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="3" result="turb"/>
      <feDisplacementMap in="blur" in2="turb" scale="14" xChannelSelector="R" yChannelSelector="G" result="disp"/>
      <feComponentTransfer in="disp">
        <feFuncR type="discrete" tableValues="0.05 0.18 0.34 0.5 0.66 0.82 0.96"/>
        <feFuncG type="discrete" tableValues="0.05 0.18 0.34 0.5 0.66 0.82 0.96"/>
        <feFuncB type="discrete" tableValues="0.05 0.18 0.34 0.5 0.66 0.82 0.96"/>
      </feComponentTransfer>
    </filter>
  </svg>
  <div class="hero">
    <div class="paper"></div>
    <div class="paint-frame">
      <img src="/map4-heroes/emotional/LOST7855-Edit.jpeg" alt="">
    </div>
    <div class="title">Bewegung ohne Eile.</div>
    <div class="sig">leon, juni</div>
  </div>
</body>
</html>
