    width:720px; height:660px;
    display:grid;

  .tile {

  }
  .tile img {

    display:flex; align-items:center;
    padding:0 12px;
    gap:8px;
    z-index:2;
  }
  .tile .avatar {
    width:22px; height:22px; border-radius:50%;
    background: linear-gradient(135deg, #f6c453, #c1452a);
    border:1.5px solid #fff;
    flex-shrink:0;
  }
  .tile .handle {
    font-size:11px;
    font-weight:600;
    color:#fff;
    letter-spacing:0.02em;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  }
  .tile .handle .dot {
    color:rgba(255,255,255,0.55);
    font-weight:400;
    margin:0 5px;
  }
  .tile .handle .place {
    color:rgba(255,255,255,0.75);
    font-weight:400;
  }
  /* Bottom heart-row */
  .tile .actions {
    position:absolute; left:0; right:0; bottom:0;
    height:30px;
    background: linear-gradient(0deg, rgba(0,0,0,0.55), rgba(0,0,0,0));
    display:flex; align-items:center;
    padding:0 12px;
    gap:10px;
    z-index:2;
  }
  .tile .heart {
    width:14px; height:14px;
    color:#fff;
    opacity:0.92;
  }
  .tile .likes {
    font-size:10.5px;
    font-weight:500;
    color:rgba(255,255,255,0.92);
    letter-spacing:0.02em;
  }
  /* Hero tile spans both columns top */
  .tile.hero-tile {
    grid-column: 1 / span 2;
    grid-row: 1;
  }
  /* Right copy panel */
  .copy {
    position:absolute;
    right:64px; top:140px;
    width:480px;
  }
  .copy .kicker {
    font-family:'Inter',sans-serif;
    font-size:11px;
    letter-spacing:0.28em;

    color:rgba(244,239,230,0.55);

  .meta {
