<style>

  .hero { position:relative; width:1400px; height:787px; overflow:hidden; }

    mix-blend-mode:screen;
    pointer-events:none;
  }
  .vignette {
    position:absolute; inset:0;
    background: radial-gradient(ellipse at 50% 55%, rgba(0,0,0,0) 35%, rgba(0,0,0,0.6) 100%);

    letter-spacing: -0.005em;

    max-width: 900px;
    text-shadow: 0 2px 40px rgba(0,0,0,0.5);
  }
  .copy h1 .one {
    font-style: italic;

  .whisper-line {

    background: rgba(246,237,224,0.5);

<body>
  <div class="hero">
