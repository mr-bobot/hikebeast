<!-- V084 · Escape · unbooked · layout=full-bleed · treatment=none · img=/map4-heroes/emotional/LOST7855-Edit.jpeg -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>V084</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Fraunces:opsz,wght@9..144,300;9..144,400&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; width:1400px; height:787px; overflow:hidden; background:#000; }
  .hero { position:relative; width:1400px; height:787px; overflow:hidden; }
  .hero img.bg {
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover; object-position:50% 60%;
    display:block;
  }
  /* a soft scrim only on the very top so the waterline copy sits clean */
  .scrim {
    position:absolute; left:0; right:0; top:0; height:30%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.32), rgba(0,0,0,0));
    pointer-events:none;
  }
  .waterline {
    /* sits across the photo at approx the waterline */
    position:absolute;
    left:0; right:0;
    top:54%;
    transform:translateY(-50%);
    display:flex;
    justify-content:center;
    align-items:center;
    gap:42px;
    font-family:'Inter', sans-serif;
    font-weight:400;
    font-size:30px;
    letter-spacing:0.36em;
    color:rgba(255,255,255,0.92);
    text-transform:uppercase;
    text-shadow:0 1px 14px rgba(0,0,0,0.55);
  }
  .waterline span {
    position:relative;
  }
  .waterline span::after {
    content:"·";
    position:absolute;
    right:-26px;
    top:-2px;
    color:rgba(255,255,255,0.65);
  }
  .waterline span:last-child::after { display:none; }
  .topmark {
    position:absolute;
    top:48px; left:88px;
    display:flex; align-items:center; gap:12px;
    font-family:'Inter', sans-serif;
    font-size:12px;
    letter-spacing:0.24em;
    color:rgba(255,255,255,0.75);
    text-transform:uppercase;
    font-weight:500;
  }
  .topmark .dot { width:6px; height:6px; border-radius:50%; background:#fff; }
  .topright {
    position:absolute;
    top:48px; right:88px;
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:300;
    font-size:18px;
    color:rgba(255,255,255,0.7);
  }
  .ghost {
    position:absolute;
    left:88px; bottom:54px;
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:300;
    font-size:22px;
    color:rgba(255,255,255,0.65);
  }
</style>
</head>
<body>
  <div class="hero">
    <img class="bg" src="/map4-heroes/emotional/LOST7855-Edit.jpeg" alt="">
    <div class="scrim"></div>
    <div class="topmark"><span class="dot"></span>Hikebeast Schweiz</div>
    <div class="topright">Seealpsee, ohne Empfehlung</div>
    <div class="waterline">
      <span>Kein Hotel</span>
      <span>Kein Buffet</span>
      <span>Kein Wlan</span>
    </div>
    <div class="ghost">141 Spots · 27 CHF</div>
  </div>
</body>
</html>
