<!-- V069 · Pride · calm · layout=full-bleed · treatment=none · img=/map4-heroes/emotional/stoos_kapelle2.jpg -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>V069</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; width:1400px; height:787px; overflow:hidden; font-family:'Inter', sans-serif; }
  .hero { position:relative; width:1400px; height:787px; background:#000; }
  .hero img.bg { width:100%; height:100%; object-fit:cover; object-position:50% 50%; display:block; }
  .grad-bottom { position:absolute; left:0; right:0; bottom:0; height:48%; background:linear-gradient(to top, rgba(0,0,0,0.78) 0%, rgba(0,0,0,0.18) 70%, rgba(0,0,0,0) 100%); pointer-events:none; }
  .topbar { position:absolute; top:0; left:0; right:0; padding:34px 80px 0; display:flex; justify-content:space-between; align-items:center; }
  .swissdot { display:flex; align-items:center; gap:12px; color:#fff; font-size:11px; letter-spacing:0.4em; text-transform:uppercase; font-weight:500; }
  .swissdot .cross { width:12px; height:12px; background:#fff; position:relative; }
  .swissdot .cross::before, .swissdot .cross::after { content:""; position:absolute; background:#000; }
  .swissdot .cross::before { left:50%; top:22%; bottom:22%; width:2px; transform:translateX(-50%); }
  .swissdot .cross::after { top:50%; left:22%; right:22%; height:2px; transform:translateY(-50%); }
  .topright { color:rgba(255,255,255,0.85); font-size:11px; letter-spacing:0.36em; text-transform:uppercase; font-weight:500; }
  /* center bottom huge */
  .copy { position:absolute; left:0; right:0; bottom:78px; text-align:center; padding:0 60px; }
  .pre { color:rgba(255,255,255,0.75); font-size:13px; letter-spacing:0.5em; text-transform:uppercase; font-weight:500; margin-bottom:30px; }
  .pre .x { display:inline-block; width:36px; height:1px; background:rgba(255,255,255,0.55); vertical-align:middle; margin:0 18px; }
  .head { font-family:'Inter', sans-serif; font-weight:300; font-size:140px; line-height:1; letter-spacing:-0.05em; color:#fff; }
  .head .comma { color:#ffd66b; }
  .head strong { font-weight:600; }
  .head .neg { color:rgba(255,255,255,0.55); font-weight:300; text-decoration:line-through; text-decoration-thickness:1.5px; text-decoration-color:rgba(255,255,255,0.45); }
  .leadline { position:absolute; left:50%; top:54%; transform:translateX(-50%); width:1px; height:90px; background:linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.6)); }
</style>
</head>
<body>
  <div class="hero">
    <img class="bg" src="/map4-heroes/emotional/stoos_kapelle2.jpg" alt="">
    <div class="grad-bottom"></div>
    <div class="topbar">
      <div class="swissdot"><span class="cross"></span>Hikebeast · Schweizer Plätze</div>
      <div class="topright">Stoos · Schwyz · 1305 m</div>
    </div>
    <div class="leadline"></div>
    <div class="copy">
      <div class="pre"><span class="x"></span>Manifest<span class="x"></span></div>
      <div class="head"><strong>Lokal</strong>, nicht <span class="neg">touristisch</span>.</div>
    </div>
  </div>
</body>
</html>
