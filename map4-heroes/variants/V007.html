<!-- V007 · Freedom · unbound · layout=edge-to-edge · treatment=none · img=/map4-heroes/emotional/fronalpstock.jpg -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>V007</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,72,400;1,72,400&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; width:1400px; height:787px; overflow:hidden; background:#000; }
  .hero { position:relative; width:1400px; height:787px; overflow:hidden; }
  .hero img.photo {
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; object-position:50% 60%;
    display:block;
  }
  /* warm bottom gradient to lift type */
  .warm {
    position:absolute; left:0; right:0; bottom:0; height:60%;
    background: linear-gradient(180deg, rgba(40,18,0,0) 0%, rgba(40,18,0,0.05) 30%, rgba(20,10,0,0.45) 100%);
    pointer-events:none;
  }
  /* single horizontal hairline that spans the entire frame edge-to-edge */
  .rule-top {
    position:absolute; left:48px; right:48px; top:48px;
    height:1px; background: rgba(255,235,200,0.6);
  }
  .rule-bot {
    position:absolute; left:48px; right:48px; bottom:120px;
    height:1px; background: rgba(255,235,200,0.6);
  }
  .left-mark {
    position:absolute; left:48px; top:60px;
    font-family:'Bodoni Moda', serif;
    font-style:italic;
    color: rgba(255,235,200,0.8);
    font-size: 14px;
    letter-spacing: 0.04em;
  }
  .right-mark {
    position:absolute; right:48px; top:60px;
    font-family:'Bodoni Moda', serif;
    font-style:italic;
    color: rgba(255,235,200,0.8);
    font-size: 14px;
    letter-spacing: 0.04em;
  }
  .copy {
    position:absolute;
    left:0; right:0; bottom:42px;
    text-align:center;
    color:#fff8e7;
  }
  h1 {
    font-family:'Bodoni Moda', serif;
    font-style:italic;
    font-weight:400;
    font-size: 56px;
    line-height: 1.0;
    letter-spacing:-0.005em;
    margin:0;
    text-shadow: 0 2px 24px rgba(20,10,0,0.6);
  }
</style>
</head>
<body>
  <div class="hero">
    <img class="photo" src="/map4-heroes/emotional/fronalpstock.jpg" alt="">
    <div class="warm"></div>
    <div class="rule-top"></div>
    <div class="rule-bot"></div>
    <div class="copy">
      <h1>Take the long way home.</h1>
    </div>
  </div>
</body>
</html>
