<!-- V085 · Escape · drifting · layout=split-screen · treatment=none · img=/map4-heroes/emotional/limmernsee1.jpg -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>V085</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; width:1400px; height:787px; overflow:hidden; background:#000; font-family:'Inter', sans-serif; }
  .hero { position:relative; width:1400px; height:787px; overflow:hidden; display:flex; }
  .panel { position:relative; flex:1; height:100%; overflow:hidden; }
  .panel img {
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover; object-position:50% 50%;
    display:block;
  }
  .panel.left img {
    /* fluorescent-strip-light substitute, push the cool fluorescent feel */
    filter:saturate(0.4) brightness(1.05) contrast(1.06) hue-rotate(-6deg);
  }
  .panel.left::after {
    content:"";
    position:absolute; inset:0;
    background:
      linear-gradient(120deg, rgba(220,232,255,0.32) 0%, rgba(220,232,255,0) 60%),
      linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.15) 40%, rgba(0,0,0,0.65) 100%);
    pointer-events:none;
  }
  .panel.right::after {
    content:"";
    position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,0.42) 0%, rgba(0,0,0,0) 35%, rgba(0,0,0,0.55) 100%);
    pointer-events:none;
  }
  .label {
    position:absolute;
    top:54px; left:54px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.24em;
    color:rgba(255,255,255,0.88);
    text-transform:uppercase;
  }
  .label .num {
    display:block;
    font-size:74px;
    font-family:'Inter', sans-serif;
    font-weight:200;
    letter-spacing:-0.04em;
    line-height:1;
    margin-top:18px;
    color:#fff;
  }
  .label .unit {
    display:block;
    margin-top:4px;
    color:rgba(255,255,255,0.7);
    font-size:13px;
    letter-spacing:0.2em;
  }
  .center-bar {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%, -50%);
    width:1px; height:60%;
    background:rgba(255,255,255,0.22);
  }
  .headline {
    position:absolute;
    left:54px; right:54px; bottom:80px;
    font-family:'Inter', sans-serif;
    font-weight:300;
    font-size:62px;
    line-height:1;
    letter-spacing:-0.035em;
    color:#fff;
    text-shadow:0 2px 18px rgba(0,0,0,0.5);
  }
  .headline strong { font-weight:700; }
  .arrow {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%, -50%);
    width:70px; height:70px;
    border-radius:50%;
    background:rgba(255,255,255,0.94);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 18px 36px rgba(0,0,0,0.4);
    z-index:3;
  }
  .arrow svg { display:block; }
</style>
</head>
<body>
  <div class="hero">
    <div class="panel left">
      <img src="/map3/img/hero-4-example.jpg" alt="">
      <div class="label">
        Mo, 09:14
        <span class="num">0 m</span>
        <span class="unit">Höhe · Bürostuhl</span>
      </div>
      <div class="headline">Eine Stunde<br>Fahrt.</div>
    </div>
    <div class="panel right">
      <img src="/map4-heroes/emotional/limmernsee1.jpg" alt="">
      <div class="label">
        Mo, 10:21
        <span class="num">1857 m</span>
        <span class="unit">Höhe · Limmernsee</span>
      </div>
      <div class="headline" style="text-align:right;"><strong>Anderer<br>Planet.</strong></div>
    </div>
    <div class="arrow">
      <svg width="28" height="28" viewBox="0 0 28 28"><path d="M6 14 L22 14 M16 8 L22 14 L16 20" stroke="#111" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>
</body>
</html>
