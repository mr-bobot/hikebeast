    height: 1px;

  .progress {
    margin-top: 44px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(26,24,20,0.7);
  }
  .progress .bar {
    margin-top: 12px;
    width: 100%;
    height: 4px;
    background: rgba(26,24,20,0.14);
    position: relative;
    overflow: hidden;
  }
  .progress .bar::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 1.42%;
    background: #b53826;
  }
  .progress .labels {
    margin-top: 8px;
    display: flex; justify-content: space-between;
    font-size: 10px;
    letter-spacing: 0.28em;
    color: rgba(26,24,20,0.55);

    margin-top: 38px;

    align-items: center;
    gap: 14px;
    background: #1a1814;
    color: #f4ecdb;
    padding: 16px 26px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.24em;
    text-transform: uppercase;
  }

  .topmark {
    position:absolute;
    top: 36px;
    left: 60px;
    right: 60px;
    display: flex;
    justify-content: space-between;
    color: rgba(26,24,20,0.55);
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
  }
  .botmark {
    position:absolute;
    bottom: 30px;
    left: 60px;
    right: 60px;
    display: flex;
    justify-content: space-between;
    color: rgba(26,24,20,0.5);
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
  }

  /* SVG styling */
  .map-fill image {
    filter: saturate(0.18) contrast(1.05) brightness(0.96);

  .country-stroke {
    fill: none;
    stroke: #1a1814;
    stroke-width: 1.4;
    stroke-linejoin: round;
    opacity: 0.78;

  .country-shadow {

    stroke-width: 1.2;

  .city-label {

    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    fill: rgba(26,24,20,0.7);
