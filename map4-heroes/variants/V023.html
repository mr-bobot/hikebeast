<html lang="de">
<head>

<title>V023</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>

    position:absolute; inset:0; width:100%; height:100%;

    position:absolute; inset:0;

  }
  .copy {
    position:absolute;
    left:50%; bottom:188px;
    transform:translateX(-50%);
    text-align:center;
    color:#efe7d8;
  }
  .copy h1 {
    margin:0;
    font-family:'EB Garamond', serif;
    font-weight:400;
    font-style:italic;
    font-size:34px;
    line-height:1.3;
    letter-spacing:0.01em;
    text-shadow:0 1px 24px rgba(0,0,0,0.45);
    max-width:760px;
  }
  .hairline {
    position:absolute;
    left:50%; bottom:262px;
    transform:translateX(-50%);
    width:80px; height:1px;
    background:rgba(239,231,216,0.55);
  }

</head>
<body>
