<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ffffff" />
<title>Gems of Switzerland · Hikebeast</title>
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet" />
<meta name="referrer" content="no-referrer" />
<link rel="icon" type="image/jpeg" href="../images/favicon.jpg" />
<link rel="apple-touch-icon" href="../images/favicon.jpg" />
<link rel="stylesheet" href="preview.css" />
</head>
<body>

<header class="home-topbar">
  <label class="home-search">
    <input id="homeSearch" type="search" placeholder="Search spots, regions, themes…" autocomplete="off" />
    <svg class="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.65" y2="16.65"/></svg>
  </label>
  <div class="home-topbar-actions">
    <!-- Settings cog is injected universally by social.js into every
         /full/* topbar's right-slot, so the home page picks it up too
         without inline duplication. Random + Liked used to live here
         on mobile; they're reachable from Swipe and the Menu sheet, so
         the topbar stays clean. -->
  </div>
</header>

<main class="home-v2">

  <h1 class="page-title">Home</h1>

  <section class="home-feature">
    <article class="feature-card" id="featureCard">
      <div class="feature-text">
        <span class="feature-kicker" id="featureKicker">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 L14 8 L20 9 L15.5 13 L17 19 L12 16 L7 19 L8.5 13 L4 9 L10 8 Z"/></svg>
          <span data-kicker-label>Featured</span>
        </span>
        <h2 class="feature-title" id="featureTitle">…</h2>
        <p class="feature-deck" id="featureDeck">…</p>
        <a class="feature-cta" id="featureCta" href="#">
          <span class="play-icon">
            <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="6 4 20 12 6 20 6 4"/></svg>
          </span>
          <span>Open spot</span>
        </a>
      </div>
      <div class="feature-photo">
        <img id="featureImg" src="" alt="" />
        <div class="feature-dots" id="featureDots"></div>
      </div>
    </article>
    <aside class="home-up-next" id="upNext"></aside>
  </section>

  <section class="home-row">
    <div class="row-head">
      <h2>For you</h2>
      <a class="see-all" href="swipe/">
        <span>See all</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
    </div>
    <div class="row-cards" id="rowForYou"></div>
  </section>

  <section class="home-row">
    <div class="row-head">
      <h2>Famous spots that deliver</h2>
      <a class="see-all" href="intro/index.html#top-six">
        <span>See all</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
    </div>
    <div class="row-cards" id="rowFamous"></div>
  </section>

  <section class="home-row">
    <div class="row-head">
      <h2>Hidden gems · Leon's picks</h2>
      <a class="see-all" href="hidden-gems/">
        <span>See all</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
    </div>
    <div class="row-cards" id="rowGems"></div>
  </section>

</main>

<footer class="legal">
  <a href="../imprint.html">Imprint</a><span class="sep">·</span>
  <a href="../privacy.html">Privacy</a><span class="sep">·</span>
  © Hikebeast
</footer>

<script src="map/spots-data.js"></script>
<script src="img/thumbs/dimensions.js"></script>
<script src="lib/convex.js"></script>
<script>window.HB_CONVEX_URL = "https://whimsical-sparrow-336.convex.cloud";</script>
<script src="social.js"></script>
<script>
(() => {
  // Read the catalog through the unified HB.spots store. Sidecar-seeded
  // synchronously, replaced reactively when Convex's spots:list arrives.
  // Placeholder spots (zdk_placeholder.jpg) are filtered out everywhere
  // they'd render as near-black tiles -- featured, up-next, row cards.
  let SPOTS = [];
  function refreshSpots() {
    SPOTS = window.HB.spots.all().filter(s => window.HB.hasRealImage(s));
  }
  refreshSpots();
  const LEGEND = window.LEGEND || [];
  const REGION_NAME = Object.fromEntries(LEGEND.map(c => [c.number, c.name]));

  function esc(s) { return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // Curated lists pulled from the editorial Top 6 sections in /full/intro/.
  // Names must match window.SPOTS entry titles; if not, the card is silently
  // skipped so a typo here can't crash the page.
  const CURATED_FAMOUS = [
    'Schäfler', 'Oeschinensee', 'Seealpsee', 'Fälensee', 'Saxer Lücke', 'Riffelsee',
  ];
  const CURATED_GEMS = [
    'Batöni Wasserfallarena', 'Tannhorn', 'Jöriseen', 'Pic de Jallouvre', 'Lac de Cheserys', 'Fulberg',
  ];
  const findByTitle = (t) => SPOTS.find(s => s.title === t);
  let famous = [];
  let gems = [];
  function refreshCuratedPools() {
    famous = CURATED_FAMOUS.map(findByTitle).filter(Boolean);
    gems   = CURATED_GEMS.map(findByTitle).filter(Boolean);
  }
  refreshCuratedPools();

  // === Featured hero (rotates through curated pool) ===
  // The Introduction card is always first so a fresh visitor's eye lands on
  // "read this before the rest of the guide". After it cycles past, we
  // alternate between the famous and hidden-gems pools.
  const introCard = {
    title: 'Introduction',
    kicker: 'Before you go',
    image: 'front_matter/page_05.jpg',
    href: 'intro/index.html',
    chapter_id: 'intro',
    isIntro: true,
  };
  let featurePool = [introCard, ...famous, ...gems];
  let featureIdx = 0;  // start with Introduction every visit

  const featureTitle = document.getElementById('featureTitle');
  const featureDeck  = document.getElementById('featureDeck');
  const featureImg   = document.getElementById('featureImg');
  const featureCta   = document.getElementById('featureCta');
  const featureDots  = document.getElementById('featureDots');
  const featureCard  = document.getElementById('featureCard');

  // The featured photo crossfades between spots: we fade the current image
  // out, swap the src once it's transparent, then fade back in. This keeps
  // the box height locked and avoids a flicker when the new image hasn't
  // decoded yet.
  let featureSwapping = false;
  let lastFeatureKey = null;  // dedupe re-paints when nothing visible changed
  function paintFeature(spot, idx) {
    if (!spot) return;
    // The feature pool is rebuilt on every Convex spots:list update. With
    // the introCard pinned at index 0, the post-Convex re-paint would call
    // paintFeature(introCard, 0) again — which triggers the crossfade and
    // looks like a "reload" even though the content is identical. Bail
    // early when nothing the user can see changed (same spot, same idx,
    // same image source). Note: lastFeatureKey is paired with idx so the
    // 9-second auto-advance timer still works.
    const key = `${spot.isIntro ? 'intro' : (window.HB.spotKey(spot) || spot.title)}|${idx}|${spot.image || spot.imagePhotoId || ''}`;
    if (lastFeatureKey === key) return;
    lastFeatureKey = key;

    featureTitle.textContent = spot.title;
    const featureKicker = document.getElementById('featureKicker');
    const kickerLabel = featureKicker?.querySelector('[data-kicker-label]');
    if (spot.isIntro) {
      featureDeck.textContent = 'Cover, camping rules, top picks · the front matter of the guide.';
      featureCta.href = 'intro/index.html';
      featureCta.querySelector('span:last-child').textContent = 'Read the intro';
      if (kickerLabel) kickerLabel.textContent = 'Read this first';
      featureKicker?.classList.add('is-pinned');
    } else {
      const kicker = window.HB.singularKicker(spot.kicker || '');
      const region = REGION_NAME[spot.chapter] || spot.chapter_id;
      featureDeck.textContent = kicker ? `${kicker} · ${region}` : region;
      featureCta.href = window.HB.spotDetailHref(spot, '');
      featureCta.querySelector('span:last-child').textContent = 'Open spot';
      if (kickerLabel) kickerLabel.textContent = 'Featured';
      featureKicker?.classList.remove('is-pinned');
    }
    featureDots.innerHTML = featurePool.map((_, i) =>
      `<span class="${i === idx ? 'is-on' : ''}"></span>`
    ).join('');
    featureCard.dataset.spotKey = spot.isIntro ? '' : (window.HB.spotKey(spot) || '');

    // Hero uses the full-resolution source (1800w) so it stays sharp on
    // desktop fullscreen where the photo column reaches ~1100px CSS / 2200px
    // device pixels. The row cards and up-next thumbs stay on the 1000w
    // mid-tier since they're rendered much smaller.
    const heroAttrs = window.HB.photoAttrs({
      photoId: spot.imagePhotoId, image: spot.image,
      width: 2800, prefix: '', sizes: '100vw',
    });
    if (!featureImg.src) {
      featureImg.src = heroAttrs.src;
      if (heroAttrs.srcset) { featureImg.srcset = heroAttrs.srcset; featureImg.sizes = heroAttrs.sizes; }
      featureImg.alt = spot.title;
      return;
    }
    if (featureSwapping) return;
    featureSwapping = true;
    featureImg.classList.add('is-fading');
    setTimeout(() => {
      const next = new Image();
      next.onload = () => {
        featureImg.src = heroAttrs.src;
        if (heroAttrs.srcset) { featureImg.srcset = heroAttrs.srcset; featureImg.sizes = heroAttrs.sizes; }
        else { featureImg.removeAttribute('srcset'); featureImg.removeAttribute('sizes'); }
        featureImg.alt = spot.title;
        // Tiny delay so the new src has a paint frame before we fade in.
        requestAnimationFrame(() => {
          featureImg.classList.remove('is-fading');
          featureSwapping = false;
        });
      };
      next.onerror = () => { featureImg.classList.remove('is-fading'); featureSwapping = false; };
      next.src = heroAttrs.src;
    }, 220);
  }
  if (featurePool.length) paintFeature(featurePool[featureIdx], featureIdx);

  // Slower cadence than YouTube's typical 5s -- 9s gives readers time to
  // actually parse the title before the next photo lands. Paused on
  // hidden tabs to save battery.
  const FEATURE_INTERVAL = 9000;
  let featureTimer = setInterval(advanceFeature, FEATURE_INTERVAL);
  document.addEventListener('visibilitychange', () => {
    clearInterval(featureTimer);
    if (!document.hidden) featureTimer = setInterval(advanceFeature, FEATURE_INTERVAL);
  });
  function advanceFeature() {
    if (!featurePool.length) return;
    featureIdx = (featureIdx + 1) % featurePool.length;
    paintFeature(featurePool[featureIdx], featureIdx);
  }
  function retreatFeature() {
    if (!featurePool.length) return;
    featureIdx = (featureIdx - 1 + featurePool.length) % featurePool.length;
    paintFeature(featurePool[featureIdx], featureIdx);
  }
  // Tap the photo to advance manually + swipe horizontally on touch.
  // Swipe wins over tap: if the user moves more than SWIPE_THRESHOLD
  // pixels horizontally between touchstart and touchend, we treat it as
  // a swipe and swallow the synthesised click. Vertical drags fall
  // through (they're scrolling the page).
  const featurePhotoEl = document.querySelector('.feature-photo');
  if (featurePhotoEl) {
    const SWIPE_THRESHOLD = 40;  // px
    let touchStartX = 0, touchStartY = 0;
    let swipeFired = false;
    featurePhotoEl.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      touchStartX = t.clientX;
      touchStartY = t.clientY;
      swipeFired = false;
    }, { passive: true });
    featurePhotoEl.addEventListener('touchend', (e) => {
      const t = e.changedTouches[0];
      const dx = t.clientX - touchStartX;
      const dy = t.clientY - touchStartY;
      // Treat as swipe only when horizontal motion clearly dominates and
      // crosses the threshold — a vertical scroll-y drag shouldn't flip
      // cards. Reset the auto-advance timer so the user gets a full
      // cycle on the spot they swiped to.
      if (Math.abs(dx) > SWIPE_THRESHOLD && Math.abs(dx) > Math.abs(dy)) {
        if (dx < 0) advanceFeature(); else retreatFeature();
        clearInterval(featureTimer);
        featureTimer = setInterval(advanceFeature, FEATURE_INTERVAL);
        swipeFired = true;
      }
    }, { passive: true });
    // Capture-phase listener catches the click before the advance handler
    // below would fire it.
    featurePhotoEl.addEventListener('click', (e) => {
      if (swipeFired) {
        e.stopPropagation();
        e.preventDefault();
        swipeFired = false;
        return;
      }
      advanceFeature();
    }, true);
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Stable random selection. Re-shuffling on every subscription tick made
  // the home page show different cards within the first second of load
  // (sidecar paint → Convex spots arrive → swipes/session events fire).
  // Instead, pick spotKeys once, keep them across re-renders, and only
  // swap a slot when its spot becomes "decided" (skipped or saved). This
  // way the page's first paint stays put.
  function pickStable(prevKeys, count) {
    const decided = new Set(window.HB.swipes.list().map(d => d.spotKey));
    const kept = prevKeys.filter(k => !decided.has(k) && SPOTS.some(s => window.HB.spotKey(s) === k));
    if (kept.length >= count) return kept.slice(0, count);
    const taken = new Set(kept);
    const undecided = SPOTS.filter(s => {
      const k = window.HB.spotKey(s);
      return k && !decided.has(k) && !taken.has(k);
    });
    const pool = undecided.length ? undecided : SPOTS.filter(s => !taken.has(window.HB.spotKey(s)));
    const fill = shuffle(pool).slice(0, count - kept.length).map(s => window.HB.spotKey(s));
    return [...kept, ...fill];
  }

  // === "Up next" stack to the right of the hero (4 cards) ===
  const upNextEl = document.getElementById('upNext');
  let upNextKeys = [];
  function buildUpNext() {
    upNextKeys = pickStable(upNextKeys, 4);
    const byKey = new Map(SPOTS.map(s => [window.HB.spotKey(s), s]));
    const picks = upNextKeys.map(k => byKey.get(k)).filter(Boolean);
    upNextEl.innerHTML = picks.map(spot => {
      const region = REGION_NAME[spot.chapter] || spot.chapter_id;
      const kicker = window.HB.singularKicker(spot.kicker || '');
      const a = window.HB.photoAttrs({
        photoId: spot.imagePhotoId, image: spot.image,
        width: 400, prefix: '', sizes: '160px',
      });
      const ss = a.srcset ? ` srcset="${esc(a.srcset)}" sizes="${esc(a.sizes)}"` : '';
      const k = window.HB.spotKey(spot) || '';
      return `
        <a class="up-next-card" href="${esc(window.HB.spotDetailHref(spot, ''))}" data-hb-spotkey="${esc(k)}">
          <span class="photo"><img src="${esc(a.src)}"${ss} alt="" loading="lazy" /></span>
          <span class="body">
            <span class="name">${esc(spot.title)}</span>
            <span class="meta">${esc(region)}</span>
            ${kicker ? `<span class="duration">${esc(kicker)}</span>` : ''}
          </span>
        </a>
      `;
    }).join('');
    // Attach heart overlays after the markup lands. Idempotent — safe to
    // call on every rebuild.
    upNextEl.querySelectorAll('.up-next-card[data-hb-spotkey]').forEach(card => {
      const k = card.getAttribute('data-hb-spotkey');
      if (k) window.HB.attachCardActions(card, k);
    });
  }
  buildUpNext();

  // === Card row builder (For You / Famous / Gems) ===
  // Mirrors the chapter Grid tile (.ch-tile): bordered card, square photo,
  // padded meta block with kicker + title. Keeps the home page visually
  // aligned with the chapter pages.
  function rowCard(spot) {
    const region = REGION_NAME[spot.chapter] || spot.chapter_id;
    const kicker = window.HB.singularKicker(spot.kicker || '') || region;
    const href = window.HB.spotDetailHref(spot, '');
    const a = window.HB.photoAttrs({
      photoId: spot.imagePhotoId, image: spot.image,
      width: 1000, prefix: '',
      sizes: '(min-width: 1000px) 280px, 45vw',
    });
    const ss = a.srcset ? ` srcset="${esc(a.srcset)}" sizes="${esc(a.sizes)}"` : '';
    const k = window.HB.spotKey(spot) || '';
    return `
      <a class="row-card" href="${esc(href)}" title="${esc(spot.title)}" data-hb-spotkey="${esc(k)}">
        <div class="photo">
          <img src="${esc(a.src)}"${ss} alt="${esc(spot.title)}" loading="lazy" />
        </div>
        <div class="meta">
          <p class="kicker">${esc(kicker)}</p>
          <h3 class="title">${esc(spot.title)}</h3>
        </div>
      </a>
    `;
  }
  // Wire heart overlays into every .row-card produced by rowCard. Called
  // after each row's innerHTML lands.
  function wireRowCardActions(rowEl) {
    if (!rowEl) return;
    rowEl.querySelectorAll('.row-card[data-hb-spotkey]').forEach(card => {
      const k = card.getAttribute('data-hb-spotkey');
      if (k) window.HB.attachCardActions(card, k);
    });
  }

  let forYouKeys = [];
  function buildForYou() {
    forYouKeys = pickStable(forYouKeys, 4);
    const byKey = new Map(SPOTS.map(s => [window.HB.spotKey(s), s]));
    const picks = forYouKeys.map(k => byKey.get(k)).filter(Boolean);
    const el = document.getElementById('rowForYou');
    el.innerHTML = picks.map(rowCard).join('');
    wireRowCardActions(el);
  }
  function buildCurated(id, list) {
    const el = document.getElementById(id);
    if (!list.length) { el.innerHTML = ''; return; }
    el.innerHTML = list.slice(0, 4).map(rowCard).join('');
    wireRowCardActions(el);
  }

  buildForYou();
  buildCurated('rowFamous', famous);
  buildCurated('rowGems', gems);

  // === Search · Enter jumps to /full/browse/?q=... ===
  const searchInput = document.getElementById('homeSearch');
  searchInput.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const q = searchInput.value.trim();
    location.href = q ? `browse/?q=${encodeURIComponent(q)}` : 'browse/';
  });

  // Re-render when favorites or swipes change (cross-tab, server push,
  // or sign-in/out).
  window.HB.favorites.subscribe(() => { buildForYou(); buildUpNext(); });
  window.HB.swipes.subscribe(()    => { buildForYou(); buildUpNext(); });
  window.HB.session.subscribe(()   => { buildForYou(); buildUpNext(); });

  // When Convex pushes an update (admin edits a spot, photo published,
  // etc.), refresh every surface so the page reflects new data without
  // a reload. Featured rotation index is preserved.
  window.HB.spots.subscribe(() => {
    refreshSpots();
    refreshCuratedPools();
    featurePool = [introCard, ...famous, ...gems];
    if (featureIdx >= featurePool.length) featureIdx = 0;
    if (featurePool.length) paintFeature(featurePool[featureIdx], featureIdx);
    buildUpNext();
    buildForYou();
    buildCurated('rowFamous', famous);
    buildCurated('rowGems', gems);
  });
})();
</script>

</body>
</html>
