<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ffffff" />
<title>Gems of Switzerland · Hikebeast</title>
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet" />
<meta name="referrer" content="no-referrer" />
<link rel="icon" type="image/jpeg" href="../images/favicon.jpg" />
<link rel="apple-touch-icon" href="../images/favicon.jpg" />
<link rel="stylesheet" href="preview.css" />
</head>
<body>

<header class="home-topbar">
  <label class="home-search">
    <input id="homeSearch" type="search" placeholder="Search spots, regions, themes…" autocomplete="off" />
    <svg class="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.65" y2="16.65"/></svg>
  </label>
  <div class="home-topbar-actions">
    <!-- Settings cog is injected universally by social.js into every
         /full/* topbar's right-slot, so the home page picks it up too
         without inline duplication. Random + Liked used to live here
         on mobile; they're reachable from Swipe and the Menu sheet, so
         the topbar stays clean. -->
  </div>
</header>

<main class="home-v2">

  <h1 class="page-title">Home</h1>

  <section class="home-feature">
    <article class="feature-card" id="featureCard">
      <div class="feature-text">
        <span class="feature-kicker" id="featureKicker">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 L14 8 L20 9 L15.5 13 L17 19 L12 16 L7 19 L8.5 13 L4 9 L10 8 Z"/></svg>
          <span data-kicker-label>Featured</span>
        </span>
        <h2 class="feature-title" id="featureTitle">…</h2>
        <p class="feature-deck" id="featureDeck">…</p>
        <a class="feature-cta" id="featureCta" href="#">
          <span class="play-icon">
            <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="6 4 20 12 6 20 6 4"/></svg>
          </span>
          <span>Open spot</span>
        </a>
      </div>
      <div class="feature-photo">
        <img id="featureImg" src="" alt="" />
        <div class="feature-dots" id="featureDots"></div>
      </div>
    </article>
    <aside class="home-up-next" id="upNext"></aside>
  </section>

  <section class="home-row">
    <div class="row-head">
      <h2>For you</h2>
    </div>
    <div class="row-cards" id="rowForYou"></div>
  </section>

  <section class="home-row">
    <div class="row-head">
      <h2>Famous spots that deliver</h2>
      <a class="see-all" href="famous-gems/">
        <span>See all</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
    </div>
    <div class="row-cards" id="rowFamous"></div>
  </section>

  <section class="home-row">
    <div class="row-head">
      <h2>Hidden gems · Leon's picks</h2>
      <a class="see-all" href="hidden-gems/">
        <span>See all</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
    </div>
    <div class="row-cards" id="rowGems"></div>
  </section>

</main>

<footer class="legal">
  <a href="../imprint.html">Imprint</a><span class="sep">·</span>
  <a href="../privacy.html">Privacy</a><span class="sep">·</span>
  <a href="../terms.html">Terms</a><span class="sep">·</span>
  © Hikebeast
</footer>

<script src="map/spots-data.js"></script>
<script src="img/thumbs/dimensions.js"></script>
<script src="lib/convex.js"></script>
<script>window.HB_CONVEX_URL = "https://whimsical-sparrow-336.convex.cloud";</script>
<script src="social.js"></script>
<script>
(() => {
  // Read the catalog through the unified HB.spots store. Sidecar-seeded
  // synchronously, replaced reactively when Convex's spots:list arrives.
  // Placeholder spots (zdk_placeholder.jpg) are filtered out everywhere
  // they'd render as near-black tiles -- featured, up-next, row cards.
  let SPOTS = [];
  function refreshSpots() {
    SPOTS = window.HB.spots.all().filter(s => window.HB.hasRealImage(s));
  }
  refreshSpots();
  const LEGEND = window.LEGEND || [];
  const REGION_NAME = Object.fromEntries(LEGEND.map(c => [c.number, c.name]));

  function esc(s) { return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // Curated lists pulled from the editorial Top 6 sections in /full/intro/.
  // Names must match window.SPOTS entry titles; if not, the card is silently
  // skipped so a typo here can't crash the page.
  const CURATED_FAMOUS = [
    'Schäfler', 'Oeschinensee', 'Seealpsee', 'Fälensee', 'Saxer Lücke', 'Riffelsee',
  ];
  const CURATED_GEMS = [
    'Batöni Wasserfallarena', 'Tannhorn', 'Jöriseen', 'Pic de Jallouvre', 'Lac de Cheserys', 'Fulberg',
  ];
  const findByTitle = (t) => SPOTS.find(s => s.title === t);
  let famous = [];
  let gems = [];
  function refreshCuratedPools() {
    famous = CURATED_FAMOUS.map(findByTitle).filter(Boolean);
    gems   = CURATED_GEMS.map(findByTitle).filter(Boolean);
  }
  refreshCuratedPools();

  // === Featured hero (rotates through the seven regional chapters) ===
  // Used to cycle through Introduction + curated famous + hidden gems;
  // now scoped to chapters only so the home page reads as a high-level
  // index of the guide rather than a teaser for individual spots.
  // CHAPTERS_META is declared further down (used by buildUpNext too);
  // we hoist a reference via a getter so order-of-declaration doesn't
  // matter for IIFE-scoped consts.
  let featurePool = [];  // populated below once CHAPTERS_META is in scope
  let featureIdx = 0;

  const featureTitle = document.getElementById('featureTitle');
  const featureDeck  = document.getElementById('featureDeck');
  const featureImg   = document.getElementById('featureImg');
  const featureCta   = document.getElementById('featureCta');
  const featureDots  = document.getElementById('featureDots');
  const featureCard  = document.getElementById('featureCard');

  // The featured photo crossfades between spots: we fade the current image
  // out, swap the src once it's transparent, then fade back in. This keeps
  // the box height locked and avoids a flicker when the new image hasn't
  // decoded yet.
  let featureSwapping = false;
  let lastFeatureKey = null;  // dedupe re-paints when nothing visible changed
  const featurePhotoBox = document.querySelector('.feature-card .feature-photo');
  function paintFeature(ch, idx) {
    if (!ch) return;
    // Skip re-paint when nothing the user can see changed.
    const key = `${ch.id}|${idx}`;
    if (lastFeatureKey === key) return;
    lastFeatureKey = key;

    featureTitle.textContent = ch.name;
    featureDeck.textContent  = ch.description || '';
    featureCta.href = ch.href || (ch.id + '/');
    featureCta.querySelector('span:last-child').textContent = ch.ctaLabel || 'Open chapter';
    const featureKicker = document.getElementById('featureKicker');
    const kickerLabel   = featureKicker?.querySelector('[data-kicker-label]');
    // Kicker pill only shows when the slide carries an explicit kicker
    // (intro has "Read this first"). Chapters skip it — the silhouette
    // + title + deck reads cleaner. The CTA element is kept in the DOM
    // (and its href stays current per slide) so the photo-click handler
    // can still navigate; it's hidden globally via CSS.
    const showKicker = !!ch.kicker;
    if (kickerLabel && ch.kicker) kickerLabel.textContent = ch.kicker;
    if (featureKicker) {
      featureKicker.hidden = !showKicker;
      featureKicker.classList.toggle('is-pinned', !!ch.kickerPinned);
    }

    featureDots.innerHTML = featurePool.map((_, i) =>
      `<span class="${i === idx ? 'is-on' : ''}"></span>`
    ).join('');
    featureCard.dataset.spotKey = '';

    // The hero photo box has three visual modes, set by classes on the
    // .feature-photo container:
    //   - .is-intro: cream gradient + the transparent polaroid PNG
    //     (matches the /themap/success/ celebration so the intro feels
    //     like the same moment the buyer just experienced).
    //   - .is-map:  dark gradient + region-colour glow + the chapter's
    //     white SVG silhouette. Same recipe as the chapter-cover hero
    //     and the small up-next thumbs — the home page reads as a
    //     doorway into those pages.
    //   - default:  fall back to a regular photo (object-fit: cover).
    let src;
    if (featurePhotoBox) {
      featurePhotoBox.classList.remove('is-intro', 'is-map');
      featurePhotoBox.style.removeProperty('--region-color');
    }
    if (ch.isIntro) {
      featurePhotoBox?.classList.add('is-intro');
      src = '../images/intro-photos-transparent.png';
    } else if (ch.mapSvg) {
      featurePhotoBox?.classList.add('is-map');
      if (ch.color) featurePhotoBox?.style.setProperty('--region-color', ch.color);
      src = ch.mapSvg;
    } else {
      // Fallback: regular cover photo. Used when a chapter has no SVG
      // (none today, but kept for safety — Beyond now has region-beyond.svg).
      src = 'img/m/' + (ch.cover || '');
    }

    if (!featureImg.src) {
      featureImg.src = src;
      featureImg.removeAttribute('srcset');
      featureImg.removeAttribute('sizes');
      featureImg.alt = ch.name;
      return;
    }
    if (featureSwapping) return;
    featureSwapping = true;
    featureImg.classList.add('is-fading');
    setTimeout(() => {
      const next = new Image();
      next.onload = () => {
        featureImg.src = src;
        featureImg.removeAttribute('srcset');
        featureImg.removeAttribute('sizes');
        featureImg.alt = ch.name;
        requestAnimationFrame(() => {
          featureImg.classList.remove('is-fading');
          featureSwapping = false;
        });
      };
      next.onerror = () => { featureImg.classList.remove('is-fading'); featureSwapping = false; };
      next.src = src;
    }, 220);
  }

  // Slower cadence than YouTube's typical 5s -- 9s gives readers time to
  // actually parse the title before the next photo lands. Paused on
  // hidden tabs to save battery.
  const FEATURE_INTERVAL = 9000;
  let featureTimer = setInterval(advanceFeature, FEATURE_INTERVAL);
  document.addEventListener('visibilitychange', () => {
    clearInterval(featureTimer);
    if (!document.hidden) featureTimer = setInterval(advanceFeature, FEATURE_INTERVAL);
  });
  function advanceFeature() {
    if (!featurePool.length) return;
    featureIdx = (featureIdx + 1) % featurePool.length;
    paintFeature(featurePool[featureIdx], featureIdx);
  }
  function retreatFeature() {
    if (!featurePool.length) return;
    featureIdx = (featureIdx - 1 + featurePool.length) % featurePool.length;
    paintFeature(featurePool[featureIdx], featureIdx);
  }
  // Tap the photo opens the spot (same destination as the "Open spot" /
  // "Read the intro" CTA). Swipe horizontally still cycles the carousel
  // on touch; the dots and the 9-second auto-advance timer also still
  // cycle through the pool. Tap-to-advance was confusing — users expect
  // a photo of a thing to be a link to that thing.
  const featurePhotoEl = document.querySelector('.feature-photo');
  if (featurePhotoEl) {
    const SWIPE_THRESHOLD = 40;  // px
    let touchStartX = 0, touchStartY = 0;
    let swipeFired = false;
    featurePhotoEl.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      touchStartX = t.clientX;
      touchStartY = t.clientY;
      swipeFired = false;
    }, { passive: true });
    featurePhotoEl.addEventListener('touchend', (e) => {
      const t = e.changedTouches[0];
      const dx = t.clientX - touchStartX;
      const dy = t.clientY - touchStartY;
      if (Math.abs(dx) > SWIPE_THRESHOLD && Math.abs(dx) > Math.abs(dy)) {
        if (dx < 0) advanceFeature(); else retreatFeature();
        clearInterval(featureTimer);
        featureTimer = setInterval(advanceFeature, FEATURE_INTERVAL);
        swipeFired = true;
      }
    }, { passive: true });
    featurePhotoEl.addEventListener('click', (e) => {
      if (swipeFired) {
        e.stopPropagation();
        e.preventDefault();
        swipeFired = false;
        return;
      }
      if (featureCta.href && featureCta.href !== '#') {
        location.href = featureCta.href;
      }
    }, true);
    featurePhotoEl.style.cursor = 'pointer';
  }

  // Title + deck are intuitively clickable too — users tap "Central
  // Switzerland" expecting the page to open. The CTA pill already
  // navigates (native anchor), so we only need to wire the heading
  // text. Click bubbles up from CTA harmlessly (same destination).
  const featureTextEl = document.querySelector('.feature-card .feature-text');
  if (featureTextEl) {
    featureTextEl.addEventListener('click', (e) => {
      // CTA pill handles its own navigation; let the native click run.
      if (e.target.closest('.feature-cta')) return;
      if (featureCta.href && featureCta.href !== '#') {
        location.href = featureCta.href;
      }
    });
    featureTitle.style.cursor = 'pointer';
    featureDeck.style.cursor  = 'pointer';
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Stable random selection. Re-shuffling on every subscription tick made
  // the home page show different cards within the first second of load
  // (sidecar paint → Convex spots arrive → swipes/session events fire).
  // Instead, pick spotKeys once, keep them across re-renders, and only
  // swap a slot when its spot becomes "decided" (skipped or saved). This
  // way the page's first paint stays put.
  function pickStable(prevKeys, count) {
    const decided = new Set(window.HB.swipes.list().map(d => d.spotKey));
    const kept = prevKeys.filter(k => !decided.has(k) && SPOTS.some(s => window.HB.spotKey(s) === k));
    if (kept.length >= count) return kept.slice(0, count);
    const taken = new Set(kept);
    const undecided = SPOTS.filter(s => {
      const k = window.HB.spotKey(s);
      return k && !decided.has(k) && !taken.has(k);
    });
    const pool = undecided.length ? undecided : SPOTS.filter(s => !taken.has(window.HB.spotKey(s)));
    const fill = shuffle(pool).slice(0, count - kept.length).map(s => window.HB.spotKey(s));
    return [...kept, ...fill];
  }

  // === Chapter metadata · drives both the hero rotation and the up-next list. ===
  // Beyond has no SVG silhouette (it's outside Switzerland); the up-next
  // card falls back to its cover photo. `cover` is the file in img/m/
  // and img/thumbs/ — note the chapter id and cover slug don't always
  // match (western → leman_cover, eastern → east_cover) because the
  // photos were named after the geographic feature rather than the
  // chapter slug.
  const CHAPTERS_META = [
    { id: 'central',  name: 'Central Switzerland', color: '175,165,122', cover: 'central_cover.jpg',  mapSvg: 'img/region-central.svg',  description: 'Waterfalls, ridges, glacier lakes.' },
    { id: 'valais',   name: 'Valais',              color: '234,183,191', cover: 'valais_cover.jpg',   mapSvg: 'img/region-valais.svg',   description: 'Matterhorn country. Glaciers, ice caves, high passes.' },
    { id: 'fribourg', name: 'Fribourg',            color: '216,216,209', cover: 'fribourg_cover.jpg', mapSvg: 'img/region-fribourg.svg', description: 'Pre-alpine lakes and the Gastlosen wall.' },
    { id: 'western',  name: 'Western Switzerland', color: '204,224,158', cover: 'leman_cover.jpg',    mapSvg: 'img/region-western.svg',  description: 'Lake Léman, the Lavaux, smaller crowds.' },
    { id: 'eastern',  name: 'Eastern Switzerland', color: '124,181,168', cover: 'east_cover.jpg',     mapSvg: 'img/region-eastern.svg',  description: 'Appenzell, Säntis, lesser-known summits.' },
    { id: 'ticino',   name: 'Ticino',              color: '147,132,186', cover: 'ticino_cover.jpg',   mapSvg: 'img/region-ticino.svg',   description: 'Italian-Swiss country. Lakes, rivers, granite valleys.' },
    { id: 'beyond',   name: 'Beyond the Border',   color: '89,89,89',    cover: 'beyond_cover.jpg',   mapSvg: 'img/region-beyond.svg',   description: 'Chamonix, Mont Blanc, one French slice of Léman.' },
  ];

  // Introduction is the carousel's anchor — first slot so a fresh visitor
  // always lands on it. Uses the same transparent polaroid hero PNG as
  // /themap/success/ so the buyer feels they're in the same world. Not
  // in CHAPTERS_META because the up-next column is just the regions; the
  // intro lives in the hero rotation only.
  const INTRO_CARD = {
    id:           'intro',
    name:         'Introduction',
    description:  'Cover, camping rules, top picks · the front matter of the guide.',
    href:         'intro/',
    ctaLabel:     'Read the intro',
    kicker:       'Read this first',
    kickerPinned: true,
    isIntro:      true,
  };

  // Hand the hero its rotation pool now that CHAPTERS_META is in scope.
  featurePool = [INTRO_CARD, ...CHAPTERS_META];
  if (featurePool.length) paintFeature(featurePool[featureIdx], featureIdx);
  const upNextEl = document.getElementById('upNext');
  // Cap the up-next column at 4 cards by default; the rest go behind a
  // "Show all" button. The expansion is per-page-load only — coming
  // back to home from another screen resets to collapsed, so the
  // button is always available. (Used to persist via localStorage; now
  // intentionally session-scoped.)
  const HOME_UPNEXT_LIMIT = 4;
  let homeUpNextExpanded = false;
  function buildUpNext() {
    // Count spots per chapter so each card can show "N spots". Source of
    // truth is SPOTS, which is rebuilt from the unified store on every
    // Convex push, so this stays accurate across reactive updates.
    const counts = SPOTS.reduce((acc, s) => {
      const id = s.chapter_id;
      if (id) acc[id] = (acc[id] || 0) + 1;
      return acc;
    }, {});
    const renderCard = (ch) => {
      const count = counts[ch.id] || 0;
      const meta  = count + ' spot' + (count === 1 ? '' : 's');
      const photo = ch.mapSvg
        ? `<span class="photo cv-map" style="--region-color: ${ch.color}"><img src="${esc(ch.mapSvg)}" alt="" loading="lazy" /></span>`
        : `<span class="photo"><img src="img/thumbs/${ch.id}_cover.jpg" alt="" loading="lazy" /></span>`;
      return `
        <a class="up-next-card is-chapter" href="${esc(ch.id)}/">
          ${photo}
          <span class="body">
            <span class="name">${esc(ch.name)}</span>
            <span class="meta">${esc(meta)}</span>
          </span>
        </a>
      `;
    };
    const visible = CHAPTERS_META.slice(0, HOME_UPNEXT_LIMIT).map(renderCard).join('');
    const extras = CHAPTERS_META.slice(HOME_UPNEXT_LIMIT);
    const extrasMarkup = extras.length === 0 ? '' : `
      <div class="up-next-extras"${homeUpNextExpanded ? '' : ' hidden'}>
        ${extras.map(renderCard).join('')}
      </div>
      ${homeUpNextExpanded ? '' : `
        <button type="button" class="up-next-more" data-hb-upnext-more>
          Show all ${CHAPTERS_META.length}
        </button>
      `}
    `;
    upNextEl.innerHTML = visible + extrasMarkup;

    const moreBtn = upNextEl.querySelector('[data-hb-upnext-more]');
    if (moreBtn) {
      moreBtn.addEventListener('click', () => {
        const list = upNextEl.querySelector('.up-next-extras');
        if (list) list.hidden = false;
        moreBtn.remove();
        homeUpNextExpanded = true;
      });
    }
  }
  buildUpNext();

  // === Card row builder (For You / Famous / Gems) ===
  // Mirrors the chapter Grid tile (.ch-tile): bordered card, square photo,
  // padded meta block with kicker + title. Keeps the home page visually
  // aligned with the chapter pages.
  function rowCard(spot) {
    const region = REGION_NAME[spot.chapter] || spot.chapter_id;
    const kicker = window.HB.singularKicker(spot.kicker || '') || region;
    const href = window.HB.spotDetailHref(spot, '');
    const a = window.HB.photoAttrs({
      photoId: spot.imagePhotoId, image: spot.image,
      width: 1000, prefix: '',
      sizes: '(min-width: 1000px) 280px, 45vw',
    });
    const ss = a.srcset ? ` srcset="${esc(a.srcset)}" sizes="${esc(a.sizes)}"` : '';
    const k = window.HB.spotKey(spot) || '';
    return `
      <a class="row-card" href="${esc(href)}" title="${esc(spot.title)}" data-hb-spotkey="${esc(k)}">
        <div class="photo">
          <img src="${esc(a.src)}"${ss} alt="${esc(spot.title)}" loading="lazy" />
        </div>
        <div class="meta">
          <p class="kicker">${esc(kicker)}</p>
          <h3 class="title">${esc(spot.title)}</h3>
        </div>
      </a>
    `;
  }
  // Wire heart overlays into every .row-card produced by rowCard. Called
  // after each row's innerHTML lands.
  function wireRowCardActions(rowEl) {
    if (!rowEl) return;
    rowEl.querySelectorAll('.row-card[data-hb-spotkey]').forEach(card => {
      const k = card.getAttribute('data-hb-spotkey');
      if (k) window.HB.attachCardActions(card, k);
    });
  }

  let forYouKeys = [];
  function buildForYou() {
    forYouKeys = pickStable(forYouKeys, 4);
    const byKey = new Map(SPOTS.map(s => [window.HB.spotKey(s), s]));
    const picks = forYouKeys.map(k => byKey.get(k)).filter(Boolean);
    const el = document.getElementById('rowForYou');
    el.innerHTML = picks.map(rowCard).join('');
    wireRowCardActions(el);
  }
  function buildCurated(id, list) {
    const el = document.getElementById(id);
    if (!list.length) { el.innerHTML = ''; return; }
    el.innerHTML = list.slice(0, 4).map(rowCard).join('');
    wireRowCardActions(el);
  }

  buildForYou();
  buildCurated('rowFamous', famous);
  buildCurated('rowGems', gems);

  // === Search · Enter jumps to /full/browse/?q=... ===
  const searchInput = document.getElementById('homeSearch');
  searchInput.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const q = searchInput.value.trim();
    location.href = q ? `browse/?q=${encodeURIComponent(q)}` : 'browse/';
  });

  // Re-render when favorites or swipes change (cross-tab, server push,
  // or sign-in/out).
  window.HB.favorites.subscribe(() => { buildForYou(); buildUpNext(); });
  window.HB.swipes.subscribe(()    => { buildForYou(); buildUpNext(); });
  window.HB.session.subscribe(()   => { buildForYou(); buildUpNext(); });

  // When Convex pushes an update (admin edits a spot, photo published,
  // etc.), refresh every surface so the page reflects new data without
  // a reload. Hero pool is CHAPTERS_META (static), so no re-poolinjg —
  // we just refresh the spot-derived sections (For you / Famous / Gems)
  // and the up-next spot counts.
  window.HB.spots.subscribe(() => {
    refreshSpots();
    refreshCuratedPools();
    buildUpNext();
    buildForYou();
    buildCurated('rowFamous', famous);
    buildCurated('rowGems', gems);
  });
})();
</script>

</body>
</html>
