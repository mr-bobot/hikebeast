<script>window.HB_CONVEX_URL = "https://whimsical-sparrow-336.convex.cloud";</script>
<script src="../social.js"></script>
<script>
  // Read through the unified spots store: sidecar-seeded synchronously,
  // Convex-fed reactively. SPOTS is reassigned (not const) so re-renders
  // after a Convex update see fresh metadata + photos.
  let SPOTS = [];
  function refreshSpots() {
    SPOTS = window.HB.spots.all().filter(s => window.HB.hasRealImage(s));
  }
  refreshSpots();
  const LEGEND = window.LEGEND || [];

  const content = document.getElementById('content');
  const empty = document.getElementById('empty');
  const title = document.getElementById('title');
  const subtitle = document.getElementById('subtitle');
  const counter = document.getElementById('savedCount');

  function esc(s) { return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function tile(spot) {
    const a = document.createElement('a');
    a.className = 'hb-saved-tile';
    a.href = window.HB.spotDetailHref(spot, '../');
    a.title = spot.title;
    const region = LEGEND.find(c => c.number === spot.chapter);
    const regionName = region ? region.name : spot.chapter_id;
    const kicker = window.HB.singularKicker(spot.kicker || '');
    const sub = kicker ? `${esc(kicker)} · ${esc(regionName)}` : esc(regionName);
    const attrs = window.HB.photoAttrs({
      photoId: spot.imagePhotoId, image: spot.image,
      width: 1000, prefix: '../',
      sizes: '(min-width: 1200px) 25vw, (min-width: 600px) 33vw, 50vw',
    });
    const srcsetAttr = attrs.srcset ? ` srcset="${esc(attrs.srcset)}" sizes="${esc(attrs.sizes)}"` : '';
    a.innerHTML = `
      <div class="photo">
        <img src="${esc(attrs.src)}"${srcsetAttr} alt="${esc(spot.title)}" loading="lazy" decoding="async" />
      </div>
      <div class="body">
        <div class="name">${esc(spot.title)}</div>
        <div class="meta">${sub}</div>
      </div>
    `;
    const k = window.HB.spotKey(spot);
    if (k) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'hb-fav is-on';
      btn.setAttribute('data-hb-fav', k);
      btn.setAttribute('aria-label', 'Remove from favorites');
      btn.innerHTML = window.HB.icons.heartFill;
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        window.HB.favorites.toggle(k);
        // Saved page: removing a fav should drop the tile.
        a.style.transition = 'opacity 180ms ease, transform 180ms ease';
        a.style.opacity = '0';
        a.style.transform = 'scale(0.92)';
        setTimeout(render, 180);
      });
      a.appendChild(btn);
    }
    return a;
  }

  function render() {
    // Hold off until favorites store has its first definitive state. For
    // signed-in users this means waiting for the first Convex response;
    // anonymous users get localStorage synchronously so ready() is true
    // immediately. Prevents the "No favorites yet" flash that used to
    // appear for one tick before server-side favorites arrived.
    if (!window.HB.favorites.ready()) return;

    const keys = window.HB.favorites.list();
    const set = new Set(keys);
    const saved = SPOTS.filter(s => set.has(window.HB.spotKey(s)));
    counter.textContent = saved.length;

    if (!saved.length) {
      content.innerHTML = '';
      content.hidden = true;
      empty.hidden = false;
      title.textContent = 'Nothing saved yet.';
      subtitle.textContent = 'Tap the heart on any spot to bookmark it.';
      return;
    }

    empty.hidden = true;
    content.hidden = false;
    title.textContent = saved.length === 1 ? '1 spot saved.' : `${saved.length} spots saved.`;
    subtitle.textContent = 'Grouped by region. Tap a card to open the full entry.';

    // Group by chapter, in LEGEND order.
    const byChapter = new Map();
    LEGEND.forEach(c => byChapter.set(c.number, []));
    saved.forEach(s => {
      if (!byChapter.has(s.chapter)) byChapter.set(s.chapter, []);
      byChapter.get(s.chapter).push(s);
    });

    content.innerHTML = '';
    LEGEND.forEach(c => {
      const list = byChapter.get(c.number) || [];
      if (!list.length) return;
      const wrap = document.createElement('section');
      wrap.className = 'hb-group';
      const head = document.createElement('div');
      head.className = 'hb-group-head';
      head.innerHTML = `<h2>${esc(c.name)}</h2><span class="meta">${list.length} spot${list.length === 1 ? '' : 's'}</span>`;
      wrap.appendChild(head);
      const grid = document.createElement('div');
      grid.className = 'hb-saved-grid';
      list.forEach(s => grid.appendChild(tile(s)));
      wrap.appendChild(grid);
      content.appendChild(wrap);
    });
  }

  window.HB.favorites.subscribe(render);
  // When Convex pushes a spot update (e.g. a saved spot's primary photo
  // changed), repaint the saved cards too.
  window.HB.spots.subscribe(() => { refreshSpots(); render(); });
  render();
</script>
