<main class="hb-page">

  <div class="hb-filters">

        <button type="button" class="clear" id="clearQ" aria-label="Clear search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </label>
      <button type="button" class="hb-shuffle-btn" id="shuffleBtn" aria-label="Shuffle the wall">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        <span>Shuffle</span>

    </div>

    <div class="hb-chips" id="propChips" data-axis="property"></div>
  </div>

  <div id="grid" class="hb-grid"></div>
  <div id="empty" class="hb-empty" hidden>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.65" y2="16.65"/></svg>

    <p>Try a shorter search or pick a different region.</p>

<script src="../map/spots-data.js"></script>

<script src="../lib/convex.js"></script>
<script>window.HB_CONVEX_URL = "https://whimsical-sparrow-336.convex.cloud";</script>
<script src="../social.js"></script>
<script>
  // Manual scroll restoration. Safari's back-button shows a visible bounce
  // from scroll=0 to the saved position because its automatic restoration
  // runs after first paint. Taking over: save scroll on every visibility
  // change + navigation, restore synchronously on load before paint.
  // Chrome's behavior already nails it but the manual path is harmless.
  try { if ('scrollRestoration' in history) history.scrollRestoration = 'manual'; } catch {}
  const SCROLL_KEY = 'hb:browse:scrollY';
  function saveScroll() { try { sessionStorage.setItem(SCROLL_KEY, String(window.scrollY)); } catch {} }
  function restoreScroll() {
    try {
      const y = parseFloat(sessionStorage.getItem(SCROLL_KEY));
      if (Number.isFinite(y) && y > 0) window.scrollTo(0, y);
    } catch {}
  }
  // Save on every nav-away signal (covers tab swaps, link clicks, pagehide).
  window.addEventListener('pagehide', saveScroll);
  window.addEventListener('beforeunload', saveScroll);
  document.addEventListener('visibilitychange', () => { if (document.hidden) saveScroll(); });
  // Restore as early as possible. pageshow fires both on first load AND on
  // bfcache restore (event.persisted === true on the latter).
  window.addEventListener('pageshow', restoreScroll);

  // Read the catalog through the unified spots store so the page stays in
  // sync with Convex. window.HB.spots seeds synchronously from the static
  // sidecar (spots-data.js) and replaces with Convex data once the
  // websocket connects -- subscribe + re-render handles live edits.
  let SPOTS = [];
  let propIndex = [];
  let spotProps = new Map();
  // Stable random order: shuffle once, cache the position per spot, persist
  // across nav with a 1-hour TTL so coming back to /browse/ shows the same
  // wall (within the hour). Subsequent in-page refreshes (Convex updates)
  // reuse the cached position so the wall doesn't jump around when a spot's
  // photo updates. New spots discovered later get appended at the end
  // (still in random order via the fractional position).
  const BROWSE_ORDER_KEY = 'hb:browse:order';
  const BROWSE_ORDER_TTL_MS = 60 * 60 * 1000;
  function readPersistedOrder() {
    try {
      const raw = localStorage.getItem(BROWSE_ORDER_KEY);
      if (!raw) return null;
      const { savedAt, entries } = JSON.parse(raw);
      if (!Array.isArray(entries)) return null;
      if (Date.now() - (savedAt || 0) > BROWSE_ORDER_TTL_MS) return null;
      return new Map(entries);
    } catch { return null; }
  }
  function writePersistedOrder(map) {
    try {
      localStorage.setItem(BROWSE_ORDER_KEY, JSON.stringify({
        savedAt: Date.now(),
        entries: Array.from(map.entries()),
      }));
    } catch {}
  }
  let randomOrder = readPersistedOrder();  // spotKey -> position
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function refreshSpots() {
    // Include extras_entry rows (TODO markers) so Leon can see what's still
    // missing a photo. They render as a distinct placeholder tile.
    let list = window.HB.spots.all().filter(s =>
      window.HB.hasRealImage(s) || s.kind === 'extras_entry'
    );
    if (!randomOrder) {
      list = shuffle(list);
      randomOrder = new Map(list.map((s, i) => [s.spotKey || s.title, i]));
    } else {
      list.sort((a, b) => {
        const pa = randomOrder.get(a.spotKey || a.title);
        const pb = randomOrder.get(b.spotKey || b.title);
        if (pa == null && pb == null) return 0;
        if (pa == null) return 1;
        if (pb == null) return -1;
        return pa - pb;
      });
      // Newly-arrived spots: drop them at the tail, randomly ordered amongst themselves.
      let nextPos = randomOrder.size;
      list.forEach(s => {
        const k = s.spotKey || s.title;
        if (!randomOrder.has(k)) randomOrder.set(k, nextPos++ + Math.random());
      });
    }
    writePersistedOrder(randomOrder);
    SPOTS = list;
    propIndex = window.HB.buildPropertyIndex(SPOTS);
    spotProps = new Map(SPOTS.map(s => [s, new Set(window.HB.propertiesOf(s))]));
  }
  refreshSpots();
  const LEGEND = window.LEGEND || [];

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const visibleCount = document.getElementById('visibleCount');
  const chipsEl = document.getElementById('chips');
  const propChipsEl = document.getElementById('propChips');
  const q = document.getElementById('q');
  const clearQ = document.getElementById('clearQ');
  const search = document.querySelector('.hb-search');

  const state = {
    q: '',
    chapters: new Set(),    // empty = all regions
    properties: new Set(),  // empty = all types; multi-select OR
  };

  function esc(s) { return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // --- Region chips
  function renderChips() {
    const all = document.createElement('button');
    all.type = 'button';
    all.className = 'hb-chip' + (state.chapters.size === 0 ? ' is-on' : '');
    all.textContent = 'All regions';
    all.addEventListener('click', () => { state.chapters.clear(); update(); });
    chipsEl.appendChild(all);

    LEGEND.forEach(c => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'hb-chip';
      b.innerHTML = `<span class="swatch" style="background: rgb(${c.color});"></span><span>${esc(c.name)}</span>`;
      b.addEventListener('click', () => {
        // Multi-select OR: tap to add/remove, same as property chips
        // below. Lets the user pick "Valais + Ticino" the way they
        // can already pick "Lake + Glacier".
        if (state.chapters.has(c.number)) state.chapters.delete(c.number);
        else state.chapters.add(c.number);
        update();
      });
      chipsEl.appendChild(b);
    });
  }

  // --- Property chips (multi-select OR; "All types" clears) ---
  function renderPropChips() {
    propChipsEl.innerHTML = '';
    const all = document.createElement('button');
    all.type = 'button';
    all.className = 'hb-chip' + (state.properties.size === 0 ? ' is-on' : '');
    all.textContent = 'All types';
    all.addEventListener('click', () => { state.properties.clear(); update(); });
    propChipsEl.appendChild(all);
    propIndex.forEach(p => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'hb-chip';
      b.dataset.prop = p.id;
      b.innerHTML = `<span>${esc(p.label)}</span><span class="chip-count">${p.count}</span>`;
      b.addEventListener('click', () => {
        // Multi-select: tap to add/remove. Region chips stay solo-isolate.
        if (state.properties.has(p.id)) state.properties.delete(p.id);
        else state.properties.add(p.id);
        update();
      });
      propChipsEl.appendChild(b);
    });
  }

  function paintChips() {
    const all = chipsEl.children[0];
    if (all) all.classList.toggle('is-on', state.chapters.size === 0);
    LEGEND.forEach((c, i) => {
      const b = chipsEl.children[i + 1];
      if (b) b.classList.toggle('is-on', state.chapters.has(c.number));
    });
    // Property chips
    const allProp = propChipsEl.children[0];
    if (allProp) allProp.classList.toggle('is-on', state.properties.size === 0);
    propIndex.forEach((p, i) => {
      const b = propChipsEl.children[i + 1];
      if (b) b.classList.toggle('is-on', state.properties.has(p.id));
    });
  }

  // --- Tile rendering · image-only Pinterest-style; alt carries the title for a11y + ctrl-F.
  // Stores intrinsic dims as data-w / data-h so applySpans() can compute row spans
  // and decide which tiles get the 2-column landscape treatment.
  // Tile renderer takes a (spot, photo) tuple. A multi-photo spot produces
  // one tile per photo; an extras_entry produces a single TODO placeholder.
  function tile(item) {
    const spot = item.spot;
    const photo = item.photo;  // null for TODO tiles

    const a = document.createElement('a');
    a.className = 'hb-tile';
    a.href = window.HB.spotDetailHref(spot, '../');
    a.title = spot.title;

    // TODO marker for spots with no photo yet (kind=extras_entry, or any
    // kind=spot row that lacks an image). Renders as a flat 4:3 placeholder
    // so Leon can spot what's still missing.
    if (!photo) {
      a.classList.add('hb-tile-todo');
      a.dataset.w = 4;
      a.dataset.h = 3;
      a.innerHTML = `
        <span class="hb-tile-todo-fill" style="background-color: rgb(${spot.color || '120,120,120'});"></span>
        <span class="hb-tile-name">${esc(spot.title)}</span>
        <span class="hb-tile-todo-tag">Needs photo</span>
      `;
      return a;
    }

    // Intrinsic dims drive row-span layout. Three fallback tiers:
    //   1. photo.width/height — Convex-carried per-photo dims (rare; most
    //      Convex rows still have null dims).
    //   2. HB_PHOTO_DIMS[photo.photoId] — every derivative photoId is in
    //      this sidecar (built from w400.webp via build-photo-dims.mjs).
    //      This covers the universal case: every multi-photo gallery + every
    //      single-photo spot whose derivative ladder shipped.
    //   3. HB_THUMB_DIMS[photo.src | spot.image] — legacy thumb-dims sidecar
    //      keyed by file name. Kept for safety / pre-derivative spots.
    //   4. [4, 3] — last-resort guess. Triggers an applySpans re-flow.
    // Without tier 2, ~32 spots whose s.image filename didn't match a
    // thumb-dim key all started at [4, 3] and reshuffled once the WebP
    // decoded — the visible "load then resize" the user reported on Explore.
    const photoDims = (window.HB_PHOTO_DIMS || {})[photo.photoId];
    const dimsArr = (photo.width && photo.height)
      ? [photo.width, photo.height]
      : (photoDims
          || (window.HB_THUMB_DIMS || {})[photo.src]
          || (window.HB_THUMB_DIMS || {})[spot.image]
          || [4, 3]);
    a.dataset.w = dimsArr[0];
    a.dataset.h = dimsArr[1];
    const attrs = window.HB.photoAttrs({
      photoId: photo.photoId, image: photo.src || spot.image,
      width: 1000, prefix: '../',
      sizes: '(min-width: 1200px) 25vw, (min-width: 600px) 33vw, 50vw',
      intrinsicWidth: dimsArr[0], intrinsicHeight: dimsArr[1],
    });
    const srcsetAttr = attrs.srcset ? ` srcset="${esc(attrs.srcset)}" sizes="${esc(attrs.sizes)}"` : '';
    const img = `<img src="${esc(attrs.src)}"${srcsetAttr} alt="${esc(spot.title)}" width="${dimsArr[0]}" height="${dimsArr[1]}" loading="lazy" decoding="async" />`;
    a.innerHTML = img + `<span class="hb-tile-name">${esc(spot.title)}</span>`;
    // Heart button
    const k = window.HB.spotKey(spot);
    if (k) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'hb-fav';
      btn.setAttribute('data-hb-fav', k);
      btn.setAttribute('aria-label', 'Save to favorites');
      function paint() {
        const on = window.HB.favorites.has(k);
        btn.classList.toggle('is-on', on);
        btn.innerHTML = on ? window.HB.icons.heartFill : window.HB.icons.heartOut;
      }
      paint();
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        window.HB.favorites.toggle(k);
        paint();
      });
      a.appendChild(btn);
    }
    return a;
  }

  function filtered() {
    const term = state.q.trim().toLowerCase();
    const propsOn = state.properties.size > 0;
    return SPOTS.filter(s => {
      if (state.chapters.size > 0 && !state.chapters.has(s.chapter)) return false;
      if (propsOn) {
        const set = spotProps.get(s) || new Set();
        let any = false;
        for (const p of state.properties) { if (set.has(p)) { any = true; break; } }
        if (!any) return false;
      }
      if (!term) return true;
      const hay = `${s.title} ${s.kicker} ${s.chapter_id}`.toLowerCase();
      return hay.includes(term);
    });
  }

  // Compute grid-row span (and grid-column span for landscapes) from intrinsic
  // image dims. Wide images (aspect > 1.4) get .span-wide so they take 2 cols,
  // but only when the grid is at least 3 cols wide -- a 2-col-span on mobile
  // would mean every wide spot blows up to full width and the layout feels
  // like a single column.
  function applySpans() {
    if (!grid.children.length) return;
    const cs = getComputedStyle(grid);
    const tmpl = cs.gridTemplateColumns.split(' ').filter(Boolean);
    const cols = tmpl.length;
    const colW = parseFloat(tmpl[0]);
    const gap = parseFloat(cs.rowGap || cs.gap || '0');
    const rowH = parseFloat(cs.gridAutoRows);
    if (!colW || !rowH) return;
    // Stable per-tile "feature" flag drawn from the image filename so the
    // same tiles get hero treatment between renders (no random reshuffles
    // on filter / fav toggle). Roughly every 7th tall portrait is promoted.
    function hash(s) {
      let h = 0; for (let i = 0; i < s.length; i++) { h = (h * 31 + s.charCodeAt(i)) >>> 0; }
      return h;
    }
    Array.from(grid.children).forEach(t => {
      // Prefer the image's natural dimensions once it has loaded.
      // Most Convex photos still carry width:null/height:null, so the
      // tile-render fallback writes [4,3] into the dataset, which
      // makes 90% of tiles read as "boring square" and miss the
      // landscape (>1.4) / portrait (<0.8) thresholds below. Once the
      // <img> decodes, naturalWidth gives us the truth.
      const img = t.querySelector('img');
      if (img && img.naturalWidth && img.naturalHeight) {
        t.dataset.w = img.naturalWidth;
        t.dataset.h = img.naturalHeight;
      }
      const w = +t.dataset.w;
      const h = +t.dataset.h;
      if (!w || !h) return;
      const aspect = w / h;
      const isLandscape = aspect > 1.4;
      const isTallPortrait = aspect < 0.8;
      const featureKey = t.querySelector('img')?.src || '';
      const featurePortrait = isTallPortrait && (hash(featureKey) % 7 === 0);
      const spanCol = (cols >= 3 && (isLandscape || featurePortrait)) ? 2 : 1;
      const tileW = colW * spanCol + gap * (spanCol - 1);
      const tileH = tileW * (h / w);
      const spanRow = Math.max(1, Math.round((tileH + gap) / (rowH + gap)));
      t.classList.toggle('span-wide', spanCol === 2 && isLandscape);
      t.classList.toggle('span-tall', spanCol === 2 && featurePortrait);
      t.style.gridRowEnd = 'span ' + spanRow;
    });
    grid.classList.add('is-ready');
  }

  // Round-robin every spot's photos into a flat tile list so the same spot's
  // multiple photos get spread across the wall instead of clumping. Single-
  // photo spots and TODO markers contribute exactly one tile each.
  function expandToPhotoTiles(spots) {
    const queues = spots.map(s => {
      if (s.kind === 'extras_entry' || !s.photos || s.photos.length === 0) {
        return [{ spot: s, photo: null }];
      }
      return s.photos.map(p => ({ spot: s, photo: p }));
    });
    const out = [];
    let active = queues.filter(q => q.length > 0);
    while (active.length) {
      for (const q of active) out.push(q.shift());
      active = active.filter(q => q.length > 0);
    }
    return out;
  }

  // Cached tiles-key for the most-recent render. Convex pushes spots:list
  // a few hundred ms after the sidecar paint and again on every
  // favorites/swipe broadcast; if the filtered list is byte-identical to
  // what's already in the grid, the rebuild would just flicker every
  // image. Skip the DOM swap in that case; chips + counts are still
  // safe to update (they're textContent / class toggles, no flicker).
  let lastTilesKey = '';
  function update() {
    const list = filtered();
    const tileItems = expandToPhotoTiles(list);
    const tilesKey = tileItems
      .map(it => (it.photo && it.photo.photoId) || it.spot?.image || it.spot?.id || '')
      .join('|');
    visibleCount.textContent = tileItems.length;
    empty.hidden = tileItems.length > 0;
    grid.hidden = list.length === 0;
    paintChips();
    if (tilesKey === lastTilesKey) return;
    lastTilesKey = tilesKey;
    grid.classList.remove('is-ready');
    grid.innerHTML = '';
    tileItems.forEach(it => grid.appendChild(tile(it)));
    requestAnimationFrame(applySpans);
  }

  // Recompute spans when the viewport crosses a column-count breakpoint.
  let resizeT = 0;
  new ResizeObserver(() => { clearTimeout(resizeT); resizeT = setTimeout(applySpans, 80); }).observe(grid);

  // Re-run as images decode so landscapes that started with the [4,3]
  // fallback get promoted to .span-wide once their real dims arrive.
  // Debounced so a wave of lazy-loaded thumbnails triggers one layout
  // pass instead of one per image.
  let loadT = 0;
  grid.addEventListener('load', (e) => {
    if (e.target && e.target.tagName === 'IMG') {
      clearTimeout(loadT);
      loadT = setTimeout(applySpans, 100);
    }
  }, true);

  // --- Search wiring
  q.addEventListener('input', () => {
    state.q = q.value;
    search.classList.toggle('has-value', !!q.value);
    update();
  });
  clearQ.addEventListener('click', () => {
    q.value = '';
    state.q = '';
    search.classList.remove('has-value');
    q.focus();
    update();
  });

  // --- Shuffle: discard the persisted order and re-randomise the wall.
  // Useful when the user wants new tiles on top instead of waiting for
  // the 1-hour TTL to expire. Clears localStorage so the new order
  // becomes the next persisted snapshot.
  const shuffleBtn = document.getElementById('shuffleBtn');
  shuffleBtn.addEventListener('click', () => {
    try { localStorage.removeItem(BROWSE_ORDER_KEY); } catch {}
    randomOrder = null;
    refreshSpots();
    // refreshSpots writes the freshly-shuffled order back to localStorage.
    // We also clear lastTilesKey so update() actually rebuilds the grid
    // (otherwise the early-return would think nothing changed).
    lastTilesKey = '';
    update();
    // Scroll back to the top so the first row of new tiles is visible.
    window.scrollTo({ top: 0, behavior: 'smooth' });
    // Brief spin so the user sees the action registered.
    shuffleBtn.classList.add('is-spinning');
    setTimeout(() => shuffleBtn.classList.remove('is-spinning'), 600);
  });

  // Re-paint hearts when fav state changes (e.g. cross-tab or from another tile)
  window.HB.favorites.subscribe(() => {
    document.querySelectorAll('[data-hb-fav]').forEach(btn => {
      const k = btn.getAttribute('data-hb-fav');
      const on = window.HB.favorites.has(k);
      btn.classList.toggle('is-on', on);
      btn.innerHTML = on ? window.HB.icons.heartFill : window.HB.icons.heartOut;
    });
  });

  renderChips();
  renderPropChips();

  // When Convex pushes an update (admin published a photo, edited a spot,
  // etc.), refresh the in-memory catalog and re-render. Property chips
  // rebuild too in case new categories appeared.
  window.HB.spots.subscribe(() => {
    refreshSpots();
    propChipsEl.innerHTML = '';
    renderPropChips();
    update();
  });
  // Pre-fill the search field from ?q= so the home page search lands on
  // filtered results rather than an unfiltered grid.
  try {
    const q0 = new URLSearchParams(location.search).get('q');
    if (q0) {
      q.value = q0;
      state.q = q0;
      search.classList.add('has-value');
    }
  } catch {}
  update();

  // ──────────────────────────────────────────────────────────────────────
  // Mobile filter sheet
  //
  // The two pill rows (regions, then property types) take up a lot of
  // vertical real-estate before the user has even seen the grid. On
  // mobile we collapse them behind a single "Filter" button. Tapping
  // the button slides a sheet up from the bottom that contains the
  // existing chip rows verbatim (we MOVE them — same DOM nodes, no
  // duplicate render path). When the sheet closes the nodes stay put
  // there; the page chooses what to show by class on `.hb-filters`.
  // Desktop never enters this branch — the chips render inline as
  // before.
  (function setupMobileFilterSheet() {
    if (!matchMedia('(max-width: 700px)').matches) return;
    const filtersBlock = document.querySelector('.hb-filters');
    const search = filtersBlock.querySelector('.hb-search');
    const chipsRegion = document.getElementById('chips');
    const chipsProp = document.getElementById('propChips');
    if (!filtersBlock || !chipsRegion || !chipsProp) return;

    // Filter trigger button (rendered next to the search bar via CSS)
    const trigger = document.createElement('button');
    trigger.type = 'button';
    trigger.className = 'hb-filter-trigger';
    trigger.setAttribute('aria-haspopup', 'dialog');
    trigger.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      <span>Filter</span>
      <span class="hb-filter-badge" data-filter-badge hidden>0</span>
    `;
    filtersBlock.insertBefore(trigger, chipsRegion);

    // Sheet shell
    const sheet = document.createElement('div');
    sheet.className = 'hb-filter-sheet';
    sheet.setAttribute('role', 'dialog');
    sheet.setAttribute('aria-modal', 'true');
    sheet.setAttribute('aria-label', 'Filter spots');
    sheet.innerHTML = `
      <div class="hb-filter-sheet-backdrop" data-close></div>
      <div class="hb-filter-sheet-card">
        <div class="hb-filter-sheet-grabber" aria-hidden="true"></div>
        <div class="hb-filter-sheet-head">
          <h3>Filter</h3>
          <button type="button" class="hb-filter-clear" data-clear>Clear</button>
        </div>
        <div class="hb-filter-sheet-body">
          <p class="hb-filter-section-label">Region</p>
          <div class="hb-filter-sheet-row" data-slot="region"></div>
          <p class="hb-filter-section-label">Type</p>
          <div class="hb-filter-sheet-row" data-slot="property"></div>
        </div>
        <div class="hb-filter-sheet-foot">
          <button type="button" class="hb-filter-apply" data-close>Show results</button>
        </div>
      </div>
    `;
    document.body.appendChild(sheet);
    sheet.querySelector('[data-slot="region"]').appendChild(chipsRegion);
    sheet.querySelector('[data-slot="property"]').appendChild(chipsProp);

    function open()  { sheet.classList.add('is-open'); document.documentElement.classList.add('hb-menu-open'); }
    function close() { sheet.classList.remove('is-open'); document.documentElement.classList.remove('hb-menu-open'); }

    trigger.addEventListener('click', open);
    sheet.addEventListener('click', (e) => {
      if (e.target.closest('[data-close]')) close();
      if (e.target.closest('[data-clear]')) {
        // Reset to "all" by clicking the first chip in each row (which is
        // the "All ..." pill). The existing chip handlers do the rest.
        chipsRegion.querySelector('.hb-chip')?.click();
        chipsProp.querySelector('.hb-chip')?.click();
      }
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && sheet.classList.contains('is-open')) close();
    });

    // Active-filter count → badge on the trigger pill. Watches both chip
    // rows for the `is-on` class on chips that aren't the leading "All"
    // pill. We re-count on every chip click via a delegated listener
    // attached at the body level (chip handlers live in browse code).
    const badge = trigger.querySelector('[data-filter-badge]');
    function updateBadge() {
      let count = 0;
      [chipsRegion, chipsProp].forEach(group => {
        const onChips = group.querySelectorAll('.hb-chip.is-on');
        // Subtract 1 for the leading "All <axis>" chip if it's the
        // active one — that means no specific filter is set.
        const first = group.querySelector('.hb-chip');
        const allActive = first && first.classList.contains('is-on') && onChips.length === 1;
        if (allActive) return;
        count += onChips.length;
      });
      if (count > 0) {
        badge.textContent = String(count);
        badge.hidden = false;
      } else {
        badge.hidden = true;
      }
    }
    // Repaint after every chip click (chip handlers paint state then we
    // recount). Use a microtask defer so we read the post-click DOM.
    sheet.addEventListener('click', (e) => {
      if (e.target.closest('.hb-chip')) queueMicrotask(updateBadge);
    });
    updateBadge();
  })();
</script>

</body>
</html>
