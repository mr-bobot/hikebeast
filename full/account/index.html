<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ffffff" />
<script>(function(){try{if(localStorage.getItem('hb-theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');var m=document.querySelector('meta[name="theme-color"]');if(m)m.setAttribute('content','#0b0d10');}}catch(e){}})();</script>
<title>Account · Gems of Switzerland · Hikebeast</title>
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet" />
<meta name="referrer" content="no-referrer" />
<link rel="icon" type="image/jpeg" href="../../images/favicon.jpg" />
<link rel="apple-touch-icon" href="../../images/favicon.jpg" />
<link rel="stylesheet" href="../preview.css" />
<style>
  /* Account page · single centered card, login-style. Three editable
     sections (avatar, username, email), each its own form so one
     section's error doesn't blow up the others. Sections separated by
     hairline rules inside one glassmorphic card; matches /login/ and
     /full/affiliate/. Helper text dropped — errors surface on save. */

  /* Background — same blue-blob wash as /login/. In dark mode the
     blob alphas drop ~3x so it reads as atmospheric haze, not Day-Glo.
     See the dark override block at the bottom of this <style>. */
  body {
    margin: 0;
    min-height: 100dvh;
    background: var(--bg);
    color: var(--fg);
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: -120px;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(460px 420px at 18% 22%, rgba(0, 113, 227, 0.45) 0%, transparent 70%),
      radial-gradient(420px 380px at 82% 28%, rgba(96, 165, 250, 0.38) 0%, transparent 72%),
      radial-gradient(520px 480px at 50% 92%, rgba(56, 132, 220, 0.40) 0%, transparent 70%),
      radial-gradient(380px 360px at 92% 78%, rgba(180, 210, 255, 0.55) 0%, transparent 75%);
    filter: blur(70px) saturate(1.1);
    opacity: 0.9;
  }

  .acc-page {
    position: relative; z-index: 1;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 24px 20px;
  }
  .card-wrap { margin: auto; width: 100%; max-width: 460px; }

  /* Back link · sits above the card, left-aligned with the card edge,
     solid white pill so it reads cleanly against the gradient. */
  .back {
    display: inline-flex; align-items: center; gap: 4px;
    color: var(--fg);
    font-size: 13px; font-weight: 500;
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--paper);
    border: 1px solid var(--hairline);
    margin-bottom: 14px;
    transition: border-color 150ms ease, transform 100ms ease;
  }
  .back:hover { border-color: var(--hairline-strong); }
  .back:active { transform: scale(0.98); }

  /* Legal footer · below the card, two stacked lines. */
  .legal-foot {
    text-align: center;
    margin-top: 16px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }
  .legal-foot a { color: var(--muted); text-decoration: none; }
  .legal-foot a:hover { color: var(--fg); }
  .legal-foot .sep { margin: 0 6px; }
  .legal-foot .copy { display: block; }
  .card {
    background: var(--glass);
    -webkit-backdrop-filter: saturate(180%) blur(18px);
    backdrop-filter: saturate(180%) blur(18px);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }

  .brand {
    display: flex; align-items: center; gap: 10px;
    padding: 28px 28px 18px;
  }
  .brand img {
    width: 32px; height: 32px;
    border-radius: 999px; object-fit: cover; object-position: 70% 45%;
  }
  .brand b {
    font-family: "SF Pro Display", -apple-system, system-ui, sans-serif;
    font-size: 14px; font-weight: 600; letter-spacing: -0.01em;
  }

  .sec {
    padding: 18px 28px;
    border-top: 1px solid var(--hairline);
  }
  .sec.first { border-top: 0; padding-top: 4px; }
  .sec.last  { padding-bottom: 24px; }
  .sec-label {
    font-size: 11px; font-weight: 600;
    color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin: 0 0 8px;
  }

  /* Avatar row · square thumbnail + upload action. */
  .avatar-row { display: flex; align-items: center; gap: 14px; }
  .avatar-preview {
    width: 56px; height: 56px;
    border-radius: 999px;
    overflow: hidden;
    background: var(--surface);
    display: grid; place-items: center;
    flex-shrink: 0;
    border: 1px solid var(--hairline);
  }
  .avatar-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .avatar-preview[data-empty="false"] { background: var(--paper); }
  .avatar-initials {
    font-size: 22px; font-weight: 600;
    color: var(--muted); letter-spacing: -0.02em;
    user-select: none;
  }
  .avatar-preview[data-empty="false"] .avatar-initials { display: none; }
  .avatar-controls { display: flex; flex-direction: column; gap: 6px; align-items: flex-start; }

  /* Editable row · input + Save side by side, label in .sec-label above. */
  .row { display: flex; gap: 8px; align-items: stretch; }
  .input {
    flex: 1; min-width: 0;
    height: 42px; padding: 0 14px;
    border: 1px solid var(--hairline); background: var(--paper);
    border-radius: 12px; font: inherit; font-size: 15px;
    letter-spacing: -0.01em; color: var(--fg);
    -webkit-appearance: none;
    transition: border-color 150ms ease, box-shadow 150ms ease;
  }
  .input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(0,113,227,0.15);
  }
  .btn {
    height: 42px; padding: 0 16px;
    border-radius: var(--radius-btn);
    background: var(--fg); color: #fff;
    border: 0; cursor: pointer;
    font: inherit; font-size: 13.5px; font-weight: 600;
    letter-spacing: -0.01em;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 150ms ease, transform 100ms ease;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.92; }
  .btn:active { transform: scale(0.98); }
  .btn[disabled] { opacity: 0.55; cursor: not-allowed; }
  .btn-ghost {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--hairline);
  }
  .btn-link {
    background: transparent; border: 0; padding: 0;
    color: var(--muted); font: inherit; font-size: 13px;
    cursor: pointer; text-decoration: underline;
  }
  .btn-link:hover { color: var(--fg); }

  .current {
    color: var(--muted);
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
  }

  .msg {
    margin: 8px 0 0; padding: 6px 10px;
    border-radius: 10px;
    font-size: 12.5px; line-height: 1.4;
  }
  .msg[hidden] { display: none; }
  .msg.is-error   { background: rgba(255, 59, 48, 0.08);  color: #c4302b; }
  .msg.is-success { background: rgba(52, 199, 89, 0.10);  color: #1f7a36; }

  /* Affiliate row · whole-row link to /full/affiliate/. Hidden when
     isAffiliate=false. */
  .aff-link {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none;
    color: var(--fg);
    margin: -4px 0;
    padding: 4px 0;
  }
  .aff-link:hover .aff-link-title { text-decoration: underline; }
  .aff-link-icon {
    width: 32px; height: 32px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .aff-link-body { flex: 1; display: flex; flex-direction: column; gap: 1px; }
  .aff-link-title { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .aff-link-sub   { font-size: 12px; color: var(--muted); }
  .aff-link-chev  { color: var(--muted); flex-shrink: 0; }

  /* Loading / signed-out states inside the card. */
  .state {
    padding: 32px 28px;
    text-align: center;
    font-size: 13px; color: var(--muted); line-height: 1.55;
  }
  .state a { color: var(--accent); text-decoration: none; }

  /* === Dark mode overrides === */

  /* Blue-blob bg: drop alpha ~3x so it reads as haze, not Day-Glo. */
  :root[data-theme="dark"] body::before {
    background:
      radial-gradient(460px 420px at 18% 22%, rgba(10, 132, 255, 0.16) 0%, transparent 70%),
      radial-gradient(420px 380px at 82% 28%, rgba(96, 165, 250, 0.12) 0%, transparent 72%),
      radial-gradient(520px 480px at 50% 92%, rgba(56, 132, 220, 0.14) 0%, transparent 70%),
      radial-gradient(380px 360px at 92% 78%, rgba(180, 210, 255, 0.10) 0%, transparent 75%);
    opacity: 0.7;
  }

  /* Primary CTA: in dark, --fg is near-white so the default fill
     would be white-on-white. Switch to deep navy so it still reads
     as a primary heavy button. */
  :root[data-theme="dark"] .btn { background: #003162; color: #fff; }

  /* Message pills: the inline color values (#c4302b, #1f7a36) are
     dark-on-light. In dark they need lighter foreground equivalents. */
  :root[data-theme="dark"] .msg.is-error   { background: rgba(255, 69, 58, 0.18); color: #ff8a85; }
  :root[data-theme="dark"] .msg.is-success { background: rgba(48, 209, 88, 0.18); color: #69e6a4; }

</style>
</head>
<body>

<main class="acc-page">
 <div class="card-wrap">
  <a class="back" href="../">← Back</a>
  <div class="card">
    <div id="accLoading" class="state">Loading…</div>

    <div id="accSignedOut" class="state" hidden>
      Sign in to manage your account.<br>
      <a href="/login/">Sign in →</a>
    </div>

    <div id="accContent" hidden>
      <div class="brand">
        <img src="/images/avatar.jpg" alt="" />
        <b>Hikebeast · Account</b>
      </div>

      <!-- Avatar ──────────────────────────────────────────────────────── -->
      <div class="sec first">
        <div class="avatar-row">
          <div class="avatar-preview" id="avatarPreview" data-empty="true">
            <span class="avatar-initials" id="avatarInitials">?</span>
          </div>
          <div class="avatar-controls">
            <input type="file" id="avatarFile" accept="image/jpeg,image/png,image/webp" hidden />
            <button type="button" class="btn btn-ghost" id="avatarUploadBtn">Upload photo</button>
            <button type="button" id="avatarClearBtn" class="btn-link" hidden>Remove</button>
          </div>
        </div>
        <p class="msg" id="avatarMsg" hidden></p>
      </div>

      <!-- Username ────────────────────────────────────────────────────── -->
      <div class="sec">
        <p class="sec-label">Username <span class="current" id="curUsername"></span></p>
        <form id="usernameForm" novalidate>
          <div class="row">
            <input id="usernameInput" class="input" type="text"
                   autocomplete="off" autocapitalize="off" spellcheck="false"
                   pattern="[a-z0-9._\-]{2,32}" required />
            <button type="submit" class="btn">Save</button>
          </div>
          <p class="msg" id="usernameMsg" hidden></p>
        </form>
      </div>

      <!-- Email ───────────────────────────────────────────────────────── -->
      <div class="sec">
        <p class="sec-label">Email <span class="current" id="curEmail"></span></p>
        <form id="emailForm" novalidate>
          <div class="row">
            <input id="emailInput" class="input" type="email"
                   autocomplete="email" autocapitalize="off" spellcheck="false" required />
            <button type="submit" class="btn">Save</button>
          </div>
          <p class="msg" id="emailMsg" hidden></p>
        </form>
      </div>

      <!-- Affiliate dashboard link, only for users with isAffiliate=true. -->
      <div class="sec" id="affiliateTeaser" hidden>
        <a class="aff-link" href="../affiliate/">
          <span class="aff-link-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          </span>
          <span class="aff-link-body">
            <span class="aff-link-title">Affiliate dashboard</span>
            <span class="aff-link-sub">Your link and your referrals</span>
          </span>
          <span class="aff-link-chev">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </span>
        </a>
      </div>

      <!-- Log out — destructive action at the bottom. -->
      <div class="sec last">
        <button type="button" id="signoutBtn" class="btn btn-ghost" style="width:100%;">Log out</button>
      </div>
    </div>
  </div>
  <footer class="legal-foot">
    <a href="../../terms.html">Terms</a><span class="sep">·</span><a href="../../imprint.html">Imprint</a><span class="sep">·</span><a href="../../privacy.html">Privacy</a>
    <span class="copy">© Hikebeast</span>
  </footer>
 </div>
</main>

<script src="../lib/convex.js"></script>
<script>window.HB_CONVEX_URL = "https://whimsical-sparrow-336.convex.cloud";</script>
<script>
  // We don't need the full social.js layer here (no spots, no favorites,
  // no kebabs). We just need the Convex client + the same sessionToken the
  // rest of /full/ persists in localStorage:hb:session:v1. Read it
  // directly, talk to Convex via the global `convex.ConvexClient`.
  (function () {
    const SESSION_KEY = 'hb:session:v1';
    const accLoading    = document.getElementById('accLoading');
    const accSignedOut  = document.getElementById('accSignedOut');
    const accContent    = document.getElementById('accContent');
    const curUsername   = document.getElementById('curUsername');
    const curEmail      = document.getElementById('curEmail');
    const usernameInput = document.getElementById('usernameInput');
    const emailInput    = document.getElementById('emailInput');
    const avatarPreview = document.getElementById('avatarPreview');
    const avatarInitials= document.getElementById('avatarInitials');
    const avatarFile    = document.getElementById('avatarFile');
    const avatarUploadBtn = document.getElementById('avatarUploadBtn');
    const avatarClearBtn  = document.getElementById('avatarClearBtn');
    const avatarMsg     = document.getElementById('avatarMsg');

    const token = (() => {
      try { return localStorage.getItem(SESSION_KEY) || ''; } catch { return ''; }
    })();

    let client = null;
    if (window.convex && window.HB_CONVEX_URL) {
      try { client = new window.convex.ConvexClient(window.HB_CONVEX_URL); }
      catch (e) { console.warn('Convex init failed:', e); }
    }
    if (!client || !token) {
      accLoading.hidden = true;
      accSignedOut.hidden = false;
      return;
    }

    // Initial paint: read currentUser to populate the form. We do a one-shot
    // query (not a reactive subscription) because nothing on this page
    // benefits from server-pushed updates -- the user IS the only writer.
    function paintAvatar(url, displayName) {
      // Drop any prior <img> child so re-paints don't stack.
      const existing = avatarPreview.querySelector('img');
      if (existing) existing.remove();
      avatarInitials.textContent = (displayName || '?').slice(0, 1).toUpperCase();
      if (url) {
        const img = document.createElement('img');
        img.alt = '';
        img.src = url;
        avatarPreview.appendChild(img);
        avatarPreview.dataset.empty = 'false';
        avatarClearBtn.hidden = false;
      } else {
        avatarPreview.dataset.empty = 'true';
        avatarClearBtn.hidden = true;
      }
    }

    client.query('auth:currentUser', { sessionToken: token })
      .then((u) => {
        if (!u) {
          accLoading.hidden = true;
          accSignedOut.hidden = false;
          return;
        }
        curUsername.textContent = '· currently ' + u.username;
        usernameInput.value = u.username;
        curEmail.textContent = u.email ? ('· currently ' + u.email) : '';
        emailInput.value = u.email || '';
        paintAvatar(u.avatarUrl, u.handle || u.username);
        // Affiliate teaser only renders for users with isAffiliate=true
        // (influencers). Default-hidden in HTML; we unhide here.
        if (u.isAffiliate) {
          const teaser = document.getElementById('affiliateTeaser');
          if (teaser) teaser.hidden = false;
        }
        accLoading.hidden = true;
        accContent.hidden = false;
      })
      .catch((err) => {
        console.warn('currentUser failed:', err);
        accLoading.hidden = true;
        accSignedOut.hidden = false;
      });

    // Section helper: drives one form's submit/save state + flash messages.
    // Takes a mutation name + an args-builder + a "what to do on success".
    function wireSection(formId, msgId, mutation, buildArgs, onOk) {
      const form = document.getElementById(formId);
      const msg  = document.getElementById(msgId);
      const btn  = form.querySelector('.btn');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msg.hidden = true; msg.className = 'msg';
        const orig = btn.textContent;
        btn.disabled = true; btn.textContent = 'Saving…';
        try {
          const args = buildArgs();
          if (!args) { btn.disabled = false; btn.textContent = orig; return; }
          const result = await client.mutation(mutation, { sessionToken: token, ...args });
          msg.hidden = false; msg.className = 'msg is-success';
          msg.textContent = 'Saved.';
          if (onOk) onOk(result);
        } catch (err) {
          const text = (err && err.message) ? String(err.message) : 'Save failed.';
          msg.hidden = false; msg.className = 'msg is-error';
          // Convex throws as "Uncaught Error: <message> at handler" on the
          // wire. Strip the prefix for readability.
          msg.textContent = text.replace(/^.*?Error:\s*/, '').replace(/\s+at\s+handler.*$/, '');
        } finally {
          btn.disabled = false; btn.textContent = orig;
        }
      });
    }

    // Avatar upload: 3-step Convex storage pattern.
    //   1. mutation generateAvatarUploadUrl → upload URL
    //   2. POST file to that URL → { storageId }
    //   3. mutation setAvatar(storageId) → patches user, returns avatarUrl
    avatarUploadBtn.addEventListener('click', () => avatarFile.click());
    avatarFile.addEventListener('change', async () => {
      avatarMsg.hidden = true; avatarMsg.className = 'msg';
      const file = avatarFile.files && avatarFile.files[0];
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) {
        avatarMsg.hidden = false; avatarMsg.className = 'msg is-error';
        avatarMsg.textContent = 'File is over 5 MB. Try a smaller image.';
        avatarFile.value = '';
        return;
      }
      const orig = avatarUploadBtn.textContent;
      avatarUploadBtn.disabled = true; avatarUploadBtn.textContent = 'Uploading…';
      try {
        const uploadUrl = await client.mutation('auth:generateAvatarUploadUrl', { sessionToken: token });
        const upRes = await fetch(uploadUrl, {
          method:  'POST',
          headers: { 'Content-Type': file.type || 'application/octet-stream' },
          body:    file,
        });
        if (!upRes.ok) throw new Error('Upload failed');
        const { storageId } = await upRes.json();
        const result = await client.mutation('auth:setAvatar', { sessionToken: token, storageId });
        // Bust any cached <img> by appending a query string. The URL
        // Convex returns is signed and (effectively) immutable per id,
        // so this cache-bust just covers same-tab re-render only.
        paintAvatar(result.avatarUrl + (result.avatarUrl.includes('?') ? '&' : '?') + 't=' + Date.now(),
                    usernameInput.value || 'X');
        avatarMsg.hidden = false; avatarMsg.className = 'msg is-success';
        avatarMsg.textContent = 'Profile picture updated.';
      } catch (err) {
        avatarMsg.hidden = false; avatarMsg.className = 'msg is-error';
        avatarMsg.textContent = (err && err.message) ? String(err.message) : 'Upload failed.';
      } finally {
        avatarFile.value = '';   // let the same file be reselected
        avatarUploadBtn.disabled = false; avatarUploadBtn.textContent = orig;
      }
    });

    avatarClearBtn.addEventListener('click', async () => {
      avatarMsg.hidden = true;
      avatarClearBtn.disabled = true;
      try {
        await client.mutation('auth:clearAvatar', { sessionToken: token });
        paintAvatar(null, usernameInput.value || 'X');
        avatarMsg.hidden = false; avatarMsg.className = 'msg is-success';
        avatarMsg.textContent = 'Profile picture removed.';
      } catch (err) {
        avatarMsg.hidden = false; avatarMsg.className = 'msg is-error';
        avatarMsg.textContent = (err && err.message) ? String(err.message) : 'Could not remove picture.';
      } finally {
        avatarClearBtn.disabled = false;
      }
    });

    wireSection('usernameForm', 'usernameMsg', 'auth:updateUsername',
      () => ({ newUsername: usernameInput.value.trim().toLowerCase() }),
      (r) => { if (r?.username) { curUsername.textContent = '· currently ' + r.username; } },
    );

    // Email goes through /api/login (action: change_email) instead of the
    // Convex mutation directly so the lambda can fire confirmation emails
    // to BOTH old and new addresses on success. The mutation it calls is
    // still auth:updateEmail; the lambda is just a thin wrapper that
    // returns oldEmail+newEmail for the email-template path.
    const emailForm = document.getElementById('emailForm');
    const emailMsg  = document.getElementById('emailMsg');
    emailForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      emailMsg.hidden = true; emailMsg.className = 'msg';
      const btn = emailForm.querySelector('.btn');
      const orig = btn.textContent;
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action:       'change_email',
            sessionToken: token,
            newEmail:     emailInput.value.trim().toLowerCase(),
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          emailMsg.hidden = false; emailMsg.className = 'msg is-error';
          emailMsg.textContent = (data && (data.message || data.error)) || 'Save failed.';
          return;
        }
        emailMsg.hidden = false; emailMsg.className = 'msg is-success';
        emailMsg.textContent = data.notified
          ? 'Saved. We sent confirmation emails to your old and new addresses.'
          : 'Saved.';
        if (data.email) curEmail.textContent = '· currently ' + data.email;
      } catch {
        emailMsg.hidden = false; emailMsg.className = 'msg is-error';
        emailMsg.textContent = 'Network error. Try again.';
      } finally {
        btn.disabled = false; btn.textContent = orig;
      }
    });

    // Log out: clear the local session + hb_full_auth cookie + revoke the
    // Convex session, then send the user to /login. Same path social.js's
    // signout takes -- duplicated here because /full/account/ doesn't
    // load social.js (it's a standalone page).
    const signoutBtn = document.getElementById('signoutBtn');
    if (signoutBtn) {
      signoutBtn.addEventListener('click', async () => {
        signoutBtn.disabled = true; signoutBtn.textContent = 'Logging out…';
        try { localStorage.removeItem('hb:session:v1'); } catch {}
        try {
          await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ action: 'logout', sessionToken: token || null }),
          });
        } catch {}
        // hb_full_auth cookie gets cleared by the lambda response; we
        // navigate explicitly so the next /full/* request would 302
        // anyway and we skip the round-trip.
        location.assign('/login/');
      });
    }
  })();
</script>
</body>
