<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />

<title>Swipe · Gems of Switzerland · Hikebeast</title>

<style>
  /* Swipe UI lives only on this page so it stays out of preview.css. */
  body {
    overflow: hidden;
    overscroll-behavior: none;
  }
  .swipe-shell {
    position: relative;
    height: calc(100dvh - var(--topbar-h));
    display: flex;
    flex-direction: column;
    align-items: stretch;
    padding: 16px 16px 24px;
    gap: 14px;
    overflow: hidden;
  }
  .swipe-progress {
    align-self: center;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: -0.005em;
    background: rgba(255,255,255,0.92);
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid var(--hairline);
    box-shadow: var(--shadow-soft);
  }
  .swipe-progress b { color: var(--fg); font-weight: 700; }

  .deck {
    position: relative;
    flex: 0 0 auto;
    width: 100%;
    max-width: 440px;
    /* Lock to a portrait card and centre vertically. Without this the deck
     * stretched to fill the viewport on desktop fullscreen, producing a
     * very tall sliver of a card. */
    aspect-ratio: 3 / 4;
    max-height: calc(100dvh - var(--topbar-h) - 180px);
    align-self: center;
    margin: auto 0;
    perspective: 1200px;
  }
  .card {
    position: absolute;
    inset: 0;
    background: var(--paper);
    border-radius: 22px;
    border: 1px solid var(--hairline);
    box-shadow: 0 24px 50px rgba(0,0,0,0.16), 0 6px 18px rgba(0,0,0,0.06);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    will-change: transform, opacity;
    touch-action: none;  /* we drive the gesture manually */
  }
  .card.is-back-1 {
    transform: scale(0.94) translateY(14px);
    opacity: 0.85;
    pointer-events: none;
    z-index: 1;
  }
  .card.is-back-2 {
    transform: scale(0.88) translateY(28px);
    opacity: 0.6;
    pointer-events: none;
    z-index: 0;
  }
  .card.is-top {
    z-index: 2;
    cursor: grab;
  }
  .card.is-top.dragging { cursor: grabbing; }
  .card.snap-back { transition: transform 220ms cubic-bezier(.2,.7,.3,1); }
  .card.fly-out { transition: transform 280ms cubic-bezier(.4,.1,.6,1), opacity 280ms ease; }

  .card .photo {
    flex: 1 1 auto;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }
  .card .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    -webkit-user-drag: none;
  }
  .card .photo::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 55%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
  }
  .card .body {
    position: absolute;
    inset: auto 0 0 0;
    padding: 18px 22px 22px;
    color: #fff;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .card .body .kicker {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    opacity: 0.85;
  }
  .card .body h2 {
    margin: 2px 0 0;
    font-family: "SF Pro Display", -apple-system, system-ui, sans-serif;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.025em;
    line-height: 1.05;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  }
  .card .body .meta {
    margin-top: 6px;
    font-size: 13px;
    opacity: 0.85;
    letter-spacing: -0.005em;
  }
  .card .open-link {
    position: absolute;
    top: 12px; left: 12px;
    z-index: 2;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.92);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    color: var(--fg);
    text-decoration: none;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: -0.005em;
    border: 1px solid var(--hairline);
  }
  .card .open-link svg { width: 12px; height: 12px; }

  /* Decision stamps that appear as the user drags */
  .stamp {
    position: absolute;
    top: 28px;
    padding: 8px 18px;
    border-radius: 12px;
    font-family: "SF Pro Display", -apple-system, system-ui, sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: 4px solid currentColor;
    opacity: 0;
    transition: opacity 120ms ease;
    z-index: 3;
    pointer-events: none;
  }
  .stamp.save { right: 24px; transform: rotate(12deg); color: #ff375f; }
  .stamp.no { left: 24px; transform: rotate(-12deg); color: #ff3b30; }

  .actions {
    flex-shrink: 0;
    display: flex;
    gap: 16px;
    align-items: center;
    justify-content: center;
    padding-top: 4px;
  }
  .act-btn {
    width: 56px;
    height: 56px;
    border-radius: 999px;
    border: 1px solid var(--hairline);
    background: #fff;
    display: grid;
    place-items: center;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.05);
    transition: transform 120ms ease, color 120ms ease, border-color 120ms ease, background 120ms ease;
    color: var(--fg);
    -webkit-tap-highlight-color: transparent;
  }
  .act-btn svg { width: 24px; height: 24px; }
  .act-btn:hover { transform: translateY(-2px); }
  .act-btn:active { transform: scale(0.94); }
  .act-btn.no { color: #ff3b30; }
  /* Save (formerly "super") · the heart that adds to favorites. Slightly
   * larger to mark it as the primary positive action. */
  .act-btn.save {
    width: 68px;
    height: 68px;
    color: #ff375f;
    border-color: rgba(255,55,95,0.3);
    box-shadow: 0 8px 24px rgba(255,55,95,0.18), 0 2px 6px rgba(0,0,0,0.05);
  }
  .act-btn.save svg { width: 30px; height: 30px; }
  .act-btn.tertiary { width: 44px; height: 44px; color: var(--muted); }
  .act-btn.tertiary svg { width: 18px; height: 18px; }

  .empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-align: center;
    padding: 24px;
    color: var(--muted);
  }
  .empty svg { width: 40px; height: 40px; color: var(--soft); }
  .empty h2 {
    margin: 0;
    font-family: "SF Pro Display", -apple-system, system-ui, sans-serif;
    font-size: 24px;
    letter-spacing: -0.025em;
    color: var(--fg);
    font-weight: 600;
  }
  .empty p { margin: 0; max-width: 360px; line-height: 1.5; font-size: 14px; }
  .empty .actions-row {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 6px;
  }
  .empty a, .empty button {
    display: inline-flex; align-items: center; justify-content: center;
    height: 44px; padding: 0 22px; border-radius: 999px;
    background: var(--fg); color: #fff; text-decoration: none;
    font-size: 14px; font-weight: 500;
    border: 0; font-family: inherit; cursor: pointer;
  }
  .empty .ghost { background: #fff; color: var(--fg); border: 1px solid var(--hairline); }

  @media (min-width: 700px) {
    .swipe-shell { padding: 24px 24px 32px; gap: 18px; }
    .deck { max-width: 460px; }
    .card .body h2 { font-size: 32px; }
  }

  /* Mobile: shell must also subtract the bottom tab bar (56px + safe
   * area), otherwise the action buttons sit behind it. iPhone SE
   * (375x667) is the tightest target — keep the deck shorter so the
   * card and action row both fit without scroll. */
  @media (max-width: 700px) {
    .swipe-shell {
      height: calc(100dvh - var(--topbar-h) - 64px - env(safe-area-inset-bottom));
      padding: 12px 16px 16px;
      gap: 10px;
    }
    .deck {
      max-height: calc(100dvh - var(--topbar-h) - 64px - env(safe-area-inset-bottom) - 130px);
    }
  }

  /* Heart burst on save. Hearts spawn at the heart button's centre and
   * fan upward in a cone, fading as they go. Pure CSS keyframes — each
   * heart's --dx/--dy/--rot/--scale/--dur are randomized per spawn. */
  .flying-hearts-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    overflow: hidden;
  }
  .flying-heart {
    position: fixed;
    width: 28px;
    height: 28px;
    margin-left: -14px;
    margin-top: -14px;
    color: #ff375f;
    filter: drop-shadow(0 2px 6px rgba(255,55,95,0.45));
    animation: heart-fly var(--dur, 900ms) cubic-bezier(.18,.65,.35,1) forwards;
    will-change: transform, opacity;
  }
  .flying-heart svg { width: 100%; height: 100%; display: block; }
  @keyframes heart-fly {
    0%   { transform: translate(0,0) scale(0) rotate(0); opacity: 0; }
    18%  { transform: translate(calc(var(--dx) * 0.18), calc(var(--dy) * 0.18)) scale(var(--scale, 1)) rotate(calc(var(--rot) * 0.2)); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(calc(var(--scale, 1) * 0.45)) rotate(var(--rot)); opacity: 0; }
  }
  .act-btn.save.pulsing { animation: save-pulse 360ms cubic-bezier(.2,.7,.3,1); }
  @keyframes save-pulse {
    0%   { transform: scale(1); }
    35%  { transform: scale(1.16); }
    100% { transform: scale(1); }
  }

  /* "It's a match" modal · pops once when ≥3 saves cluster within
   * MATCH_RADIUS_KM of each other (signature-deduped in localStorage so
   * the same cluster doesn't keep re-popping on subsequent saves). */
  .match-overlay {
    position: fixed;
    inset: 0;
    background: rgba(20, 14, 14, 0.55);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9000;
    padding: 16px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 240ms ease;
  }
  .match-overlay.show { opacity: 1; pointer-events: auto; }
  .match-modal {
    position: relative;
    width: min(440px, 100%);
    max-height: calc(100dvh - 32px);
    overflow-y: auto;
    background: var(--paper, #fff);
    border-radius: 24px;
    border: 1px solid var(--hairline, rgba(0,0,0,0.08));
    box-shadow: 0 30px 80px rgba(0,0,0,0.30), 0 8px 24px rgba(0,0,0,0.10);
    transform: scale(0.92);
    transition: transform 280ms cubic-bezier(.2,.7,.3,1);
    padding: 26px 22px 22px;
  }
  .match-overlay.show .match-modal { transform: scale(1); }
  .match-modal .match-banner {
    text-align: center;
    font-family: "SF Pro Display", -apple-system, system-ui, sans-serif;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.025em;
    color: #ff375f;
    margin: 4px 0 6px;
  }
  .match-modal .match-sub {
    text-align: center;
    font-size: 13.5px;
    color: var(--muted, #6c6c70);
    letter-spacing: -0.005em;
    margin: 0 0 16px;
    line-height: 1.45;
  }
  .match-modal .match-sub b { color: var(--fg, #1c1c1e); font-weight: 600; }
  .match-pills {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 14px;
  }
  .match-pill {
    border: 1px solid var(--hairline, rgba(0,0,0,0.10));
    background: #fff;
    color: var(--fg, #1c1c1e);
    border-radius: 999px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: -0.005em;
    cursor: pointer;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .match-pill.active {
    background: var(--fg, #1c1c1e);
    color: #fff;
    border-color: var(--fg, #1c1c1e);
  }
  .match-days { display: flex; flex-direction: column; gap: 12px; }
  .match-day {
    border: 1px solid var(--hairline, rgba(0,0,0,0.08));
    border-radius: 14px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.6);
  }
  .match-day-title {
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted, #6c6c70);
    margin: 0 0 8px;
  }
  .match-day-list {
    display: flex; flex-direction: column; gap: 8px;
    margin: 0; padding: 0; list-style: none;
  }
  .match-day-list li {
    display: flex; align-items: center; gap: 10px;
    font-size: 14px; color: var(--fg, #1c1c1e); letter-spacing: -0.005em;
  }
  .match-day-list li .num {
    flex: 0 0 22px; height: 22px;
    border-radius: 999px;
    background: rgba(255,55,95,0.12);
    color: #ff375f;
    font-size: 11px; font-weight: 700;
    display: grid; place-items: center;
  }
  .match-day-list li .name {
    flex: 1 1 auto; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .match-day-list li .region {
    font-size: 11px; color: var(--muted, #6c6c70);
    letter-spacing: 0.04em; text-transform: uppercase;
    flex-shrink: 0;
  }
  .match-actions {
    display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap;
  }
  .match-actions a, .match-actions button {
    flex: 1 1 0;
    height: 46px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 999px;
    font-size: 14px; font-weight: 500;
    font-family: inherit;
    text-decoration: none;
    border: 0;
    cursor: pointer;
  }
  .match-actions .btn-primary {
    background: var(--fg, #1c1c1e); color: #fff;
  }
  .match-actions .btn-ghost {
    background: #fff; color: var(--fg, #1c1c1e);
    border: 1px solid var(--hairline, rgba(0,0,0,0.10));
  }
  .match-close {
    position: absolute; top: 12px; right: 12px;
    width: 36px; height: 36px;
    border-radius: 999px;
    background: rgba(0,0,0,0.06);
    display: grid; place-items: center;
    color: var(--fg, #1c1c1e);
    border: 0;
    cursor: pointer;
  }
  .match-close svg { width: 16px; height: 16px; }
</style>

<div class="topbar">

<main class="swipe-shell">

  <div class="actions">

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
    </button>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <button type="button" class="act-btn save" id="saveBtn" title="Save · add to liked (drag right)">

<script>
(() => {
  // Two decision piles only -- the earlier yes/super/no setup felt redundant
  // (yes did nothing; super did the save). Now: drag right or tap heart =
  // save, drag left or tap X = skip. Both pull the spot out of the queue.
  //
  // State source: HB.swipes (signed-in: Convex; signed-out: localStorage).
  // The page never touches `hb:skipped:v1` directly; the façade owns it.
  // Snapshot from HB.spots once at load. We deliberately don't subscribe
  // to live updates here -- mid-swipe queue mutations would lose the
  // user's place. A page reload after admin edits picks up fresh data.
  const SPOTS = window.HB.spots.all().filter(s => window.HB.hasRealImage(s));
  const LEGEND = window.LEGEND || [];
  const REGIONS = Object.fromEntries(LEGEND.map(c => [c.number, c.name]));

  const deck = document.getElementById('deck');
  const seenCountEl = document.getElementById('seenCount');
  const totalCountEl = document.getElementById('totalCount');
  const savedCountEl = document.getElementById('savedCount');
  const leftCountEl = document.getElementById('leftCount');
  const noBtn = document.getElementById('noBtn');
  const saveBtn = document.getElementById('saveBtn');
  const resetBtn = document.getElementById('resetBtn');
  const openLink = document.getElementById('openLink');

  totalCountEl.textContent = SPOTS.length;

  // Migrate from the previous three-pile model: anything in the old yes
  // pile becomes a "no" decision via the façade. Idempotent: runs once on
  // first load after this rewrite, then the key is gone for good.
  (function migrateYesPile() {
    try {
      const yes = JSON.parse(localStorage.getItem('hb:yes:v1') || '[]');
      if (Array.isArray(yes) && yes.length) {
        for (const k of yes) window.HB.swipes.record(k, 'no');
      }
      localStorage.removeItem('hb:yes:v1');
    } catch {}
  })();

  function esc(s) { return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // Build the queue: anything the user hasn't decided on. HB.swipes.has()
  // covers both verdicts (save and no), so one check is enough.
  function buildQueue() {
    const remaining = SPOTS.filter(s => {
      const k = window.HB.spotKey(s);
      return k && !window.HB.swipes.has(k);
    });
    // Stable shuffle keyed off pile sizes so refreshes don't reorder
    // mid-session, but a reset re-shuffles.
    const decisionsCount = window.HB.swipes.list().length;
    return shuffle(remaining, 1 + decisionsCount);
  }

  // Mulberry32 deterministic shuffle
  function shuffle(arr, seed) {
    let s = (seed >>> 0) || 1;
    const rng = () => {
      s |= 0; s = (s + 0x6D2B79F5) | 0;
      let t = Math.imul(s ^ (s >>> 15), 1 | s);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
    const out = arr.slice();
    for (let i = out.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [out[i], out[j]] = [out[j], out[i]];
    }
    return out;
  }

  // ── Heart burst on save ─────────────────────────────────────────
  // Each save (drag right, heart-tap, or right-arrow key) spawns a small
  // cone of hearts flying upward from the heart button. Pure CSS keyframes
  // driven by per-heart CSS vars; we just append + cleanup in JS.
  const HEART_SVG = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
  function ensureHeartLayer() {
    let layer = document.querySelector('.flying-hearts-layer');
    if (!layer) {
      layer = document.createElement('div');
      layer.className = 'flying-hearts-layer';
      document.body.appendChild(layer);
    }
    return layer;
  }
  function emitHearts(n) {
    const btn = document.getElementById('saveBtn');
    if (!btn) return;
    const r = btn.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const cy = r.top + r.height / 2;
    const layer = ensureHeartLayer();
    const count = n || 7;
    for (let i = 0; i < count; i++) {
      const h = document.createElement('div');
      h.className = 'flying-heart';
      h.innerHTML = HEART_SVG;
      h.style.left = cx + 'px';
      h.style.top = cy + 'px';
      // Fan upward: angle ~ -90deg ±~85deg, distance 90-180px.
      const angle = (-Math.PI / 2) + (Math.random() - 0.5) * (Math.PI * 0.95);
      const dist  = 90 + Math.random() * 90;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist;
      const rot = (Math.random() - 0.5) * 80;
      const scale = 0.7 + Math.random() * 0.7;
      const dur = 800 + Math.random() * 500;
      h.style.setProperty('--dx', dx + 'px');
      h.style.setProperty('--dy', dy + 'px');
      h.style.setProperty('--rot', rot + 'deg');
      h.style.setProperty('--scale', scale);
      h.style.setProperty('--dur', dur + 'ms');
      layer.appendChild(h);
      setTimeout(() => h.remove(), dur + 80);
    }
    // Replay the button pulse: remove → reflow → re-add.
    btn.classList.remove('pulsing');
    void btn.offsetWidth;
    btn.classList.add('pulsing');
    setTimeout(() => btn.classList.remove('pulsing'), 380);
  }

  // ── "It's a match" journey detector ─────────────────────────────
  // After every save we look for a cluster of saved spots within
  // MATCH_RADIUS_KM of each other. If ≥ MATCH_MIN_CLUSTER spots share
  // a cluster *and* this exact set hasn't been shown before, we pop a
  // modal with a 1/2/3-day journey suggestion (stops ordered via a
  // greedy nearest-neighbour walk).
  const MATCH_SHOWN_KEY = 'hb:matchShown:v1';
  const MATCH_RADIUS_KM = 60;
  const MATCH_MIN_CLUSTER = 3;

  function haversineKm(lat1, lon1, lat2, lon2) {
    const toRad = d => d * Math.PI / 180;
    const R = 6371;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat / 2) ** 2 +
              Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
              Math.sin(dLon / 2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(a));
  }
  function nearestNeighborWalk(spots) {
    if (spots.length <= 2) return spots.slice();
    const remaining = spots.slice();
    const out = [remaining.shift()];
    while (remaining.length) {
      const last = out[out.length - 1];
      let bi = 0, bd = Infinity;
      for (let i = 0; i < remaining.length; i++) {
        const d = haversineKm(last.lat, last.lon, remaining[i].lat, remaining[i].lon);
        if (d < bd) { bd = d; bi = i; }
      }
      out.push(remaining.splice(bi, 1)[0]);
    }
    return out;
  }
  function readMatchShown() {
    try {
      const raw = localStorage.getItem(MATCH_SHOWN_KEY);
      const v = raw ? JSON.parse(raw) : [];
      return Array.isArray(v) ? v : [];
    } catch { return []; }
  }
  function recordMatchShown(sig) {
    const list = readMatchShown();
    if (list.includes(sig)) return false;
    list.push(sig);
    while (list.length > 60) list.shift();
    try { localStorage.setItem(MATCH_SHOWN_KEY, JSON.stringify(list)); } catch {}
    return true;
  }
  function clusterFromSeed(seed, savedSpots) {
    // Greedy expand: keep adding any saved spot within MATCH_RADIUS_KM
    // of *any* spot already in the cluster, until stable.
    const cluster = [seed];
    const inCluster = new Set([window.HB.spotKey(seed)]);
    let grew = true;
    while (grew) {
      grew = false;
      for (const s of savedSpots) {
        const k = window.HB.spotKey(s);
        if (!k || inCluster.has(k)) continue;
        for (const c of cluster) {
          if (haversineKm(s.lat, s.lon, c.lat, c.lon) <= MATCH_RADIUS_KM) {
            cluster.push(s);
            inCluster.add(k);
            grew = true;
            break;
          }
        }
      }
    }
    return cluster;
  }
  function checkForMatch(seedKey) {
    const savedKeys = window.HB.favorites.list();
    if (savedKeys.length < MATCH_MIN_CLUSTER) return;
    const savedSpots = savedKeys
      .map(k => window.HB.spots.get(k))
      .filter(s => s && typeof s.lat === 'number' && typeof s.lon === 'number');
    if (savedSpots.length < MATCH_MIN_CLUSTER) return;
    const seed = window.HB.spots.get(seedKey);
    if (!seed || typeof seed.lat !== 'number') return;
    const cluster = clusterFromSeed(seed, savedSpots);
    if (cluster.length < MATCH_MIN_CLUSTER) return;
    const sig = cluster.map(s => window.HB.spotKey(s)).filter(Boolean).sort().join('|');
    if (!sig) return;
    if (!recordMatchShown(sig)) return;
    showMatchModal(nearestNeighborWalk(cluster));
  }
  function regionLabel(spots) {
    const counts = {};
    for (const s of spots) {
      const r = REGIONS[s.chapter] || s.chapter_id || '?';
      counts[r] = (counts[r] || 0) + 1;
    }
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    if (!sorted.length) return 'Switzerland';
    return sorted.length === 1
      ? sorted[0][0]
      : `${sorted[0][0]} & ${sorted[1][0]}`;
  }
  function splitIntoDays(arr, days) {
    const n = arr.length;
    if (days <= 1) return [arr];
    const per = Math.ceil(n / days);
    const out = [];
    for (let i = 0; i < days; i++) {
      const slice = arr.slice(i * per, (i + 1) * per);
      if (slice.length) out.push(slice);
    }
    return out;
  }
  function showMatchModal(orderedSpots) {
    const n = orderedSpots.length;
    const dayOptions = [1];
    if (n >= 3) dayOptions.push(2);
    if (n >= 5) dayOptions.push(3);
    let activeDays = dayOptions[Math.min(1, dayOptions.length - 1)] || 1;

    const overlay = document.createElement('div');
    overlay.className = 'match-overlay';
    overlay.innerHTML = `
      <div class="match-modal" role="dialog" aria-modal="true" aria-label="Perfect journey match">
        <button class="match-close" type="button" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <h2 class="match-banner">It's a match.</h2>
        <p class="match-sub">${n} of your saves cluster around <b>${esc(regionLabel(orderedSpots))}</b>. Here's a tour shaped from them.</p>
        <div class="match-pills"></div>
        <div class="match-days"></div>
        <div class="match-actions">
          <a class="btn-primary" href="../saved/">Open saved</a>
          <button type="button" class="btn-ghost" data-close>Keep swiping</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    const pillsBox = overlay.querySelector('.match-pills');
    for (const d of dayOptions) {
      const p = document.createElement('button');
      p.type = 'button';
      p.className = 'match-pill' + (d === activeDays ? ' active' : '');
      p.textContent = d === 1 ? '1 day' : `${d} days`;
      p.addEventListener('click', () => {
        activeDays = d;
        pillsBox.querySelectorAll('.match-pill').forEach(el => el.classList.toggle('active', el === p));
        paintDays();
      });
      pillsBox.appendChild(p);
    }

    const daysBox = overlay.querySelector('.match-days');
    function paintDays() {
      const buckets = splitIntoDays(orderedSpots, activeDays);
      daysBox.innerHTML = buckets.map((bucket, i) => `
        <div class="match-day">
          <h3 class="match-day-title">${activeDays > 1 ? `Day ${i + 1}` : 'Your day'}</h3>
          <ol class="match-day-list">
            ${bucket.map((s, j) => `
              <li>
                <span class="num">${j + 1}</span>
                <span class="name">${esc(s.title)}</span>
                <span class="region">${esc(REGIONS[s.chapter] || s.chapter_id || '')}</span>
              </li>
            `).join('')}
          </ol>
        </div>
      `).join('');
    }
    paintDays();

    function close() {
      overlay.classList.remove('show');
      setTimeout(() => overlay.remove(), 280);
    }
    overlay.querySelector('.match-close').addEventListener('click', close);
    overlay.querySelector('[data-close]').addEventListener('click', close);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
    document.addEventListener('keydown', function escClose(e) {
      if (e.key === 'Escape') {
        document.removeEventListener('keydown', escClose);
        close();
      }
    });

    requestAnimationFrame(() => overlay.classList.add('show'));
  }

  let queue = buildQueue();
  const TOTAL = SPOTS.length;

  function makeCard(spot, depth) {
    const c = document.createElement('div');
    c.className = 'card ' + (depth === 0 ? 'is-top' : depth === 1 ? 'is-back-1' : 'is-back-2');
    const region = REGIONS[spot.chapter] || spot.chapter_id;
    const dims = (spot.imageWidth && spot.imageHeight)
      ? [spot.imageWidth, spot.imageHeight]
      : ((window.HB_THUMB_DIMS || {})[spot.image] || [4, 5]);
    const href = window.HB.spotDetailHref(spot, '../');
    const attrs = window.HB.photoAttrs({
      photoId: spot.imagePhotoId, image: spot.image,
      width: 1800, prefix: '../',
      sizes: '(min-width: 768px) 600px, 90vw',
      intrinsicWidth: dims[0], intrinsicHeight: dims[1],
    });
    const srcsetAttr = attrs.srcset ? ` srcset="${esc(attrs.srcset)}" sizes="${esc(attrs.sizes)}"` : '';
    c.innerHTML = `
      <div class="stamp save">Save</div>
      <div class="stamp no">Nope</div>
      <a class="open-link" href="${esc(href)}" title="Open full entry">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Read
      </a>
      <div class="photo">
        <!-- Sharp photo (w1800 default; browser swaps via srcset on bigger
             screens). Deck holds 3 cards so bandwidth is negligible. -->
        <img src="${esc(attrs.src)}"${srcsetAttr} alt="${esc(spot.title)}" width="${dims[0]}" height="${dims[1]}" decoding="async" />
      </div>
      <div class="body">
        <span class="kicker">${esc(window.HB.singularKicker(spot.kicker) || region)}</span>
        <h2>${esc(spot.title)}</h2>
        <span class="meta">${esc(region)}</span>
      </div>
    `;
    c.dataset.spotKey = window.HB.spotKey(spot) || '';
    c.dataset.href = href;
    return c;
  }

  function renderDeck() {
    deck.innerHTML = '';
    if (!queue.length) {
      renderEmpty();
      updateCounts();
      return;
    }
    // Build up to 3 stacked cards
    const upcoming = queue.slice(0, 3);
    upcoming.forEach((s, i) => deck.appendChild(makeCard(s, i)));
    bindTop();
    updateCounts();
  }

  function renderEmpty() {
    const seenAll = TOTAL > 0;
    const savedNow = window.HB.favorites.count();
    deck.innerHTML = `
      <div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <h2>${seenAll ? "You've been through them all." : 'No spots to swipe.'}</h2>
        <p>${savedNow ? `${savedNow} saved on this device.` : 'Your saves will show up here once you start hearting cards.'}</p>
        <div class="actions-row">
          <a href="../saved/">View saves</a>
          <a class="ghost" href="../browse/">Browse all</a>
          <button class="ghost" id="emptyReset">Reset and start over</button>
        </div>
      </div>
    `;
    document.getElementById('emptyReset')?.addEventListener('click', resetSkipped);
  }

  function updateCounts() {
    const saved = window.HB.favorites.count();
    const decisions = window.HB.swipes.list();
    const seen = decisions.length;
    seenCountEl.textContent = Math.min(seen, TOTAL);
    savedCountEl.textContent = saved;
    leftCountEl.textContent = queue.length;
    openLink.href = (deck.querySelector('.card.is-top')?.dataset.href) || '#';
  }

  // Reset clears the "no" decisions only (saves stay). For signed-in users
  // we walk the decisions list and call swipes.undo() for each "no" so the
  // server-side state matches; the façade handles the localStorage path.
  function resetPiles() {
    const noKeys = window.HB.swipes.list()
      .filter(d => d.decision === 'no')
      .map(d => d.spotKey);
    for (const k of noKeys) window.HB.swipes.undo(k);
    queue = buildQueue();
    renderDeck();
  }

  // === Drag handling on the top card ===
  let drag = null;

  function bindTop() {
    const top = deck.querySelector('.card.is-top');
    if (!top) return;
    top.addEventListener('pointerdown', onDown);
  }

  function onDown(e) {
    if (e.button !== undefined && e.button !== 0) return;
    // Tap on the in-card "Read" pill or any other interactive child
    // should pass through to the link/button, not start a card drag.
    if (e.target.closest('.open-link')) return;
    const card = e.currentTarget;
    if (drag) return;
    card.setPointerCapture(e.pointerId);
    card.classList.add('dragging');
    card.classList.remove('snap-back');
    drag = {
      pointerId: e.pointerId,
      card,
      startX: e.clientX,
      startY: e.clientY,
      dx: 0,
      dy: 0,
      width: card.getBoundingClientRect().width,
    };
    card.addEventListener('pointermove', onMove);
    card.addEventListener('pointerup', onUp);
    card.addEventListener('pointercancel', onUp);
  }

  function onMove(e) {
    if (!drag || e.pointerId !== drag.pointerId) return;
    drag.dx = e.clientX - drag.startX;
    drag.dy = e.clientY - drag.startY;
    paintDrag();
  }

  // Two-direction drag now: right = save, left = skip. Horizontal-only --
  // vertical drag was needed when "super" was a separate verdict; without
  // it, vertical input just gets ignored so the card stays on rails.
  function dragVerdict(dx) {
    return dx >= 0 ? 'save' : 'no';
  }

  function paintDrag() {
    const { card, dx, dy, width } = drag;
    const rot = Math.max(-14, Math.min(14, dx / 14));
    card.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${rot}deg)`;
    const verdict = dragVerdict(dx);
    const strength = Math.min(1, Math.abs(dx) / (width * 0.5));
    const saveS = card.querySelector('.stamp.save');
    const noS = card.querySelector('.stamp.no');
    if (saveS) saveS.style.opacity = (verdict === 'save' ? Math.min(1, strength * 1.4) : 0).toFixed(2);
    if (noS) noS.style.opacity = (verdict === 'no' ? Math.min(1, strength * 1.4) : 0).toFixed(2);
  }

  function onUp(e) {
    if (!drag || e.pointerId !== drag.pointerId) return;
    const { card, dx, width } = drag;
    card.removeEventListener('pointermove', onMove);
    card.removeEventListener('pointerup', onUp);
    card.removeEventListener('pointercancel', onUp);
    card.classList.remove('dragging');
    const threshold = width * 0.32;
    if (Math.abs(dx) > threshold) {
      finishDecision(dragVerdict(dx));
    } else {
      card.classList.add('snap-back');
      card.style.transform = '';
      ['save', 'no'].forEach(v => {
        const s = card.querySelector('.stamp.' + v);
        if (s) s.style.opacity = '0';
      });
      setTimeout(() => card.classList.remove('snap-back'), 240);
      drag = null;
    }
  }

  function finishDecision(verdict) {
    if (!drag) return;
    const { card } = drag;
    drag = null;
    const k = card.dataset.spotKey;
    if (k) {
      // record() routes to either Convex or localStorage based on auth
      // state; "save" also flips the favorite via the favorites façade.
      window.HB.swipes.record(k, verdict);
    }
    if (verdict === 'save') {
      // Hearts puff out of the heart button as soon as the verdict is
      // committed (drag, button-tap, or right-arrow all land here).
      emitHearts();
    }
    card.classList.add('fly-out');
    const dir = verdict === 'save' ? 1 : -1;
    const stamp = card.querySelector('.stamp.' + verdict);
    if (stamp) stamp.style.opacity = '1';
    requestAnimationFrame(() => {
      card.style.transform = `translate(${dir * 140}vw, 30px) rotate(${dir * 24}deg)`;
      card.style.opacity = '0';
    });
    setTimeout(() => {
      queue.shift();
      renderDeck();
      // Check after the queue updates so favorites.list() reflects the
      // just-saved spot (favorites.set fires synchronously inside record).
      if (verdict === 'save' && k) checkForMatch(k);
    }, 290);
  }

  function programmaticSwipe(verdict) {
    const top = deck.querySelector('.card.is-top');
    if (!top || drag) return;
    drag = { pointerId: -1, card: top, startX: 0, startY: 0, dx: 0, dy: 0, width: top.getBoundingClientRect().width };
    finishDecision(verdict);
  }

  noBtn.addEventListener('click', () => programmaticSwipe('no'));
  saveBtn.addEventListener('click', () => programmaticSwipe('save'));
  resetBtn.addEventListener('click', () => {
    if (confirm('Start over? Clears your No pile and re-shuffles. Saves stay.')) resetPiles();
  });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') programmaticSwipe('no');
    else if (e.key === 'ArrowRight') programmaticSwipe('save');
  });

  // Cross-tab + sign-in/out sync. Subscribing to swipes covers both:
  //   - localStorage 'hb:skipped:v1' changed in another tab
  //   - server pushed an updated decisions list (signed in)
  //   - user signed in / out (façade re-attached, mirror flipped)
  window.HB.favorites.subscribe(() => updateCounts());
  window.HB.swipes.subscribe(() => { queue = buildQueue(); renderDeck(); });
  window.HB.session.subscribe(() => { queue = buildQueue(); renderDeck(); });

  renderDeck();
})();
</script>

</body>
</html>
