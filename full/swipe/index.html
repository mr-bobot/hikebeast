<style>
  /* Swipe UI lives only on this page so it stays out of preview.css. */
  body {
    overflow: hidden;
    overscroll-behavior: none;
  }
  .swipe-shell {
    position: relative;
    height: calc(100dvh - var(--topbar-h));
    display: flex;
    flex-direction: column;
    align-items: stretch;
    padding: 16px 16px 24px;
    gap: 14px;
    overflow: hidden;
  }
  .swipe-progress {
    align-self: center;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: -0.005em;
    background: var(--glass-strong);
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid var(--hairline);
    box-shadow: var(--shadow-soft);
  }
  .swipe-progress b { color: var(--fg); font-weight: 700; }

  .deck {
    position: relative;
    flex: 0 0 auto;
    width: 100%;
    max-width: 440px;
    /* Lock to a portrait card and centre vertically. Without this the deck
     * stretched to fill the viewport on desktop fullscreen, producing a
     * very tall sliver of a card. */
    aspect-ratio: 3 / 4;
    max-height: calc(100dvh - var(--topbar-h) - 180px);
    align-self: center;
    margin: auto 0;
    perspective: 1200px;
  }
  .card {
    position: absolute;
    inset: 0;
    background: var(--paper);
    border-radius: 22px;
    border: 1px solid var(--hairline);
    box-shadow: var(--shadow-card);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    will-change: transform, opacity;
    touch-action: none;  /* we drive the gesture manually */
  }
  .card.is-back-1 {
    transform: scale(0.94) translateY(14px);
    opacity: 0.85;
    pointer-events: none;
    z-index: 1;
  }
  .card.is-back-2 {
    transform: scale(0.88) translateY(28px);
    opacity: 0.6;
    pointer-events: none;
    z-index: 0;
  }
  .card.is-top {
    z-index: 2;
    cursor: grab;
  }
  .card.is-top.dragging { cursor: grabbing; }
  .card.snap-back { transition: transform 220ms cubic-bezier(.2,.7,.3,1); }
  .card.fly-out { transition: transform 280ms cubic-bezier(.4,.1,.6,1), opacity 280ms ease; }

  .card .photo {
    flex: 1 1 auto;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }
  .card .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    -webkit-user-drag: none;
  }
  .card .photo::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 55%, var(--photo-overlay) 100%);
    pointer-events: none;
  }
  .card .body {
    position: absolute;
    inset: auto 0 0 0;
    padding: 18px 22px 22px;
    color: #fff;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .card .body .kicker {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    opacity: 0.85;
  }
  .card .body h2 {
    margin: 2px 0 0;
    font-family: "SF Pro Display", -apple-system, system-ui, sans-serif;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.025em;
    line-height: 1.05;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  }
  .card .body .meta {
    margin-top: 6px;
    font-size: 13px;
    opacity: 0.85;
    letter-spacing: -0.005em;
  }
  /* Decision stamps that appear as the user drags */
  .stamp {
    position: absolute;
    top: 28px;
    padding: 8px 18px;
    border-radius: 12px;
    font-family: "SF Pro Display", -apple-system, system-ui, sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: 4px solid currentColor;
    opacity: 0;
    transition: opacity 120ms ease;
    z-index: 3;
    pointer-events: none;
  }
  .stamp.save { right: 24px; transform: rotate(12deg); color: var(--danger); }
  .stamp.no { left: 24px; transform: rotate(-12deg); color: #ff3b30; }

  .actions {
    flex-shrink: 0;
    display: flex;
    gap: 16px;
    align-items: center;
    justify-content: center;
    padding-top: 4px;
  }
  .act-btn {
    width: 56px;
    height: 56px;
    border-radius: 999px;
    border: 1px solid var(--hairline);
    background: var(--paper);
    display: grid;
    place-items: center;
    cursor: pointer;
    box-shadow: var(--shadow-soft);
    transition: transform 120ms ease, color 120ms ease, border-color 120ms ease, background 120ms ease;
    color: var(--fg);
    -webkit-tap-highlight-color: transparent;
  }
  .act-btn svg { width: 24px; height: 24px; }
  .act-btn:hover { transform: translateY(-2px); }
  .act-btn:active { transform: scale(0.94); }
  .act-btn.no { color: #ff3b30; }
  /* Save (formerly "super") · the heart that adds to favorites. Slightly
   * larger to mark it as the primary positive action. */
  .act-btn.save {
    width: 68px;
    height: 68px;
    color: var(--danger);
    border-color: rgba(255,55,95,0.3);
    box-shadow: 0 8px 24px rgba(255,55,95,0.18), 0 2px 6px rgba(0,0,0,0.05);
  }
  .act-btn.save svg { width: 30px; height: 30px; }
  .act-btn.tertiary { width: 44px; height: 44px; color: var(--muted); }
  .act-btn.tertiary svg { width: 18px; height: 18px; }

  /* Heart burst on save. Hearts spawn at the heart button's centre and
   * fan upward in a cone, fading as they go. Pure CSS keyframes — each
   * heart's --dx/--dy/--rot/--scale/--dur are randomized per spawn. */
  .flying-hearts-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    overflow: hidden;
  }
  .flying-heart {
    position: fixed;
    width: 28px;
    height: 28px;
    margin-left: -14px;
    margin-top: -14px;
    color: var(--danger);
    filter: drop-shadow(0 2px 6px rgba(255,55,95,0.45));
    animation: heart-fly var(--dur, 900ms) cubic-bezier(.18,.65,.35,1) forwards;
    will-change: transform, opacity;
  }
  .flying-heart svg { width: 100%; height: 100%; display: block; }
  @keyframes heart-fly {
    0%   { transform: translate(0,0) scale(0) rotate(0); opacity: 0; }
    18%  { transform: translate(calc(var(--dx) * 0.18), calc(var(--dy) * 0.18)) scale(var(--scale, 1)) rotate(calc(var(--rot) * 0.2)); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(calc(var(--scale, 1) * 0.45)) rotate(var(--rot)); opacity: 0; }
  }
  .act-btn.save.pulsing { animation: save-pulse 360ms cubic-bezier(.2,.7,.3,1); }
  @keyframes save-pulse {
    0%   { transform: scale(1); }
    35%  { transform: scale(1.16); }
    100% { transform: scale(1); }
  }

  .empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-align: center;
    padding: 24px;
    color: var(--muted);
  }
  .empty svg { width: 40px; height: 40px; color: var(--soft); }
  .empty h2 {
    margin: 0;
    font-family: "SF Pro Display", -apple-system, system-ui, sans-serif;
    font-size: 24px;
    letter-spacing: -0.025em;
    color: var(--fg);
    font-weight: 600;
  }
  .empty p { margin: 0; max-width: 360px; line-height: 1.5; font-size: 14px; }
  .empty .actions-row {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 6px;
  }
  .empty a, .empty button {
    display: inline-flex; align-items: center; justify-content: center;
    height: 44px; padding: 0 22px; border-radius: 999px;
    background: var(--cta-bg); color: #fff; text-decoration: none;
    font-size: 14px; font-weight: 500;
    border: 0; font-family: inherit; cursor: pointer;
  }
  .empty .ghost { background: var(--paper); color: var(--fg); border: 1px solid var(--hairline); }

  @media (min-width: 700px) {
    .swipe-shell { padding: 24px 24px 32px; gap: 18px; }
    .deck { max-width: 460px; }
    .card .body h2 { font-size: 32px; }
  }

  /* Mobile: shell must also subtract the bottom tab bar (56px + safe
   * area), otherwise the action buttons sit behind it. iPhone SE
   * (375x667) is the tightest target — keep the deck shorter so the
   * card and action row both fit without scroll. */
  @media (max-width: 700px) {
    .swipe-shell {
      height: calc(100dvh - var(--topbar-h) - 64px - env(safe-area-inset-bottom));
      padding: 12px 16px 16px;
      gap: 10px;
    }
    .deck {
      max-height: calc(100dvh - var(--topbar-h) - 64px - env(safe-area-inset-bottom) - 130px);
    }
    /* "X of Y · X saved" header chip — give the deck more room on
     * phones; the action buttons (heart / skip / open) already convey
     * progress through their use, and the bottom tab bar shows where
     * the user is in the app. */
    .swipe-progress { display: none; }
  }

  /* === Dark mode overrides ===
     Empty-state CTA uses background: var(--fg) which becomes near-white
     in dark, killing legibility against the white text. Swap to deep
     navy so it still reads as a primary heavy button. */
  :root[data-theme="dark"] .empty a,
  :root[data-theme="dark"] .empty button { background: #003162; color: #fff; }
  :root[data-theme="dark"] .empty .ghost { background: var(--paper); color: var(--fg); }
</style>
</head>

<script src="../map/spots-data.js"></script>
<script src="../img/spot-images.js"></script>
<script src="../img/thumbs/dimensions.js"></script>
<script src="../lib/convex.js"></script>
<script>window.HB_CONVEX_URL = "https://whimsical-sparrow-336.convex.cloud";</script>
<script src="../social.js?v=20260526a"></script>
<script>
(() => {
  // Two decision piles only -- the earlier yes/super/no setup felt redundant
  // (yes did nothing; super did the save). Now: drag right or tap heart =
  // save, drag left or tap X = skip. Both pull the spot out of the queue.
  //
  // State source: HB.swipes (signed-in: Convex; signed-out: localStorage).
  // The page never touches `hb:skipped:v1` directly; the façade owns it.
  // Snapshot from HB.spots once at load. We deliberately don't subscribe
  // to live updates here -- mid-swipe queue mutations would lose the
  // user's place. A page reload after admin edits picks up fresh data.
  const SPOTS = window.HB.spots.all().filter(s => window.HB.hasRealImage(s));
  const LEGEND = window.LEGEND || [];
  const REGIONS = Object.fromEntries(LEGEND.map(c => [c.number, c.name]));

  const deck = document.getElementById('deck');
  const seenCountEl = document.getElementById('seenCount');
  const totalCountEl = document.getElementById('totalCount');
  const savedCountEl = document.getElementById('savedCount');
  const leftCountEl = document.getElementById('leftCount');
  const noBtn = document.getElementById('noBtn');
  const saveBtn = document.getElementById('saveBtn');
  const openLink = document.getElementById('openLink');

  totalCountEl.textContent = SPOTS.length;

  // Migrate from the previous three-pile model: anything in the old yes
  // pile becomes a "no" decision via the façade. Idempotent: runs once on
  // first load after this rewrite, then the key is gone for good.
  (function migrateYesPile() {
    try {
      const yes = JSON.parse(localStorage.getItem('hb:yes:v1') || '[]');
      if (Array.isArray(yes) && yes.length) {
        for (const k of yes) window.HB.swipes.record(k, 'no');
      }
      localStorage.removeItem('hb:yes:v1');
    } catch {}
  })();

  function esc(s) { return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // Session-stable shuffle seed. Cached in sessionStorage so a refresh
  // mid-session keeps the same order, but a new tab gets a fresh deck.
  // Previously the seed was tied to swipes.list().length, which meant
  // every decision reshuffled the entire remaining queue — users saw
  // the card peeking behind the top get swapped out on every click,
  // which read as "it skipped one and showed a new card."
  const SWIPE_SEED_KEY = 'hb:swipe:seed';
  const SWIPE_SEED = (() => {
    try {
      const cached = parseInt(sessionStorage.getItem(SWIPE_SEED_KEY) || '0', 10);
      if (cached) return cached;
      const fresh = (Math.random() * 0x7fffffff) | 0 || 1;
      sessionStorage.setItem(SWIPE_SEED_KEY, String(fresh));
      return fresh;
    } catch {
      return 1;
    }
  })();
  // Shuffle the full catalogue once; buildQueue() just filters out
  // already-decided spots, preserving the relative order. So the card
  // peeking behind the top stays put when the user heart/skips above.
  let SHUFFLED_ALL = null;
  function rebuildShuffledAll() { SHUFFLED_ALL = shuffle(SPOTS, SWIPE_SEED); }
  rebuildShuffledAll();

  function buildQueue() {
    // SPOTS may grow when Convex pushes (refreshSpots → rebuild).
    if (!SHUFFLED_ALL || SHUFFLED_ALL.length !== SPOTS.length) rebuildShuffledAll();
    return SHUFFLED_ALL.filter(s => {
      const k = window.HB.spotKey(s);
      return k && !window.HB.swipes.has(k);
    });
  }

  // Mulberry32 deterministic shuffle
  function shuffle(arr, seed) {
    let s = (seed >>> 0) || 1;
    const rng = () => {
      s |= 0; s = (s + 0x6D2B79F5) | 0;
      let t = Math.imul(s ^ (s >>> 15), 1 | s);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
    const out = arr.slice();
    for (let i = out.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [out[i], out[j]] = [out[j], out[i]];
    }
    return out;
  }

  let queue = buildQueue();
  const TOTAL = SPOTS.length;

  function makeCard(spot, depth) {
    const c = document.createElement('div');
    c.className = 'card ' + (depth === 0 ? 'is-top' : depth === 1 ? 'is-back-1' : 'is-back-2');
    const region = REGIONS[spot.chapter] || spot.chapter_id;
    const dims = (spot.imageWidth && spot.imageHeight)
      ? [spot.imageWidth, spot.imageHeight]
      : ((window.HB_THUMB_DIMS || {})[spot.image] || [4, 5]);
    const href = window.HB.spotDetailHref(spot, '../');
    const attrs = window.HB.photoAttrs({
      photoId: spot.imagePhotoId, image: spot.image,
      width: 1800, prefix: '../',
      sizes: '(min-width: 768px) 600px, 90vw',
      intrinsicWidth: dims[0], intrinsicHeight: dims[1],
    });
    const srcsetAttr = attrs.srcset ? ` srcset="${esc(attrs.srcset)}" sizes="${esc(attrs.sizes)}"` : '';
    c.innerHTML = `
      <div class="stamp save">${window.t('swipe.stamp_save')}</div>
      <div class="stamp no">${window.t('swipe.stamp_nope')}</div>
      <div class="photo">
        <!-- Sharp photo (w1800 default; browser swaps via srcset on bigger
             screens). Deck holds 3 cards so bandwidth is negligible. -->
        <img src="${esc(attrs.src)}"${srcsetAttr} alt="${esc(spot.title)}" width="${dims[0]}" height="${dims[1]}" decoding="async" />
      </div>
      <div class="body">
        <span class="kicker">${esc(window.HB.singularKicker(spot.kicker) || region)}</span>
        <h2>${esc(spot.title)}</h2>
        <span class="meta">${esc(region)}</span>
      </div>
    `;
    c.dataset.spotKey = window.HB.spotKey(spot) || '';
    c.dataset.href = href;
    return c;
  }

  function renderDeck() {
    deck.innerHTML = '';
    if (!queue.length) {
      renderEmpty();
      updateCounts();
      return;
    }
    // Build up to 3 stacked cards
    const upcoming = queue.slice(0, 3);
    upcoming.forEach((s, i) => deck.appendChild(makeCard(s, i)));
    bindTop();
    updateCounts();
  }

  function renderEmpty() {
    const seenAll = TOTAL > 0;
    const savedNow = window.HB.favorites.count();
    deck.innerHTML = `
      <div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <h2>${seenAll ? window.t('swipe.empty_all') : window.t('swipe.empty_none')}</h2>
        <p>${savedNow ? `${savedNow} ${window.t('swipe.saved')}.` : window.t('swipe.empty_hint')}</p>
        <div class="actions-row">
          <a href="../saved/">${window.t('swipe.view_saves')}</a>
          <a class="ghost" href="../browse/">${window.t('swipe.browse_all')}</a>
        </div>
      </div>
    `;
  }

  function updateCounts() {
    const saved = window.HB.favorites.count();
    const decisions = window.HB.swipes.list();
    const seen = decisions.length;
    seenCountEl.textContent = Math.min(seen, TOTAL);
    savedCountEl.textContent = saved;
    leftCountEl.textContent = queue.length;
    openLink.href = (deck.querySelector('.card.is-top')?.dataset.href) || '#';
  }

  // === Drag handling on the top card ===
  let drag = null;

  function bindTop() {
    const top = deck.querySelector('.card.is-top');
    if (!top) return;
    top.addEventListener('pointerdown', onDown);
  }

  function onDown(e) {
    if (e.button !== undefined && e.button !== 0) return;
    const card = e.currentTarget;
    if (drag) return;
    card.setPointerCapture(e.pointerId);
    card.classList.add('dragging');
    card.classList.remove('snap-back');
    drag = {
      pointerId: e.pointerId,
      card,
      startX: e.clientX,
      startY: e.clientY,
      dx: 0,
      dy: 0,
      width: card.getBoundingClientRect().width,
    };
    card.addEventListener('pointermove', onMove);
    card.addEventListener('pointerup', onUp);
    card.addEventListener('pointercancel', onUp);
  }

  function onMove(e) {
    if (!drag || e.pointerId !== drag.pointerId) return;
    drag.dx = e.clientX - drag.startX;
    drag.dy = e.clientY - drag.startY;
    paintDrag();
  }

  // Two-direction drag now: right = save, left = skip. Horizontal-only --
  // vertical drag was needed when "super" was a separate verdict; without
  // it, vertical input just gets ignored so the card stays on rails.
  function dragVerdict(dx) {
    return dx >= 0 ? 'save' : 'no';
  }

  function paintDrag() {
    const { card, dx, dy, width } = drag;
    const rot = Math.max(-14, Math.min(14, dx / 14));
    card.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${rot}deg)`;
    const verdict = dragVerdict(dx);
    const strength = Math.min(1, Math.abs(dx) / (width * 0.5));
    const saveS = card.querySelector('.stamp.save');
    const noS = card.querySelector('.stamp.no');
    if (saveS) saveS.style.opacity = (verdict === 'save' ? Math.min(1, strength * 1.4) : 0).toFixed(2);
    if (noS) noS.style.opacity = (verdict === 'no' ? Math.min(1, strength * 1.4) : 0).toFixed(2);
  }

  function onUp(e) {
    if (!drag || e.pointerId !== drag.pointerId) return;
    const { card, dx, width } = drag;
    card.removeEventListener('pointermove', onMove);
    card.removeEventListener('pointerup', onUp);
    card.removeEventListener('pointercancel', onUp);
    card.classList.remove('dragging');
    const threshold = width * 0.32;
    if (Math.abs(dx) > threshold) {
      finishDecision(dragVerdict(dx));
    } else {
      card.classList.add('snap-back');
      card.style.transform = '';
      ['save', 'no'].forEach(v => {
        const s = card.querySelector('.stamp.' + v);
        if (s) s.style.opacity = '0';
      });
      setTimeout(() => card.classList.remove('snap-back'), 240);
      drag = null;
    }
  }

  // ── Heart burst on save ─────────────────────────────────────────
  // Each save (drag right, heart-tap, or right-arrow key) spawns a small
  // cone of hearts flying upward from the heart button. Pure CSS keyframes
  // driven by per-heart CSS vars; we just append + cleanup in JS.
  const HEART_SVG = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
  function ensureHeartLayer() {
    let layer = document.querySelector('.flying-hearts-layer');
    if (!layer) {
      layer = document.createElement('div');
      layer.className = 'flying-hearts-layer';
      document.body.appendChild(layer);
    }
    return layer;
  }
  function emitHearts(n) {
    const btn = document.getElementById('saveBtn');
    if (!btn) return;
    const r = btn.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const cy = r.top + r.height / 2;
    const layer = ensureHeartLayer();
    const count = n || 7;
    for (let i = 0; i < count; i++) {
      const h = document.createElement('div');
      h.className = 'flying-heart';
      h.innerHTML = HEART_SVG;
      h.style.left = cx + 'px';
      h.style.top = cy + 'px';
      // Fan upward: angle ~ -90deg ±~85deg, distance 90-180px.
      const angle = (-Math.PI / 2) + (Math.random() - 0.5) * (Math.PI * 0.95);
      const dist  = 90 + Math.random() * 90;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist;
      const rot = (Math.random() - 0.5) * 80;
      const scale = 0.7 + Math.random() * 0.7;
      const dur = 800 + Math.random() * 500;
      h.style.setProperty('--dx', dx + 'px');
      h.style.setProperty('--dy', dy + 'px');
      h.style.setProperty('--rot', rot + 'deg');
      h.style.setProperty('--scale', scale);
      h.style.setProperty('--dur', dur + 'ms');
      layer.appendChild(h);
      setTimeout(() => h.remove(), dur + 80);
    }
    // Replay the button pulse: remove → reflow → re-add.
    btn.classList.remove('pulsing');
    void btn.offsetWidth;
    btn.classList.add('pulsing');
    setTimeout(() => btn.classList.remove('pulsing'), 380);
  }

  function finishDecision(verdict) {
    if (!drag) return;
    const { card } = drag;
    drag = null;
    const k = card.dataset.spotKey;
    if (verdict === 'save') emitHearts();
    card.classList.add('fly-out');
    const dir = verdict === 'save' ? 1 : -1;
    const stamp = card.querySelector('.stamp.' + verdict);
    if (stamp) stamp.style.opacity = '1';
    requestAnimationFrame(() => {
      card.style.transform = `translate(${dir * 140}vw, 30px) rotate(${dir * 24}deg)`;
      card.style.opacity = '0';
    });
    // Record the decision AFTER the fly-out animation ends. record()
    // fires the swipes subscription which rebuilds the queue (without
    // the decided card) and re-renders. Doing it earlier meant the
    // subscription wiped the deck mid-animation AND the setTimeout
    // below also queue.shifted+renderDeck'd, advancing the deck twice
    // per click. Now: one record, one rebuild, exactly one card moves.
    setTimeout(() => {
      if (k) window.HB.swipes.record(k, verdict);
    }, 290);
  }

  function programmaticSwipe(verdict) {
    const top = deck.querySelector('.card.is-top');
    if (!top || drag) return;
    drag = { pointerId: -1, card: top, startX: 0, startY: 0, dx: 0, dy: 0, width: top.getBoundingClientRect().width };
    finishDecision(verdict);
  }

  noBtn.addEventListener('click', () => programmaticSwipe('no'));
  saveBtn.addEventListener('click', () => programmaticSwipe('save'));
  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') programmaticSwipe('no');
    else if (e.key === 'ArrowRight') programmaticSwipe('save');
  });

  // Cross-tab + sign-in/out sync. Subscribing to swipes covers both:
  //   - localStorage 'hb:skipped:v1' changed in another tab
  //   - server pushed an updated decisions list (signed in)
  //   - user signed in / out (façade re-attached, mirror flipped)
  window.HB.favorites.subscribe(() => updateCounts());
  window.HB.swipes.subscribe(() => { queue = buildQueue(); renderDeck(); });
  window.HB.session.subscribe(() => { queue = buildQueue(); renderDeck(); });

  renderDeck();
})();
</script>

</body>
</html>
