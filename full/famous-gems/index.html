<script>
  // The "famous-but-they-still-deliver" curated set. Pulled out of the
  // Introduction chapter (where it used to live as an inline grid) so
  // the chapter stays intro-only and the curated lists all live under
  // their own /full/<collection>/ routes.
  // Editorial order matters; mirror the order shown on the intro card
  // pre-extraction (Schäfler, Oeschinensee, Seealpsee, Fälensee,
  // Saxer Lücke, Riffelsee).
  const CURATED_FAMOUS = [
    'Schäfler', 'Oeschinensee', 'Seealpsee', 'Fälensee', 'Saxer Lücke', 'Riffelsee',
  ];

  let SPOTS = [];
  function refreshSpots() {
    const all = window.HB.spots.all().filter(s => window.HB.hasRealImage(s));
    const byTitle = new Map(all.map(s => [s.title, s]));
    SPOTS = CURATED_FAMOUS.map(t => byTitle.get(t)).filter(Boolean);
  }
  refreshSpots();
  const LEGEND = window.LEGEND || [];

  const content = document.getElementById('content');
  const empty = document.getElementById('empty');
  const counter = document.getElementById('famousCount');

  function esc(s) { return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function tile(spot) {
    const a = document.createElement('a');
    a.className = 'hb-saved-tile';
    a.href = window.HB.spotDetailHref(spot, '../');
    a.title = spot.title;
    const region = LEGEND.find(c => c.number === spot.chapter);
    const regionName = region ? region.name : spot.chapter_id;
    const kicker = window.HB.singularKicker(spot.kicker || '');
    const sub = kicker ? `${esc(kicker)} · ${esc(regionName)}` : esc(regionName);
    const attrs = window.HB.photoAttrs({
      photoId: spot.imagePhotoId, image: spot.image,
      width: 1000, prefix: '../',
      sizes: '(min-width: 1200px) 25vw, (min-width: 600px) 33vw, 50vw',
    });
    const srcsetAttr = attrs.srcset ? ` srcset="${esc(attrs.srcset)}" sizes="${esc(attrs.sizes)}"` : '';
    a.innerHTML = `
      <div class="photo">
        <img src="${esc(attrs.src)}"${srcsetAttr} alt="${esc(spot.title)}" loading="lazy" decoding="async" />
      </div>
      <div class="body">
        <div class="name">${esc(spot.title)}</div>
        <div class="meta">${sub}</div>
      </div>
    `;
    return a;
  }

  // Cache the rendered spot-keys so Convex's spots:list push doesn't
  // rebuild an identical grid and flicker every image.
  let lastSpotsKey = '';
  function render() {
    counter.textContent = SPOTS.length;
    if (!SPOTS.length) {
      content.hidden = true;
      empty.hidden = false;
      if (lastSpotsKey !== '') { content.innerHTML = ''; lastSpotsKey = ''; }
      return;
    }
    empty.hidden = true;
    content.hidden = false;

    const spotsKey = SPOTS.map(s => s.imagePhotoId || s.image || s.id || '').join('|');
    if (spotsKey === lastSpotsKey) return;
    lastSpotsKey = spotsKey;

    content.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = 'hb-saved-grid';
    SPOTS.forEach(s => grid.appendChild(tile(s)));
    content.appendChild(grid);
  }

  window.HB.spots.subscribe(() => { refreshSpots(); render(); });
  render();
</script>
