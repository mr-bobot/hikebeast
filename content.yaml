- id: lac_de_derborence
  chapter: valais
  kicker: DROWNED TREES, STILL STANDING
  title: Derborence Lake
  deck: Two rockslides (1714 and 1749) dammed a valley and left the forest underwater. The tree skeletons are still there, frozen mid-sentence.
  body:
  - East end of the lake. Drive up from Aven or hike in from the hamlet of Derborence itself. The flooded trees are visible in low water. Best chances are late summer into early autumn
    when the lake level drops.
  - Overcast light is your friend here; harsh sun flattens the reflection. Wide lens for the whole scene; a tele picks out individual trunks. This is also the most protected nature reserve
    in Valais. Stay on marked paths.
  region: Derborence, Valais
  access: Drive + short walk
  effort: Easy
  best_light: Overcast
  wildCamping:
    verdict: forbidden
    reason: Lac de Derborence is a Pro Natura nature reserve and federally protected — one of the most strictly protected zones in Valais. Wild camping forbidden. Stay on marked paths.
