- id: camping_in_cheserys
  chapter: beyond
  kicker: BIVY UP HIGH, ABOVE THE CROWDS
  title: Camping in Chéserys
  deck: Wild camping at Les Chéserys is allowed. You just need to register online first. Find a quiet spot off the main drag.
  body:
  - Camping is permitted but regulated. Register online before you go; you'll fill out a short questionnaire. Details are posted at the La Flégère cable car station.
  - The area around the main lakes gets busy. Walk a bit further, find an empty spot with your own view. We've camped a ridge away from the main lake and had the whole scene to ourselves.
  region: Chamonix, France
  access: Same as Les Chéserys
  effort: Moderate
  best_light: Overnight (sunset + sunrise)
  wildCamping:
    verdict: tolerated
    featured: true
    style: tent
    tip: Reservation required via the Chamonix app. Tent up 19:00, down by 09:00, one night.
    reason: Bivouac zone around Lac Blanc / Lac des Chéserys inside the Aiguilles Rouges Réserve Naturelle. Online reservation mandatory via Chamonix app or bivouac.nature-haute-savoie.fr.
      Tent up at 19:00, taken down by 09:00, no fire, one night.
