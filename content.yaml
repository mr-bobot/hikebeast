- id: triftbrucke
  chapter: central
  kicker: SUSPENSION BRIDGES
  title: Triftbrücke
  deck: One of the most dramatic suspension bridges in the Alps. 170 m long, strung across a glacier lake.
  body:
  - Park in Gadmen and take the Triftbahn cable car. From the top station, it is a steep uphill hike to the bridge. About 410 metres of elevation, around two hours of walking.
  - Bring a drone. The aerial angles here are the real payoff. Bridge, lake, glacier, all in one frame. After sunset gives you the softest light on the glacier face.
  region: Gadmen, Central Switzerland
  access: Cable car + 2 hour hike
  effort: Moderate. Steep
  best_light: After sunset
  maps_url: https://www.google.com/maps/place/Triftbr%C3%BCcke/@46.3126581,2.6026627,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x478562bdf0ac9de3:0xf78db3a090c436b4!8m2!3d46.6941706!4d8.357416!16s%2Fm%2F0660mz0
  image: spots/triftbrucke/main.jpg
  image_credit: petartravel
  photos:
  - file: 03.jpg
    credit: zimydakid
    source_type: book
  gps:
    lat: 46.6941706
    lng: 8.357416
- id: triftsee
  chapter: central
  kicker: GLACIER LAKES
  title: Triftsee
  deck: The turquoise lake behind the bridge. Same hike, different light, the place where I would actually spend the night.
  body:
  - I recommend camping up there if you want to catch both sunset and sunrise. The cable car does not run early enough or late enough, so camping is the only way to get those shots.
  - Set up above the treeline, stay discreet, leave no trace. The lake goes from glass-still in the morning to glacier-fed current by afternoon.
  region: Gadmen, Central Switzerland
  access: Cable car + 2 hour hike
  effort: Moderate
  best_light: Sunset or sunrise
  maps_url: https://www.google.com/maps/place/Triftsee/@45.1662212,2.7371613,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x478562bec5770e75:0x5d5bfb0e9684139!8m2!3d46.6904!4d8.3591!16s%2Fm%2F04yd9sm
  image: spots/triftsee/main.jpg
  image_credit: steffi_inswiss
  gps:
    lat: 46.6904
    lng: 8.3591
- id: gelmersee
  chapter: central
  kicker: GLACIER LAKES
  title: Gelmersee
  deck: Easy to reach, and the funicular that gets you there is one of the steepest in the world. A photo spot in itself.
  body:
  - Drive to the base of the Gelmerbahn, where you will take one of the steepest funiculars in the world up to the lake. It only runs in summer and gets busy. Check if it is open, and book your seat in
    advance.
  - Morning light paints the far cliffs gold and turns the water glassy. Worth the early start.
  region: Haslital, Central Switzerland
  access: Funicular (summer only)
  effort: Easy
  best_light: Morning
  maps_url: https://www.google.com/maps/place/Gelmersee/@45.1662212,2.7371613,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x47857df2744e7e09:0xeb6bf0e43466b46f!8m2!3d46.615792!4d8.3302012!16s%2Fm%2F02qw9z3
  image: spots/gelmersee/main.jpg
