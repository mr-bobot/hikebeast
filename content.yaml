- id: mighty_range
  chapter: beyond
  kicker: HIKE AROUND THE LAKES TO FIND YOUR FRAME
  title: Mighty Range
  deck: Same lakes area, different time of day. Daylight walks around Les Chéserys are how you find the compositions for the golden-hour shots.
  body:
  - Walk around the lake system during the day to scout compositions. Find the rocks, the reflections, the foreground frames that will work when the light turns. Then come back at sunset or sunrise fully
    prepared.
  - Both sunset and sunrise work here. Sunrise puts first light on the range; sunset is warmer but with haze risk from a full day's heating. Morning is usually the cleaner shot.
  region: Chamonix, France
  access: Same as Les Chéserys
  effort: Easy. Scouting
  best_light: Sunset or sunrise
