- id: ponte_brolla
  chapter: ticino
  kicker: RIVERS
  title: Ponte Brolla
  deck: A cliff jumping spot on the Maggia, just below where the Melezza joins. Crystal water and pure adrenaline.
  body:
  - This is not a hiking destination, it is a cliff-jumping destination. Locals know it well. If you are not jumping, the river scenery still reads well in photos.
  - Come in summer when the water is warm and high enough. The rock formations and the turquoise water are the real draw.
  region: Locarnese, Ticino
  access: Drive + walk
  effort: Easy
  best_light: Daytime
  wildCamping:
    verdict: forbidden
    reason: Maggia floodplain (federally protected Auengebiet) plus TI cantonal ban. Wild camping forbidden.
    canton: Ticino (TI)
