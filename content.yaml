- id: tseuzier_lake
  chapter: valais
  kicker: A LAKE THAT REFLECTS LIKE GLASS
  title: Tseuzier Lake
  deck: A reservoir behind Crans-Montana. When the wind drops, the water goes still enough to mirror the peaks on the far shore.
  body:
  - Drive up the Rawyl road from Ayent. The lake sits at the top. Park at the dam, then walk the path along the north shore. The best reflections are at sunrise in late October when
    the larches on the surrounding slopes turn gold.
  - Wide lens for the whole vista, or a tele to isolate the reflected ridge. Mornings are almost always calmer than afternoons here; if the wind is up, walk to the far end where the
    water is more sheltered.
  region: Crans-Montana
  access: Drive up Rawyl
  effort: Easy
  best_light: Sunrise, calm wind
  wildCamping:
    verdict: forbidden
    reason: Camping or overnight stay in vehicles is prohibited at Tseuzier reservoir. The dam zone is patrolled. Tolerated single-night bivouac would be far above on the surrounding
      ridges (Wildhorn area), not at the lake itself.
    canton: Valais (VS)
