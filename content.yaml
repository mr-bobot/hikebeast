- id: les_cheserys
  chapter: beyond
  kicker: THE BEST VIEW OF MONT BLANC
  title: Les Chéserys
  deck: A cluster of small lakes above La Flégère with the cleanest view of Mont Blanc and the whole surrounding range.
  body:
  - Park in La Flégère, take the cable car up, then hike to the lakes. Lac Blanc is part of the same system and worth the extra walk. Bigger lake, equally good reflections.
  - Sunset is the hit. Mont Blanc and the range behind the lakes light up orange, and if the wind drops, you get the whole thing mirrored in the water. Plan your descent with a head
    torch if you stay for blue hour.
  - Walk the lake system in daylight to scout the rocks and reflections that will work when the light turns. The reserve is home to ibex, chamois, and marmot, dawn to mid-morning is
    the active window with a 200mm+ lens.
  region: Chamonix, France
  access: Cable car + hike
  effort: Moderate
  best_light: Sunset
  wildCamping:
    verdict: restricted
    reason: Réserve Naturelle Nationale des Aiguilles Rouges. Since 2024 (prefectural order), bivouac is forbidden by default; only regulated zones around Lac des Chéserys are tolerated,
      and ONLY with prior online booking via the Chamonix app or bivouac.nature-haute-savoie.fr. Tents 19:00-09:00, one night.
    canton: France
  maps_url: https://www.google.com/maps/place/Lacs+des+Ch%C3%A9serys/@45.1662212,2.7371613,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x47894cdf11eee317:0x3205ec87a48b021e!8m2!3d45.984858!4d6.90184!16s%2Fg%2F11fy_109py
