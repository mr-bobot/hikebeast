- id: mer_de_glace
  chapter: beyond
  kicker: A RIVER OF ICE ABOVE CHAMONIX
  title: Mer de Glace
  deck: The largest glacier in the French Alps. Take the red Montenvers train from Chamonix, then hike up and into the white.
  body:
  - From Chamonix, catch the Montenvers train to its upper station. The view takes in the whole glacier, with markers along the descent showing where the ice was in 1985, 2000, and 2010.
    A new telecabine (Feb 2024) drops to ice level; the moraine trail (45 to 60 min) holds the better vantages.
  - Anytime light works. Sunset, sunrise, moody overcast, or a clear night for stars. Bring warm layers; the wind coming off the ice strips the heat fast even in summer.
  - In winter the trail goes silent and white. Snowshoes are mandatory and the Montenvers schedule is reduced, last train down around 14:30, line closed for engineering in November and
    May.
  region: Chamonix, France
  access: Train + 45-60min hike
  effort: Moderate
  best_light: Anytime (sunset / sunrise best)
  wildCamping:
    verdict: restricted
    reason: 'Chamonix municipality: camping and bivouacs prohibited throughout territory since 1992; only high-altitude bivouac (sundown to sunrise, no tent) tolerated above 2,500 m
      or >1 h walk from a road. Mer de Glace area is intensively patrolled and contains glaciated terrain.'
    canton: France
  maps_url: https://www.google.com/maps/place/Mer+de+Glace/@46.3126581,2.6026627,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x47894eab1fba5965:0x41ece26799b55955!8m2!3d45.9203829!4d6.9279647!16zL20vMDFyd2tj
