- id: sanetschpass
  chapter: valais
  kicker: A PASS WITH A LAKE ON TOP
  title: Sanetschpass
  deck: A high mountain pass on the border of Valais and Bern, with a dam, a lake, and a cable car that drops into nothing.
  body:
  - 'Drive up from Sion through Conthey to the pass at 2,252m. The road is paved but narrow; check it is open (typically late May through October). At the top: the Sanetschsee reservoir,
    a restaurant, and a very dramatic cable car that descends vertically to Gsteig on the Bern side.'
  - For photos, walk 30 minutes west along the dam toward the open meadows. The ridges catch morning light cleanly. A drone works well up here. No crowds, no airspace restrictions to
    worry about.
