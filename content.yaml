    lng: 8.1548593
- id: rosenlaui_public_waterfall
  chapter: central
  kicker: WATERFALLS
  title: Rosenlaui Public Waterfall
  deck: A gorge carved into the mountain next to the hotel. Paid entry, but the light is worth it.
  body:
  - It costs a few francs to enter but it is very nice. Definitely bring a tripod to be able to properly expose the shot. The gorge is dark, the water is lit from above, and handheld will not cut it.
  - First light in the morning is the sweet spot. A slow shutter turns the spray into silk; a fast one catches every droplet.
  region: Rosenlaui, Central Switzerland
  access: Walk from Rosenlaui hotel
  effort: Easy
  best_light: Morning
  maps_url: https://www.google.com/maps/place/Rosenlaui,+3860+Schattenhalb/@45.1662212,2.7371613,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x478f854e2f14adf3:0x75e02d334586fdf8!8m2!3d46.6795746!4d8.1548593!16s%2Fg%2F1tmqq876
  image: spots/rosenlaui_public_waterfall/main.jpg
  image_credit: leon.helg
  gps:
    lat: 46.6795746
    lng: 8.1548593
- id: rosenlaui_secret_waterfall
  chapter: central
  kicker: WATERFALLS
  title: Rosenlaui Secret Waterfall
  deck: The one most visitors never find. Hidden behind the hotel, almost empty most mornings.
  body:
  - 'At the restaurant next to the parking lot, you can walk back to this waterfall. Very few people know. My recommendation: hit the public falls first, eat the ravioli at the restaurant, then hike back
    to the secret one.'
  - Wear a colourful jacket. Otherwise you will disappear into the dark rock in the photo. Even a small splash of red or orange changes the composition completely.
  region: Rosenlaui, Central Switzerland
  access: Walk behind the hotel
  effort: Easy
  best_light: Any time
  maps_url: https://www.google.com/maps/place/Rosenlaui,+3860+Schattenhalb/@45.1662212,2.7371613,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x478f854e2f14adf3:0x75e02d334586fdf8!8m2!3d46.6795746!4d8.1548593!16s%2Fg%2F1tmqq876
  image: spots/rosenlaui_secret_waterfall/main.jpg
  image_credit: leon.helg
  photos:
  - file: 02.jpg
