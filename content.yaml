- id: glacier_des_bossons
  chapter: beyond
  kicker: MY FAVOURITE GLACIER OF THE RANGE
  title: Glacier des Bossons
  deck: The Bossons drops farther into the Chamonix valley than any other glacier in the range. Which means you can see it from almost everywhere in town.
  body:
  - Visible from the Chamonix valley floor. Many angles work; pick a foreground. A chalet, a treeline, a bend of the river. And anchor the glacier in it.
  - Anytime light is fine. Late afternoon warms the ice and catches the highlights. A good viewpoint is from above, on the Aiguille du Midi cable car route. Or with a drone if you're somewhere you can fly
    legally.
  region: Chamonix, France
  access: From Chamonix valley
  effort: Easy
