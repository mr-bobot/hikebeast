- id: randa_bridge
  chapter: valais
  kicker: BRIDGES
  title: Randa Bridge
  deck: When it opened in 2017, the world's longest pedestrian suspension bridge. 494 metres across the valley, around ten minutes to cross.
  body:
  - The bridge sits between Visp and Zermatt in Randa. It's a 1.5 to 2 hour hike up from Randa village to the Europaweg trail; the crossing itself is around ten minutes. It swings more
    than you might expect, but it's not technical, just commitment.
  - Big photo moment. Visit on a clear day so you can actually see where the valley opens up below.
  region: Randa, Valais
