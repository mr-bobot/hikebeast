    best_season: Early to mid-October
    elevation_m: 1800
  arrival:
    by_car:
      directions: Drive the Engadin road (H27) between St. Moritz and Maloja for the lake belt (Silvaplana, Sils, Maloja). For the Stazerwald, park at Pontresina or Celerina and walk
        in. For the Lej da Cavloc, park at Maloja and walk up the Val Forno track. The Lej da Staz is accessed on foot from Celerina or St. Moritz Bad.
      parking: Engadin valley between St. Moritz, Sils-Maria and Maloja (GR)
    by_train_bus:
      route: Train to St. Moritz on the Albula line. PostBus 4 covers the lake belt from St. Moritz to Maloja. Trains also stop at Pontresina and Celerina for the Stazerwald.
    best_time: The greatest colour intensity of the Engadin larches falls around mid-October. Needles begin to turn from the first week of October and drop in the first half of November.
      Warm afternoon light intensifies the colour; early morning or evening gives the cleanest skies.
    operating: All access roads stay open through October. The Maloja Pass road and the Engadin valley road are kept clear year-round.
