- id: nax_via_ferrata
  chapter: valais
  kicker: A SHORT VERTICAL WITH BIG CONSEQUENCE
  title: Nax Via Ferrata
  deck: A bolted climbing route above Nax village. Not long, not super technical. But genuinely exposed.
  body:
  - Park at the trailhead above Nax (the route's start link points to the lot) and walk to the route start. You need a full via ferrata kit (harness, Y-lanyard with energy absorber,
    helmet, gloves) and some climbing experience. It is rated around K3. Not a beginner's route, but doable for a confident scrambler.
  - The view from the top traverses the Rhone valley. For photos, a drone captures the route and the climbers against the drop; from the ground, shoot from below with a wide lens to
    emphasize the exposure. Go early. Afternoon thunderstorms are common in summer.
  region: Nax
  access: Drive + K4 via ferrata (1-2 h climbing)
  effort: Hard / technical
  best_light: Morning
  wildCamping:
    verdict: discouraged
    reason: Below tree line near Nax village; not a wild-camping spot. Use the campsite at Vex/Sion.
