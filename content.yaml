- id: gelmerbahn
  chapter: central
  kicker: CABLE CARS
  title: Gelmerbahn
  deck: The ride up. Cinematic enough to go viral on its own. 106% gradient at the steepest section.
  body:
  - Take a timelapse in the front or back row of the cable car for a viral video. The drop opens up behind you and the whole valley unfolds in thirty seconds.
  - Booking the front seat is worth the extra effort. Keep your camera steady. The wobble is part of the charm but easy to over-do.
  region: Haslital, Central Switzerland
  access: Funicular from base
  effort: Easy
  best_light: Any time
  maps_url: https://www.google.com/maps/place/Gelmerbahn/@45.1662212,2.7371613,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x478f875bae1b82fb:0xece15aab211b8f11!8m2!3d46.6136385!4d8.3085363!16s%2Fm%2F0nbtnrh
