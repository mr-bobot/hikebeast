- id: grammont
  chapter: western
  kicker: ABOVE THE LAKE, MAYBE WITH IBEX
  title: Grammont
  deck: Keep hiking past Lac de Taney and you reach Le Grammont. A summit with a direct view down onto Léman.
  body:
  - From Lac de Taney, the trail continues up. Plan around two hours depending on your pace. Bring water and warm layers. Exposed summit, wind is common.
  - You'll sometimes see ibex on the upper slopes. Sunrise is the best shot. You get the lake gold-lit and the French Alps crisp to the south.
