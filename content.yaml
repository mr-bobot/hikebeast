- id: augstmatthorn
  chapter: central
  kicker: RIDGES
  title: Augstmatthorn
  deck: Ridge view over Brienzersee. Same trail as the Hardergrat, but you can sneak in from the back.
  body:
  - On the Hardergrat ridge but accessible from the other side too. Park at Lombachalp in Habkern and do the two hour hike up. Lighter than the full traverse, same view.
  - Great panorama over the Brienzersee. For the lake to pop you want clean weather, but cloudy days still work if you frame the ridge against the moving sky.
  region: Habkern, Central Switzerland
  access: 2h hike from Lombachalp
  effort: Moderate
  best_light: Anytime
  wildCamping:
    verdict: forbidden
    reason: Inside Augstmatthorn federal game reserve and on the Hardergrat ridge — wild camping explicitly forbidden across the entire ridge as a federally protected wildlife corridor.
      Fines apply.
    canton: Bern (BE)
    protections:
    - Federal hunting reserve — Augstmatthorn
    note: Not allowed on the ridge. The line is an ibex sanctuary and the car park below is watched.
