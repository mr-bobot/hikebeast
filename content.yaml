- id: la_fouly
  chapter: valais
  kicker: A VILLAGE AT THE MOUTH OF A GLACIER
  title: La Fouly
  deck: A quiet hamlet at the head of Val Ferret, facing a wall of peaks that look borrowed from Patagonia.
  body:
  - Drive up the Val Ferret from Orsières. La Fouly sits under the Dolent, Tour Noir, and Grandes Jorasses. You are staring straight at the Swiss-Italian-French border. In winter it is a tiny ski resort;
    in summer the trails to Mont Dolent are some of the quietest in the Alps.
  - For photos, walk 15 minutes out of the village toward the glacier moraine. The alpenglow hits the peaks about 20 minutes before sunset. You will want a tele (135 to 200mm) to compress the layers.
  region: Val Ferret
  access: Drive
  effort: Easy
  best_light: Sunset, just before alpenglow
