- id: ferpecle_glacier
  chapter: valais
  kicker: A GLACIER YOU CAN STILL REACH ON FOOT
  title: Ferpècle Glacier
  deck: Tucked at the head of the Val d'Hérens, quieter than its neighbours and wild in a way Zermatt no longer is.
  body:
  - Drive to the hamlet of Ferpècle at the end of the road, park, and walk in toward the glacier front. About 2 hours of mostly flat to gently rising terrain. You will share the valley with a handful of
    day hikers and some very serious-looking goats.
  - Bring a drone if you have one. The glacier and the surrounding Dent Blanche massif are best read from a bit of altitude. On the ground, look for the ice caves that form in the terminal face in late
    winter.
