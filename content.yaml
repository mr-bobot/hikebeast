  trip_facts:
    busyness: 4
    best_season: June - October
    elevation_m: 1797
  arrival:
    by_car:
      directions: Drive along the Engadin road (H27) from St. Moritz or over the Maloja Pass. Public car parks at Sils Maria and along the lake at Sils Baselgia and Plaun da Lej.
      parking: Sils im Engadin / Segl, 7514, Grisons
    by_train_bus:
      route: Train to St. Moritz, then PostBus 4 toward Maloja stops at Sils Maria, Sils Baselgia, Plaun da Lej and Maloja Posta along the lakeshore.
    by_boat:
      route: The Segl-Maria boat runs from late June to late September between Sils Maria, the Chastè peninsula, Plaun da Lej, Isola and Maloja. The crossing takes about 40 minutes and
        is one of the highest scheduled lake boat routes in Europe.
    best_time: Calm mornings give the mirror reflection of Piz Corvatsch and Piz da la Margna. The first half of October peaks for the larches around the lake.
    operating: Lakeshore footpath is open year-round; the boat runs end of June through end of September.
