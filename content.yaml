- id: the_ice_cave_by_night
  chapter: valais
  kicker: THE SAME PLACE, 12 HOURS LATER
  title: The Ice Cave by Night
  deck: Headlamp, tripod, and 30 seconds of patience. The tunnel becomes something else entirely.
  body:
  - Same location, same winter-only rules. But shot after dark with the light source inside the cave. Set the camera to f/2.8, ISO around 1000, 20 to 30 second exposure. Have a friend stand still at the
    far end holding a warm-temperature headlamp; the ice walls will glow.
  - 'Dress warmer than you think. You will be standing in a wind tunnel made of ice. Kit that survives: weather-sealed body, two batteries kept inside your jacket, hand warmers taped to the lens to stop
    fogging when you exit.'
  region: Zinal
