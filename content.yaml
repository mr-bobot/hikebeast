- id: nax_via_ferrata
  chapter: valais
  kicker: A SHORT VERTICAL WITH BIG CONSEQUENCE
  title: Nax Via Ferrata
  deck: A bolted climbing route above Nax village. Not long, not super technical. But genuinely exposed.
  body:
  - Park at 46.200456, 7.031477 and walk to the route start. You need a full via ferrata kit (harness, Y-lanyard with energy absorber, helmet, gloves) and some climbing experience. It is rated around K3.
    Not a beginner's route, but doable for a confident scrambler.
  - The view from the top traverses the Rhone valley. For photos, a drone captures the route and the climbers against the drop; from the ground, shoot from below with a wide lens to emphasize the exposure.
    Go early. Afternoon thunderstorms are common in summer.
  region: Nax
  access: Drive to parking
  effort: Hard / technical
  best_light: Morning
  maps_url: https://www.google.com/maps/place/Nax,+Via+Ferrata/@45.1662212,2.7371613,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x478edf1e98c5595d:0x918d4324e8652544!8m2!3d46.222247!4d7.419528!16s%2Fg%2F1tdrw6xw
