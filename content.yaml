    elevation_m: 830
    busyness: 2
  arrival:
    by_car:
      directions: From La Chaux-de-Fonds, drive to Le Locle, then follow signs toward Les Planchettes and Les Roches de Moron. The road ends at Restaurant Les Roches de Moron above the
        canyon.
      parking: Restaurant Les Roches de Moron lot at the trailhead, free for diners, signed paid parking otherwise.
      walk_to_spot_min: 5
    by_train_bus:
