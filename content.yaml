- id: cap_au_moine
  chapter: western
  kicker: A NARROW RIDGE ABOVE COL DE JAMAN
  title: Cap au Moine
  deck: A knife-edge ridge you reach from Col de Jaman. The view down to Lac Léman is one of the most dramatic in the whole country.
  body:
  - Park at Col de Jaman (46.451752, 6.977129) and hike toward Col de Pierra-Perchia. It takes about an hour. Keep your attention on the trail. Parts of the ridge are exposed enough
    that a fall would be fatal.
  - Sunrise is the spot. Sunset works too, and you'll often get better colour over the lake then. Either way, give yourself margin to get up and down in daylight.
  region: Riviera vaudoise
  access: Drive + ~1h ascent (round trip ~2h 45)
  effort: Moderate. Exposed
