- id: rosenlaui_public_waterfall
  chapter: central
  kicker: WATERFALLS
  title: Rosenlaui Gorge
  deck: A gorge carved into the mountain next to the hotel. Paid entry, but the light is worth it.
  body:
  - It costs a few francs to enter but it is very nice. Definitely bring a tripod to be able to properly expose the shot. The gorge is dark, the water is lit from above, and handheld
    will not cut it.
  - First light in the morning is the sweet spot. A slow shutter turns the spray into silk; a fast one catches every droplet.
  region: Rosenlaui, Central Switzerland
  access: Walk from Rosenlaui hotel
  effort: Easy
  best_light: Morning
  wildCamping:
    verdict: forbidden
    reason: Inside federal game reserve "Schwarzhorn" — wild camping banned. Paid gorge entry, no overnight.
    canton: Bern (BE)
    protections:
