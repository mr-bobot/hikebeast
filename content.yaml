- id: riffelsee
  chapter: valais
  kicker: LAKES
  title: Riffelsee
  deck: The Matterhorn, doubled. At first light the tip turns red before the rest of the mountain catches up.
  body:
  - Take the Gornergrat Bahn from Zermatt up to Rotenboden. From the station it is a short walk down to the lake. Maybe ten minutes on an easy path.
  - Shoot wide. 24mm or 35mm. To keep the peak and its reflection in the same frame. The reflection only works if the wind stays down, so cross your fingers for a still morning.
  - Be in position before sunrise. The red on the tip lasts maybe five minutes before full light floods in and kills the effect.
  region: Zermatt, Valais
  access: Gornergrat Bahn
  effort: Easy
  best_light: Sunrise
  wildCamping:
    verdict: forbidden
    reason: Riffelsee is the most-photographed spot at Gornergrat. Even though the surrounding terrain is above tree line in BLN (where SAC rules technically permit single-night bivouac),
      Zermatt enforces a no-camping policy at the lake itself and rangers patrol the Rotenboden plateau. Use a Zermatt campsite, or pitch far above the Bahn route — never at the Riffelsee
      photo spot.
    canton: Valais (VS)
    protections:
    - BLN landscape — Dent Blanche – Matterhorn – Monte Rosa
    note: Camping is banned across the Zermatt valley. Photographers still bivouac at the lake anyway because the train timetable misses both golden hours. If you go that way, be invisible
      by morning.
  maps_url: https://www.google.com/maps/place/Riffelsee/@46.3126581,2.6026627,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x478f357f775bfeb9:0x978f19ea07f178a8!8m2!3d45.983269!4d7.7620615!16s%2Fm%2F04jdjqc
