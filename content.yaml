- id: la_tzoumaz
  chapter: valais
  kicker: FROZEN PINES, A TWENTY-MINUTE WINDOW
  title: La Tzoumaz
  deck: A high-alpine forest above Verbier where, on cold spring mornings, the line between frozen and green pines cuts through the slope.
  body:
  - Go in spring, early, before the sun gets to the trees. The frozen pines melt fast. Sometimes in twenty minutes. So you need to be set up before first light. The contrast between the icy forest and the
    slopes already warmed through is what you came for.
  - Park near La Tzoumaz and walk up toward the treeline. Any direction works; the effect is everywhere if the conditions cooperated overnight. A telephoto compresses the transition line into a clean graphic.
  region: Verbier area, Valais
  access: Drive + short walk
  effort: Easy
  best_light: Cold spring mornings
  maps_url: https://www.google.com/maps/place/La+Tzoumaz,+1918+Riddes/@45.1662212,2.7371613,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x478ec568cef83837:0x5960e7fe8f54afb0!8m2!3d46.1451509!4d7.2330688!16s%2Fm%2F02pp5wy
