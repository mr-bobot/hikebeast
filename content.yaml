- id: triftbrucke
  chapter: central
  kicker: SUSPENSION BRIDGES
  title: Triftbrücke
  deck: One of the most dramatic suspension bridges in the Alps. 170 m long, strung across a glacier lake.
  body:
  - Park in Gadmen and take the Triftbahn cable car. From the top station, it is a steep uphill hike to the bridge. About 410 metres of elevation, around two hours of walking.
  - Bring a drone. The aerial angles here are the real payoff. Bridge, lake, glacier, all in one frame. After sunset gives you the softest light on the glacier face.
  region: Gadmen, Central Switzerland
  access: Cable car + 2 hour hike
  effort: Moderate. Steep
  best_light: After sunset
  wildCamping:
    verdict: restricted
    reason: 'Trift glacier basin: tolerated above tree line near the SAC Trifthütte; pay the small contribution at the hut.'
    canton: Bern (BE)
  maps_url: https://www.google.com/maps/place/Triftbr%C3%BCcke/@46.3126581,2.6026627,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x478562bdf0ac9de3:0xf78db3a090c436b4!8m2!3d46.6941706!4d8.357416!16s%2Fm%2F0660mz0
