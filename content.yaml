- id: bachalpsee
  chapter: central
  kicker: LAKES
  title: Bachalpsee
  deck: Mountain lake above Grindelwald with a clean reflection of the Schreckhorn. Cable car plus a 50 to 60 minute walk.
  body:
  - Take the Firstbahn from Grindelwald, then hike about 50 to 60 minutes to the lake. The trail is well-marked and easy enough that you can do it on a half day.
  - Bring a drone for the reel angle. The reflection works best on still mornings before the wind picks up. Past the first lake there is a smaller second one that almost nobody walks
    to.
  region: Grindelwald, Central Switzerland
  access: Firstbahn cable car + 50-60 min hike
  effort: Easy
  best_light: Anytime, mornings for reflection
  wildCamping:
    verdict: forbidden
    reason: Wild camping is prohibited at Bachalpsee. The Grindelwald region imposes fines up to CHF 10,000 for violations (UNESCO Jungfrau-Aletsch buffer + heavily touristed First gondola
      plateau). Use the campsites Eigernordwand or Gletscherdorf in Grindelwald.
    canton: Bern (BE)
    protections:
    - Federal hunting reserve — Schwarzhorn
    - Mire landscape — Bachsee
    note: Signed as no-camping. People still bivouac through summer regardless.
  maps_url: https://www.google.com/maps/place/Bachalpsee/@45.1662212,2.7371613,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x478f99a2dab57f55:0x2fe44c469bb38461!8m2!3d46.669444!4d8.023333!16s%2Fm%2F027xf5b
