chapters:
- id: central
  number: '01'
  name: Central Switzerland
  intro: Waterfalls, glacier lakes and iron bridges strung across gorges so deep they hum. The heart of this guide. Twelve spots from Adelboden to the Grimsel Pass.
  description: Waterfalls, glacier lakes, the Hardergrat ridge.
  color:
  - 0.69
  - 0.65
  - 0.48
  cover_image: chapters/central.jpg
  cover_credit: dimitri_karastelev_unsplash
- id: valais
  number: '02'
  name: Valais
  intro: High alpine. Zermatt and the Matterhorn, glacier lakes, Riffelsee reflections. The chapter where Switzerland looks like its postcards. With room still for the ones nobody has printed yet.
  description: Matterhorn country. Glaciers, ice caves, high passes.
  color:
  - 0.92
  - 0.72
  - 0.75
  cover_image: chapters/valais.jpg
  cover_credit: ernst_burki_unsplash
- id: fribourg
  number: '03'
  name: Fribourg
  intro: Cheese country, jagged pre-alps, and a handful of lakes that should be more famous than they are. The canton that looks like the cover of every Swiss guidebook. And still has corners all to yourself.
  description: Hidden lakes and the Gastlosen limestone wall.
  color:
  - 0.85
  - 0.85
  - 0.82
  cover_image: chapters/fribourg.jpg
  cover_credit: xavier_von_erlach_unsplash_2
- id: western
  number: '04'
  name: Western Switzerland
  intro: The Léman arc, the Jura, and a slice of the Chablais. Vineyards down low, limestone cliffs up high, and a lake at the middle of everything. The most underrated quarter of the country for photographers.
  description: Vineyards, lakeside cliffs, quieter roads.
  color:
  - 0.8
  - 0.88
  - 0.62
  cover_image: chapters/western.jpg
  cover_credit: tcheucestbeau
- id: eastern
  number: '05'
  name: Eastern Switzerland
  intro: Appenzell chalets, Glarus waterfalls, turquoise dam lakes, and the Engadin glaciers. This is where Switzerland gets quieter, higher, and a bit stranger. My favourite part of the country to explore
    at my own pace.
  description: Appenzell, Säntis, lesser-known summits.
  color:
  - 0.49
  - 0.71
  - 0.66
  cover_image: chapters/eastern.jpg
  cover_credit: leon.helg
- id: ticino
  number: '06'
  name: Ticino
  intro: The south side of the Alps. Stone villages, turquoise rivers, and a whole valley built around cold water and dry sunshine. A short chapter, because this book focuses on the north. But a vital one.
  description: Alpine lakes, turquoise rivers, Italian mountain style.
  color:
  - 0.58
  - 0.52
  - 0.73
  cover_image: chapters/ticino.jpg
  cover_credit: nadine_marfurt_unsplash
- id: beyond
  number: '07'
  name: Beyond the Border
  intro: The spots that aren't in Switzerland. But close enough that leaving them out felt wrong. Chamonix and the Mont Blanc range, plus one view from the French side of Lac Léman. Pack the passport.
  description: Chamonix, Mont Blanc, and one French side of Léman.
  color:
  - 0.35
  - 0.35
  - 0.35
  cover_image: chapters/beyond.jpg
  cover_credit: leon.helg
spots:
- id: engstligen_falls
  chapter: central
  kicker: WATERFALLS
  title: Engstligen Falls
  deck: Two-tier falls off the Engstligenalp plateau above Adelboden. Overcast weather is actually the flex here.
  body:
  - Place your subject in front of the bright white parts of the waterfall to make them pop. Zoom in for cleaner compositions. Sometimes just water behind the subject is the strongest frame.
  - If you have a drone, send it up. Aerial angles give you perspectives you cannot get from the ground. Just watch the spray if you fly close.
  - Waterfalls make great portrait spots too. Wet clothes, flying droplets, mist in the air, all of it reads as cinematic.
  region: Adelboden, Central Switzerland
  access: Cable car + short walk
  effort: Easy
  best_light: When cloudy
  maps_url: https://www.google.com/maps/place/Engstligenf%C3%A4lle+Adelboden/@46.3126581,2.6026627,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x478f0223cdd45025:0x8dd2572eba113b9e!8m2!3d46.4539395!4d7.5607365!16zL20vMGZfZDM5
  image: spots/engstligen_falls/main.jpg
  image_credit: anthony_gomez_unsplash_2
  photos:
  - file: 04.jpg
    credit: zimydakid
    source_type: book
  - file: 05.jpg
    credit: zimydakid
    source_type: book
  - file: 02.jpg
    credit: zimydakid
    source_type: book
  gps:
    lat: 46.4539395
    lng: 7.5607365
- id: oltschibachfall
  chapter: central
  kicker: WATERFALLS
  title: Oltschibachfall
  deck: One of the tallest single-drop falls in the canton. Best admired from the viewpoint trail, not the base.
  body:
  - Great pictures from far and near. But I would not recommend hiking all the way to the base. There is no clear path, the rocks are slippery, and a fall here could be fatal. Not worth it.
  - Better to admire it from a safe distance and still get great shots. Late afternoon light on the cliff face is when the colours really come alive.
  region: Brienz, Central Switzerland
  access: Hike from Brienzersee
  effort: Moderate
  best_light: Late afternoon
  maps_url: https://www.google.com/maps/place/Oltschibachfall/@46.3126581,2.6026627,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x478f9055579d6091:0xb55ba99851925c8f!8m2!3d46.7312!4d8.11416!16s%2Fg%2F1thvrltt
  image: spots/oltschibachfall/main.jpg
  image_credit: oliwear.j
  photos:
  - file: 04.jpg
    credit: zimydakid
    source_type: book
  - file: 05.jpg
    credit: zimydakid
    source_type: book
  gps:
    lat: 46.7312
    lng: 8.11416
- id: rosenlaui
  chapter: central
  kicker: VALLEYS
  title: Rosenlaui
  deck: Tucked into the Reichenbach valley, where the Wetterhorn feels unreal in the late afternoon light.
  body:
  - No need to go all the way up to Rosenlaui village. The plateau five minutes before makes the best image of the mountain in the back. The Wetterhorn. Framed by pines and meadow.
  region: Meiringen, Central Switzerland
  access: Postbus + walk
  effort: Easy
  best_light: Afternoon
  maps_url: https://www.google.com/maps/place/Rosenlaui,+3860+Schattenhalb/@45.1662212,2.7371613,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x478f854e2f14adf3:0x75e02d334586fdf8!8m2!3d46.6795746!4d8.1548593!16s%2Fg%2F1tmqq876
  image: spots/rosenlaui/main.jpg
