- id: la_tine_canyon
  chapter: fribourg
  kicker: GO WITH A GUIDE THE FIRST TIME
  title: La Tine Canyon
  deck: A narrow slot canyon near Montbovon, marketed out of Château-d'Œx. Beautiful water, real risk. This one needs a local before you come back solo.
  body:
  - Also called La Tine de Montbovon. There's a dam in the upper valley, which means flash flood risk if you don't know the signals. Don't walk in blind. Book a trip with Gruyère Escapade
    (gruyere-escapade.ch/canyoning.html), learn the terrain, then come back on your own.
  - Once you know where to stand, the canyon is anytime. Shade means soft light almost all day. Bring a tripod and protect your camera from spray.
  region: Pays-d'Enhaut, Fribourg
  access: Drive + canyon access
  effort: Technical. Use a guide
  best_light: Anytime in shade
  wildCamping:
    verdict: restricted
    reason: Inside Parc naturel régional Gruyère Pays-d'Enhaut. Bivouac in the slot canyon itself impossible/dangerous; park rules tolerate single-night above tree line outside reserves.
  maps_url: https://www.google.com/maps/place/1669+Montbovon/@46.4880077,7.0028709,10080m/data=!3m2!1e3!4b1!4m6!3m5!1s0x478e8e4fff86dfeb:0x7f1aab823b11e665!8m2!3d46.4879565!4d7.0439846!16s%2Fg%2F120lw7t5
  image: spots/la_tine_canyon/main.jpg
  image_credit: xxx
  pdf: false
  gps:
    lat: 46.4879565
    lng: 7.0439846
  trip_facts:
    elevation_m: 870
    busyness: 2
  arrival:
    by_car:
      directions: From Bulle (FR) head south on the H189 toward Château-d'Oex via Montbovon; just past Montbovon, turn off into the La Tine hamlet (commune of Rossinière). Coming from
        Vaud, drive up from Vevey/Montreux via Les Avants and Les Moulins to Rossinière, then continue west toward Montbovon to La Tine.
    by_train_bus:
      route: MOB GoldenPass regional train (Montreux-Zweisimmen line) to La Tine station, which sits in the hamlet directly above the Sarine gorge
    best_time: Late spring through early autumn when water is high and the Sarine gorge is most photogenic; for canyoning, the operators run May to October.
    operating: Free public-land access on foot; the canyon descent itself requires a guided canyoning trip with a local outfitter (Guide Concept, Rivières Aventures and others). Best
      between May and October.
