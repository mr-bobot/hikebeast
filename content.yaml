    featured: true
    style: both
    reason: Wild camping is not allowed in Davos Klosters — the local police issue fines. Jöriseen is also inside BLN Silvretta-Vereina with sensitive alpine flora at the lake shores.
      Use the Davos campsite at Rinerhorn or pitches at Lake Davos.
    canton: Grisons (GR)
    protections:
