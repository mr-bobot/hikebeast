- id: dent_de_jaman
  chapter: western
  kicker: THE MOST PHOTOGRAPHED PEAK ABOVE MONTREUX
  title: Dent de Jaman
  deck: A small, sharp summit above Col de Jaman with an outsize view of Léman and the French Alps.
  body:
  - From Col de Jaman (46.451752, 6.977129), it's a straight hike up. Nothing technical, but steep enough to feel like a climb. Allow an hour each way.
  - Sunset is the move. The lake lights up orange, the Dents du Midi catch the last light to the south, and on a clear night you can stay up for stars.
  region: Riviera vaudoise
  access: Drive + hike
  effort: Moderate
  best_light: Sunset
