- id: salanfe_lake
  chapter: valais
  kicker: A HIDDEN LAKE IN A HANGING VALLEY
  title: Salanfe Lake
  deck: A reservoir that sits in a bowl between the Dents du Midi. Harder to reach than it looks on the map. That is the point.
  body:
  - 'Accessible via Van d''en Haut above Salvan. Park where the road ends and hike about 2 hours up. Alternative: approach from Mex in the Rhône valley, longer but quieter. Either way,
    the climb opens out suddenly to a huge still lake ringed by walls of rock.'
  - Stay overnight at the Cabane de Salanfe if you can book it. Dawn on the lake is among the best in the canton. A drone works well up here but the winds can pick up fast, so keep your
    eye on the treeline and do not fly far.
  region: Vallée du Trient, Valais
  access: 2 hr uphill hike
  effort: Moderate
  best_light: Sunrise
  wildCamping:
