- id: geltenschuss
  chapter: western
  kicker: A LONG HIKE TO A BIG WATERFALL
  title: Geltenschuss
  deck: A tall waterfall near Gstaad. The hike in is long, but the water in early summer makes it worth it.
  body:
  - Allow most of a day. The approach is well-marked but real distance. Bring food, water, and time to linger at the top.
  - Go in June for peak flow. Later in summer and the falls drop off hard. And out of season there might be barely any water at all.
  region: Saanenland, Bern
  access: Long day hike
  effort: Hard
  best_light: Early summer
  wildCamping:
    verdict: restricted
    reason: BLN "Berner Hochalpen". Tolerated above tree line; the falls themselves drop into the valley — pitch on the plateau above, not at the basin.
