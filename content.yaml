- id: the_flooded_forest
  chapter: valais
  kicker: DROWNED TREES, STILL STANDING
  title: The Flooded Forest
  deck: A rockslide in 1714 dammed a valley and left the forest underwater. The tree skeletons are still there, frozen mid-sentence.
  body:
  - Derborence Lake, east end. Drive up from Aven or hike in from the hamlet of Derborence itself. The flooded trees are visible in low water. Best chances are late summer into early autumn when the lake
    level drops.
  - Overcast light is your friend here; harsh sun flattens the reflection. Wide lens for the whole scene; a tele picks out individual trunks. This is also the most protected nature reserve in Valais. Stay
    on marked paths.
  region: Derborence
  access: Drive + short walk
  effort: Easy
  best_light: Overcast
