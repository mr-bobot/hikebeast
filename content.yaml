- id: fulberg
  chapter: central
  kicker: HIDDEN GEMS
  title: Fulberg
  deck: A ridge hike above Lake Uri that almost nobody does. Wide open, quiet, and the photo pays for the climb.
  body:
  - Take the Niederbauen-Klewenalp cable car up from Emmetten, then follow the ridge trail. It is a steady climb with no technical sections, but the ridge exposes you to weather fast,
    so pick a clear window.
  - Plan to stay late or sleep up there. The light two hours before sunset is when the ridge reads best. Bring a shell, water, and layers even in summer.
  - If you want the frame you see here, walk past the first viewpoint and keep going. The first bench is the crowded one. The second is empty.
  region: Emmetten, Central Switzerland
  access: Cable car + ridge hike
  effort: Moderate
  best_light: Late afternoon or sunset
  wildCamping:
