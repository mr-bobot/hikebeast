- id: iseltwald
  chapter: central
  kicker: VILLAGES
  title: Iseltwald
  deck: The Bridgerton chapel pier on the south shore of Brienzersee. Famous, crowded, but the village around it is the real reason to come.
  body:
  - There is a small platform on the lake where the Bridgerton selfie line forms. In my opinion that part is overrated. The village itself is the better visit, quiet, photogenic, lake water at your feet.
  - Great for swimming nearby. A viral reel here is jumping into the lake just as one of the big boats passes behind you.
