- id: zinal_glacier
  chapter: valais
  kicker: AN ICE CAVE UNDER THE TONGUE
  title: Zinal Glacier
  deck: Ice caves under the Zinal glacier tongue. Blue ceilings and frozen waterfall pillars, when the cave is still standing.
  body:
  - From Zinal village, follow the trail up Val de Zinal to the glacier moraine. Cave openings shift season to season. Ask at the Zinal tourist office or check current reports before
    going in.
  - Real talk. Ice caves under active glacier tongues collapse. Don't go alone, don't go on a warm afternoon, and don't stay long inside. The shot is not worth a roof fall.
  region: Val d'Anniviers, Valais
  access: Hike from Zinal village
  effort: Moderate
  best_light: Cold winter midday for the blue ceiling
