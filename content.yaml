- id: ruinaulta
  chapter: eastern
  kicker: A DEEP CANYON IN THE EAST
  title: Ruinaulta
  deck: The Swiss Grand Canyon. A white limestone gorge carved by the Rhine. From the viewpoint, it really does look like the States.
  body:
  - From Caumasee, follow the hiking signs to the Il Spir viewpoint. It's a short walk to the rim; the drop is big enough to be careful near the edge.
  - Sunrise is the light. The east face of the canyon catches first light and the mist often sits low in the bottom of the gorge. Twenty minutes later it's gone.
  region: Graubünden
  access: Walk from Caumasee
  effort: Easy
  best_light: Sunrise
  wildCamping:
    verdict: forbidden
    reason: Ruinaulta is a federally protected floodplain (Auengebiet) — wild camping forbidden. Use campsites in Flims/Trin or the riverside picnic areas during the day only.
    canton: Grisons (GR)
    protections:
    - BLN landscape — Ruinaulta
    - Floodplain reserve (Auengebiet) — Ruinaulta
