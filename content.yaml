- id: spielboden
  chapter: valais
  kicker: THE EASIEST MARMOTS IN SWITZERLAND
  title: Spielboden
  deck: A station above Saas Fee where the alpine marmots come within arm's reach. If you have ever wanted the shot, this is where.
  body:
  - Cable car up from Saas Fee to Spielboden (2,452m). The marmots are genuinely habituated. They will pose, sniff your lens, and occasionally take a nap at your feet. Peanuts are fine
    in moderation; do not feed them anything else.
  - Go in morning or late afternoon for soft light. A 70 to 200mm is plenty; you will not need anything longer. If you are after the classic Allalinhorn backdrop, walk 10 minutes up
    from the station toward the Hannig trail intersection.
  region: Saas Fee
  access: Cable car
  effort: Easy
  best_light: Morning or late afternoon
  wildCamping:
    verdict: forbidden
    reason: Spielboden is a Saas Fee cable-car viewpoint — same Saas Fee no-camping policy as the rest of the resort village. Wild camping not allowed near the cable-car infrastructure.
      Saas Fee/Grächen ski-area private land applies.
    canton: Valais (VS)
