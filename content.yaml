- id: ice_lake_griesslisee
  chapter: eastern
  kicker: FLOATING ICE IN SUMMER
  title: Ice Lake (Griesslisee)
  deck: A small high lake that holds ice in its water into the middle of summer. Hike-in, moderate effort, surreal result.
  body:
  - Start from Klausenpass. Not too hard, not too easy. A moderate grade, plan a half-day round trip.
  - Go in the middle of summer. Too early and there's still snow around the lake; too late and the ice has gone. The sweet spot is usually mid-July to early August.
  region: Glarus / Uri
  access: Hike from Klausenpass
  effort: Moderate
  best_light: Mid-summer
