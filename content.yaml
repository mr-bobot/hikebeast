- id: ferpecle_river
  chapter: valais
  kicker: ABSTRACT FROM ABOVE
  title: Ferpècle River
  deck: The meltwater braid downstream of the glacier. From a drone, it looks painted.
  body:
  - Same approach as the glacier. On the way in or out, get airborne above the flats where the river fans across the gravel bed. Grey silt, pale blue channels, and sharp dark lines where
    the water bites into the sediment.
  - Shoot top-down between 10am and 2pm for the cleanest separation between water and stone. The pattern changes through the day as the glacier melts faster in the afternoon, so you
    can revisit the same spot and get a different frame.
