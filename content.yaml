- id: teysachaux
  chapter: fribourg
  kicker: RIDGE WALK FROM MOLÉSON
  title: Teysachaux
  deck: Another Fribourg pyramid. Link it to Moléson along the ridge for a full-day traverse, or park near the base and hike up.
  body:
  - 'Two options: the long way, traversing the ridges from Moléson, which is a proper day out. Or parking at 46.534395, 6.975091 and hiking straight up, which cuts it down to a couple
    of hours.'
  - 'Same rules as Dent de Lys: exposed in places, not a casual walk. Worth the effort for the 360° at the top.'
