- id: brienzer_rothorn
  chapter: central
  kicker: SUMMITS
  title: Brienzer Rothorn
  deck: The peak above Brienz. Cable car to the top, and a camp lake below the summit that almost nobody photographs right.
  body:
  - Two ways up. The Brienz Rothorn Bahn is a steam cog railway from Brienzersee, slow and scenic. The Sörenberg cable car is the fast side. Both drop you within a short walk of the
    summit.
  - The shot is not from the top. Walk down toward the tarns below the north face in the evening. On a still day the whole ridge reflects in the water. Bring a tent, the light at first
    wind is the quiet window.
  - This is also the starting point for the full Hardergrat traverse. If you are camping here anyway, you are already halfway to that hike.
  region: Brienz, Central Switzerland
  access: Cog railway or cable car
  effort: Easy to summit
  best_light: Evening, still wind
  wildCamping:
    verdict: forbidden
    reason: 'On the Hardergrat-Brienzer Rothorn ridge: federally protected wildlife area + UNESCO Biosphäre Entlebuch buffer. No wild camping, no drones. Steam-train summit station +
      nearby SAC Brienzer-Rothorn-Hütte are the legal options.'
    canton: Bern (BE)
  maps_url: https://www.google.com/maps/place/Brienzer+Rothorn/@46.3126581,2.6026627,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x478f9430780b2d07:0x617f3f41f172a596!8m2!3d46.7871!4d8.04701!16zL20vMDJfZGhs
