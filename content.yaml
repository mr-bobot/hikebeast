    lat: 46.198
    lng: 7.02769
  trip_facts:
    elevation_m: 1100
    busyness: 1
  arrival:
    by_car:
      directions: From Lavey-les-Bains (south of Bex, Vaud) take the narrow mountain road that climbs in 29 switchbacks toward Morcles village. The waterfall is on the Avançon stream
        alongside this road as it climbs above the Rhône valley.
      parking: Small roadside pull-out at the foot of the waterfall on the Route de Morcles, free.
      walk_to_spot_min: 1
    best_time: Snowmelt period (late spring) for maximum flow; the waterfall narrows by late summer.
    operating: Free public access, year-round, but the Route de Morcles is steep, narrow and closed by snow in winter. Best between late spring and autumn.
