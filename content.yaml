- id: tannhorn
  chapter: central
  kicker: RIDGES
  title: Tannhorn
  deck: The highlight of the Hardergrat. A perfect grass ridge that peaks at sunset.
  body:
  - Heading west from Brienzer Rothorn, the walk to Tannhorn takes about an hour and a half to two. It sits right in the middle of the Hardergrat, the point where the ridge narrows to a clean line of grass
    with drops on both sides.
  - This is the best frame on the whole traverse. Sunset paints the west face warm while the east stays cool in shadow, so the ridge reads as a blade against the sky. Figure in frame gives scale.
  - If you shoot it at sunset, you cannot make the last cable car back. Plan to bivy on the ridge or carry on through the dark to Harder Kulm. Either way, pack for cold.
  region: Brienz, Central Switzerland
  access: Cable car to Rothorn + 3.5h hike
  effort: Challenging
  best_light: Sunset
  maps_url: https://www.google.com/maps/place/Tannhorn/@45.1662212,2.7371613,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x478f9602003ceea9:0x1f8630dd4a63d1d5!8m2!3d46.7749358!4d7.984555!16s%2Fm%2F04n0h0d
