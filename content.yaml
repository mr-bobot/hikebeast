- id: gastlosen
  chapter: fribourg
  kicker: A SEA OF CLOUDS OVER THE PRE-ALPS
  title: Gastlosen
  deck: A jagged limestone ridge on the Fribourg-Bern border. Best when an inversion rolls in and the peaks float above the fog.
  body:
  - Drive up toward Le Chalet du Soldat and hike a short while to the saddle that looks over the whole range. Sunrise is the best shot. Inversions happen more often in the early morning
    than in the evening.
  - Drone works well up here. If the sky is clear, handheld is fine too. Bring a telephoto to compress the ridge line into that postcard silhouette.
  region: Gruyère, Fribourg
