- id: saas_fee_glacier
  chapter: valais
  kicker: 13,000 YEARS OF ICE, RETREATING FAST
  title: Saas Fee Glacier
  deck: A ski glacier that doubles as a summer photo location. Especially from the rotating restaurant at 3,500m.
  body:
  - 'Mittelallalin is the reachable high point: cable car from Saas Fee to Felskinn, then the Metro Alpin funicular inside the mountain. The terrace gives you a panorama of the ice fields
    and the Mischabel peaks. Crowded in ski season, empty in the shoulder months.'
  - If you want to work the glacier edge on foot, the traverse from Spielboden to Längfluh is the best option. A 3-hour route that gets you close to the ice without needing crampons
    or a guide.
  region: Saas Fee
