- id: heftihutte
  chapter: central
  title: Heftihütte
  kicker: SLEEP ON THE RIDGE
  deck: Mountain hut high on the Schrattenfluh ridgeline. Sunrise from the door is the reason to book a bunk.
  body:
  - Start from the Marbachegg cable car. Hike via Imbrig and along the ridge with the mountains on your right, then up to the hut. Long day, demanding pace.
  - Book a bunk in advance. Without a reservation you can't sleep inside, and the hut fills fast in season.
  region: Schrattenfluh
  access: Cable car + long hike
  effort: Hard
  best_light: Sunrise
  wildCamping:
    verdict: restricted
