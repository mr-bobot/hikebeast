- id: latine_canyon
  chapter: fribourg
  kicker: GO WITH A GUIDE THE FIRST TIME
  title: Latine Canyon
  deck: A narrow slot canyon near Château-d'Œx. Beautiful water, real risk. This one needs a local before you come back solo.
  body:
  - Also called La Tine. There's a dam in the upper valley, which means flash flood risk if you don't know the signals. Don't walk in blind. Book a trip with Gruyère Escapade (gruyere-escapade.ch/canyoning.html),
    learn the terrain, then come back on your own.
  - Once you know where to stand, the canyon is anytime. Shade means soft light almost all day. Bring a tripod and protect your camera from spray.
  region: Pays-d'Enhaut
  access: Drive + canyon access
  effort: Technical. Use a guide
  best_light: Anytime in shade
  maps_url:
