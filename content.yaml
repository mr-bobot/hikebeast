- id: the_ice_cave
  chapter: valais
  kicker: DEEP WINTER ONLY, AND ONLY IF IT'S COLD
  title: The Ice Cave
  deck: A natural tunnel under Zinal Glacier. One of the most photogenic spots in Valais. And one of the easiest to get hurt in if you go at the wrong time.
  body:
  - Start near coords 46.127840, 7.629728 and hike toward 46.071559, 7.632709. This is a deep-winter spot. Never go after warm days, and do not go alone. Ice caves collapse when temperatures
    rise; people die from that every year in the Alps. Check avalanche reports, tell someone your plan.
  - Inside, light bounces blue off the ice. A wide lens gets the whole tunnel arc; a mid-telephoto picks out the frozen detail. Bring crampons or microspikes, headlamp, and a tripod.
    It is darker than it looks.
  region: Zinal
  access: Winter hike, cold-dependent
  effort: Hard / technical
  best_light: Midday in deep winter
