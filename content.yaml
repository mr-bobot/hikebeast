  chapter: central
  kicker: VILLAGES
  title: Grindelwald
  deck: The village at the foot of the Eiger. Easy by car, and the spring meadows under the north face do most of the work.
  body:
  - Grindelwald sits at the foot of the Eiger, one of the most recognisable mountain faces in the Alps. The classic photo spot is easy to reach by car.
  - Spring is the window. Wildflowers in the meadows, snow still on the upper face, and the late afternoon sun catching the north face after the village goes into shadow.
