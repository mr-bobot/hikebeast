- id: mont_blanc
  chapter: beyond
  kicker: WESTERN EUROPE'S HIGHEST. WITH A TELE
  title: Mont Blanc
  deck: From Les Chéserys, Mont Blanc sits enormous across the valley. A telephoto lens turns the view into detail-rich alpine portraiture.
  body:
  - Bring a 100-400mm. The range reveals ridges, couloirs, and texture you can't see with a wide lens. This is the spot where reach pays off. Compress the scene and pick out the features.
  - Sunset and blue hour are the windows. Blue hour lasts longer at altitude and gives you that soft, saturated palette that makes the mountain look almost unreal. This one was shot
    at sunset on a 100-400.
  region: Chamonix, France
  access: From Les Chéserys
  effort: Easy. Standing still
  best_light: Sunset or blue hour
  wildCamping:
