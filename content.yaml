- id: stoss_kirche
  chapter: eastern
  kicker: CHAPELS
  title: Stoss Kirche
  deck: A small wooden chapel on a green knoll with craggy Appenzell peaks behind. The shot composes itself.
  body:
  - Stoss is a saddle above Altstätten in the Appenzell ridge. You can drive to the parking at the pass and walk five minutes to the chapel.
  - Time it for afternoon when the clouds pile up behind the peaks. The church in the bottom third, a big sky on top.
  - The detail that makes it work is the yellow wood against the grey limestone. Don't oversaturate it. Let the contrast do the talking.
  region: Appenzell, Eastern Switzerland
  access: Drive to Stoss, 5 min walk
  effort: Easy
  best_light: Afternoon clouds
  maps_url: https://www.google.com/maps/place/6433+Stoos/@45.1662212,2.7371613,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x47854f75c3a3a779:0xe3a15d4f8070c905!8m2!3d46.9797573!4d8.6669493!16s%2Fm%2F065_c3n
