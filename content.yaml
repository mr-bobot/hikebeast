- id: les_drus
  chapter: beyond
  kicker: TWIN SPIRES OVER THE GLACIER
  title: Les Drus
  deck: Two near-vertical granite spires above the Mer de Glace. From the Montenvers viewpoint, they line up clean against the sky.
  body:
  - Seen from the same Mer de Glace vantages you hiked for the glacier shots. No separate trip needed. Shoot them on the same outing with a longer lens to isolate.
  - Sunset and sunrise both hit the granite at a nice angle. Moody overcast gives the rock real character. Blue-sky blue-hour is the weakest window here.
  - In winter the spires get coated in ice and the contrast against the granite gets sharper. Same access, snowshoes, and the reduced Montenvers schedule.
  region: Chamonix, France
  access: From Mer de Glace viewpoint
