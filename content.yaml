  chapter: valais
  kicker: FROM THE AIR
  title: Moiry from Above
  deck: A drone perspective turns the moraine into abstract geometry. Blue ice, grey rubble, and the hut as a tiny orange dot.
  body:
  - If you have got a drone and the rules allow it, climb above the hut before launching and you will get a top-down that separates the glacier crevasse field cleanly from the ice lake below. Mid-morning
    light works best. Enough shadow to read the texture, not so low you lose the detail.
  - 'Handheld alternative: the trail continues up toward the Sassenaire ridge and gives you almost the same angle without needing any airspace permissions. Takes another hour from the hut.'
