- id: klausenpass
  chapter: eastern
  kicker: A HIGH PASS WITH ROOM TO CAMP
  title: Klausenpass
  deck: The pass road itself, plus a short hike to 46.866729, 8.859118 to find a spot close to where we've camped.
  body:
  - Park at the Klausenpass and hike toward the GPS point. Note the road is only open roughly June through September; closed for snow the rest of the year. The terrain opens up and there's
    a flat area that works as a bivy spot if you're set up for it.
  - Sunrise is the goal. The peaks around the pass catch first light clean. Stay until the valley warms up, then descend.
