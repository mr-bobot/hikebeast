- id: gorges_du_chauderon
  chapter: western
  kicker: WATERFALL HIDDEN IN THE MONTREUX CANYON
  title: Gorges du Chauderon
  deck: A waterfall hidden in the canyon, invisible from the footpath. You'll need a drone. And patience for the weather.
  body:
  - The waterfall sits on the lower part of the canyon, closer to Montreux. From the path above, it's completely hidden. Launch the drone from a clearing and fly down into the gorge.
  - Best on cloudy or rainy days in late spring and summer. The ferns and moss go neon green, and the diffused light means no blown highlights on the water.
  region: Montreux, Vaud
  access: Canyon trail + drone
  effort: Easy
  best_light: Cloudy spring days
  wildCamping:
    verdict: discouraged
    reason: Gorges du Chauderon above Montreux; below tree line in private/canyon land, drone-only viewpoint. Day visit only.
  maps_url: https://www.google.com/maps/place/Gorges+du+Chauderon/@46.4367906,6.9229226,485m/data=!3m1!1e3!4m6!3m5!1s0x478e9bd02ed88279:0x5a702a06efcffa74!8m2!3d46.4368563!4d6.9250077!16s%2Fg%2F11f652tll2
  image: spots/gorges_du_chauderon/main.jpg
  image_credit: xxx
  pdf: false
  gps:
    lat: 46.4368563
    lng: 6.9250077
  photos:
  - file: 03.jpg
    credit: zimydakid
    source_type: book
  - file: 02.jpg
    credit: zimydakid
    source_type: book
  trip_facts:
    elevation_m: 460
    busyness: 2
  arrival:
    by_car:
      directions: From the Montreux lakefront, drive up into Les Planches (the old town just east of central Montreux). The gorge entrance is reached from the streets behind St-Vincent
        church.
      parking: Small paid lot between Les Planches old town and the church of St-Vincent in Montreux. Limited capacity.
      walk_to_spot_min: 5
    by_train_bus:
      route: Train to Montreux SBB, then walk uphill through Les Planches (about 15 minutes through town to the trailhead). The Les Avants-Sonloup funicular and MOB train via Les Avants
        can be used to do the gorge as a one-way descent or loop.
      walk_from_stop_min: 15
    best_time: 'Summer mornings: the canyon stays naturally cool on hot days. Avoid right after heavy rain when stone steps and wooden bridges get slick.'
    operating: Free public access, no entrance fee, no fixed hours. The trail is in places affected by rockfall and section closures, check Montreux Riviera Tourisme or SwitzerlandMobility
      for the current status before going.
  hike_ids:
  - gorges_du_chauderon-drive-up
- id: pisse_chevre
  chapter: western
  kicker: A REMOTE VAUD WATERFALL
  title: Pisse-Chèvre
  deck: A tall waterfall above the Rhône valley. Great when the snowmelt is running hard or after spring rain.
  body:
  - 'Waterfall location: 46.202355, 7.031412. For drone shots, park and launch from 46.200456, 7.031477. The aerial perspective is where this one earns its place.'
  - Go at the end of summer after a rainy week, or in April-May when the snow is coming off fast. Cloudy skies help the greens pop in the frame.
  region: Lavey-Morcles, Vaud
  access: Drive + drone
  effort: Easy
  best_light: Cloudy with high water
  wildCamping:
    verdict: restricted
    reason: Vaud Pre-alps, above tree line at the falls' top. Tolerated single-night, no fire.
    canton: Vaud (VD)
  maps_url: https://www.google.com/maps/place/Pissechevre/@45.1662212,2.7371613,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x478eb91116b7f2b1:0xaf936736e1645bd7!8m2!3d46.198!4d7.02769!16s%2Fg%2F1tdw2cpw
  image: spots/pisse_chevre/main.jpg
  image_credit: samsurinwelch
  photos:
