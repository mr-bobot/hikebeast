  title: Engadin in Autumn
  deck: The last two weeks of October are when the Lärchen turn yellow. Engadin and Ticino both light up; bring a tripod and time it.
  body: []
  region: Engadin, Grisons (and Ticino)
  access: Drive
  effort: Varies
  best_light: Mid to late October
  wildCamping:
