- id: oltschibachfall
  chapter: central
  kicker: WATERFALLS
  title: Oltschibachfall
  deck: One of the tallest waterfalls in the canton, dropping in tiers down the cliff. Best admired from the viewpoint trail, not the base.
  body:
  - Great pictures from far and near. But I would not recommend hiking all the way to the base. There is no clear path, the rocks are slippery, and a fall here could be fatal. Not worth
    it.
  - Better to admire it from a safe distance and still get great shots. Late afternoon light on the cliff face is when the colours really come alive.
  region: Brienz, Central Switzerland
  access: Hike from Unterbach
  effort: Moderate
  best_light: Late afternoon
  wildCamping:
    verdict: discouraged
    reason: Below tree line at ~950 m; private/forest land, no wild camping. Day visit only.
    canton: Bern (BE)
  maps_url: https://www.google.com/maps/place/Oltschibachfall/@46.3126581,2.6026627,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x478f9055579d6091:0xb55ba99851925c8f!8m2!3d46.7312!4d8.11416!16s%2Fg%2F1thvrltt
