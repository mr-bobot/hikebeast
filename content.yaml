      directions: From Lavey-les-Bains (reached from the A9 motorway exit at Saint-Maurice / Lavey), follow signs for Morcles. The road climbs in 29 numbered switchbacks roughly 800
        m up the south flank of the Rhône valley to Morcles village.
      parking: Free roadside pull-outs at several switchbacks and viewpoints; small lot in Morcles village at the top.
