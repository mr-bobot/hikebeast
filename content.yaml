- id: lauterbrunnen
  chapter: central
  kicker: VALLEYS
  title: Lauterbrunnen
  deck: The valley everyone knows. Cliffs, waterfalls, the Staubbach falling 300 metres straight off the wall. Yes, it is still worth the visit.
  body:
  - One of the most famous valleys in Switzerland for a reason. Vertical cliffs on both sides, the village strung along the floor, and dozens of waterfalls falling off the rim if you count the seasonal
    ones.
  - Avoid the middle of the day. Mornings work for the village shots before the tour buses arrive. Late afternoon catches the Staubbach in side-light.
  region: Lauterbrunnen Valley, Central Switzerland
  access: Train or drive
  effort: Easy
  best_light: Anytime, golden hour for the falls
  maps_url: https://www.google.com/maps/place/Lauterbrunnen/@46.3126581,2.6026627,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x478fa0073b1165c7:0x5392dbb55902c31!8m2!3d46.5935058!4d7.9090981!16zL20vMDFxamwz
