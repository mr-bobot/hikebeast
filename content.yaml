- id: bachalpsee
  chapter: central
  kicker: LAKES
  title: Bachalpsee
  deck: Mountain lake above Grindelwald with a clean reflection of the Schreckhorn. Cable car plus a 45 minute walk.
  body:
  - Take the Firstbahn from Grindelwald, then hike about 45 minutes to the lake. The trail is well-marked and easy enough that you can do it on a half day.
  - Bring a drone for the reel angle. The reflection works best on still mornings before the wind picks up. Past the first lake there is a smaller second one that almost nobody walks to.
  region: Grindelwald, Central Switzerland
  access: Firstbahn cable car + 45 min hike
  effort: Easy
