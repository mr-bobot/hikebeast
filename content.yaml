- id: fronalpstock
  chapter: central
  kicker: VIEWPOINTS
  title: Fronalpstock
  deck: Lake Lucerne laid out below, sunset turning the whole basin pink. Cable car and chairlift up from Morschach, a short walk to the bench.
  body:
  - Take the cable car from Morschach up to Stoos village, then the chairlift to Fronalpstock. Walk ten minutes along the ridge to the main viewpoint. Stone bench, zero work.
  - Aim for sunset. The sun drops right behind Mount Pilatus and the light catches the full length of the lake. In winter the snow cover pushes the contrast even further.
  - Wide first, then swap to a longer lens for the compressed version of Pilatus and the Vierwaldstättersee fingers.
  region: Morschach, Central Switzerland
  access: Cable car + ridge hike
  effort: Easy
  best_light: Sunset
  wildCamping:
    verdict: forbidden
    featured: true
    style: tent
    tip: Designated tent area at the Fronalpstock Hotel. Book through the hotel.
    reason: Wild bivouacking is not permitted on Fronalpstock or anywhere in the Stoos-Muotatal region. Only the designated tent area near the Fronalpstock Hotel is legal — book through
      the hotel.
    canton: Schwyz (SZ)
    protections:
    - BLN landscape — Vierwaldstättersee mit Kernwald, Bürgenstock und Rigi
    note: There is a designated overnight spot on the summit. Small fee, settled at the Fronalpstock Hotel.
  maps_url: https://www.google.com/maps/place/Fronalpstock/@46.3126581,2.6026627,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x47854ff532352c5f:0xc8fa9f26d0331387!8m2!3d46.9682209!4d8.6372684!16s%2Fm%2F04ldsrd
