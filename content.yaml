- id: lake_lucerne
  chapter: central
  kicker: LAKES
  title: Lake Lucerne
  deck: Vierwaldstättersee. The lake that runs through half of Central Switzerland, with fingers that disappear between the cliffs.
  body:
  - You cannot really shoot "Lake Lucerne" from a single spot. The lake has four arms, and every town on it has a different frame. Lucerne old town for the postcard, Bürgenstock for the cliff edge, Morschach
    for the Fronalpstock view, Brunnen for the Rütli angle.
  - Winter is when this place actually reads as alpine. Fresh snow on the pine slopes, dark water in the lake, the Alps stacked behind. Summer is busy and the light is flatter.
  - If you only have time for one, go up Fronalpstock on a clear winter morning. You can see the full length of the lake and Mount Pilatus catches the first light.
  region: Central Switzerland
  access: Train, boat, or cable car
  effort: Easy
  best_light: Winter sunrise
  maps_url: https://www.google.com/maps/place/Vierwaldst%C3%A4ttersee/@45.1662212,2.7371613,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x47855823936105cf:0xa60b34b5c10b1570!8m2!3d47.0136401!4d8.4371598!16zL20vMDFka2M1
