- id: la_tzoumaz
  chapter: valais
  kicker: FROZEN PINES, A TWENTY-MINUTE WINDOW
  title: La Tzoumaz
  deck: A high-alpine forest across Mont Savoleyres from Verbier, where on cold spring mornings the line between frozen and green pines cuts through the slope.
  body:
  - Go in spring, early, before the sun gets to the trees. The frozen pines melt fast. Sometimes in twenty minutes. So you need to be set up before first light. The contrast between
    the icy forest and the slopes already warmed through is what you came for.
  - Park near La Tzoumaz and walk up toward the treeline. Any direction works; the effect is everywhere if the conditions cooperated overnight. A telephoto compresses the transition
    line into a clean graphic.
  region: Verbier area, Valais
  access: Drive + short walk
  effort: Easy
  best_light: Cold spring mornings
