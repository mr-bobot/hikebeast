- id: barrhorn
  chapter: valais
  kicker: SUMMITS
  title: Barrhorn
  deck: Switzerland highest walk-up summit over 3,600 metres - no climbing gear needed.
  body:
  - This is a proper day hike with serious altitude gain. The views from the top sweep across the Valais and into the Monte Rosa massif. Start early and watch the weather.
  - Bring plenty of water. The upper slopes are exposed and the descent is as demanding as the ascent.
  region: Saas Valley, Valais
  access: Drive to trailhead
  effort: Hard - full day
  best_light: Clear weather
