  chapter: valais
  kicker: SLEEP HIGH, EAT WELL
  title: Cabane Becs de Bosson
  deck: A mountain hut above Grimentz with views in every direction. Book ahead. It fills up fast, especially around sunset.
  body:
  - Cable car up from Grimentz, then a 2-hour hike to the hut at around 2,985m. The approach is mostly on packed dirt trail; winter visits need avalanche awareness and proper gear.
  - Arrive in time for dinner, stay the night, and catch both sunset and sunrise from the ridge. The Weisshorn and Dent Blanche dominate the east; the Valais Alps roll out west. One
    of the easiest huts in the canton to get huge views from.
