- id: hardergrat_trail
  chapter: central
  kicker: RIDGES
  title: Hardergrat Trail
  deck: The big one. Twelve hours along a knife-edge ridge from Brienzer Rothorn to Harder Kulm, no water the whole way.
  body:
  - Take the cable car up to the Brienzer Rothorn (either from Brienz or from Sörenberg) and start the hike there. It ends at Harder Kulm above Interlaken.
  - The whole hike takes about twelve hours and has no water sources. Carry everything you need. Not an easy hike. Take it seriously.
  region: Brienz, Central Switzerland
  access: Cable car + full day hike
  effort: Hard. No water
  best_light: All day
  maps_url: https://www.google.com/maps/place/Hardergrat/@46.3126581,2.6026627,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x478fbd87929ceb03:0x23146e2f469c639f!8m2!3d46.7239488!4d7.9028922!16s%2Fg%2F11j_vg0hyr
