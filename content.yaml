- id: morteratsch_glacier
  chapter: eastern
  kicker: AN ICE RIVER IN ENGADIN
  title: Morteratsch Glacier
  deck: A big glacier near Pontresina, viewable from the moraine. One of the clearest examples of retreat in the country.
  body:
  - Direct ice access has been off-limits since May 2024 due to rockfall risk; the trail to the tongue is officially closed. From the train station, yellow signs lead to viewpoints along
    the moraine.
  - For the best shot, drone a top-down of the glacier tongue. Anytime light works. Overcast makes the texture read properly, which is actually the best option here.
  region: Engadin, Graubünden
  access: Train + walk / guide
  effort: Easy to moderate
  best_light: Overcast
