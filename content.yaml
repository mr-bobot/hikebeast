      directions: From Chamonix drive 8 km up the valley on the D1506 toward the Col des Montets / Vallorcine, parking either at Tré-le-Champ (cheaper, longer hike) or at Les Praz for
        the La Flégère cable car (shorter hike but lift ticket).
      parking: Free or very cheap roadside parking at Tré-le-Champ and at Col des Montets pulloffs; paid lot at Les Praz next to the La Flégère telepherique.
