- id: pic_de_jallouvre
  chapter: beyond
  kicker: PEAKS
  title: Pic de Jallouvre
  deck: An off-radar Bornes summit above a tiny crescent lake. France, not Switzerland, but one ride away.
  body:
  - Start from the Col de la Colombière, take the left fork toward Pic de Jallouvre and follow the ridge over Col du Rasoir to the summit. Pointe Blanche is the optional add-on from
    the same ridge. Around five and a half hours round trip.
  - The crescent lake below the summit is the frame-maker. Sit on the rocks, put the lake in the corner, the Aravis chain filling the back.
  - Golden hour here is ridiculous. The whole range catches orange light while the valley fills with haze. Do not leave until the sun is gone.
  region: Bornes Massif, Haute-Savoie, France
  access: Col de la Colombière + ridge
  effort: Long, 5h30 round
  best_light: Sunset
  wildCamping:
