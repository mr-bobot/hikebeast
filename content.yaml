  deck: Pinned in my Google Maps but no proper photos for them yet. Worth the detour if you are in the area.
  entries:
  - heading: LAC BLEU
    text: Tiny turquoise pool near Arolla. Short hike, big colour. The lake is small so the frame works close.
    gps:
      lat: 46.050484
      lng: 7.4800854
    maps_url: https://www.google.com/maps/place/Lac+Bleu/@46.050484,7.4800854,17z/data=!3m1!4b1!4m6!3m5!1s0x478f29661d9d8675:0x83e0a41c8432263a!8m2!3d46.050484!4d7.4800854
  - heading: HÄNGEBRÜCKE FÜRGANGEN - MÜHLEBACH
    text: Hanging bridge in the upper Goms valley. Quick to visit, and a good frame on a moody day.
    gps:
      lat: 46.4105
      lng: 8.151
    maps_url: https://www.google.com/maps/place/H%C3%A4ngebr%C3%BCcke+F%C3%BCrgangen+-+M%C3%BChlebach/@46.4105,8.151,17z/data=!3m1!4b1!4m4!3m3!8m2!3d46.4105!4d8.151
  - heading: VAN D'EN BAS
    text: Hamlet above Salvan with a clean line of sight on the Mont Blanc range. Drive up, walk a few minutes, frame the peaks.
    gps:
