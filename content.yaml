- id: lac_de_taney
  chapter: western
  kicker: AN ALPINE LAKE ABOVE LÉMAN
  title: Lac de Taney
  deck: A small lake tucked into a bowl above the eastern end of Lake Geneva. Classic Swiss postcard if the light plays along.
  body:
  - Park at 46.338388, 6.848829 and hike up. The trail is obvious and not too long. Doable as a sunrise mission if you start before dawn.
  - Sunrise is when the lake goes glass-flat and the light hits the surrounding peaks. If you miss sunrise, overcast is the fallback for softer mood shots.
  region: Chablais valaisan, Valais
  access: Drive + hike
  effort: Easy
  best_light: Sunrise or cloudy
  wildCamping:
