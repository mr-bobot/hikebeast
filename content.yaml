- id: gorges_du_durnand
  chapter: valais
  kicker: A CANYON HUNG WITH IRON WALKWAYS
  title: Gorges du Durnand
  deck: A narrow gorge outside Martigny with bolted walkways clinging to the wall. Walk through it and the water is three metres beneath your boots.
  body:
  - Drive to Bovernier and follow signs to the gorges entrance (small entry fee). The loop takes about 45 minutes; wear grippy shoes because the wood gets slick from spray. The walkways
    zigzag up the falls, giving you angles you cannot get any other way.
  - 'Camera-wise: a wide lens and a variable ND for long exposures on the water. The lighting is mixed. Pockets of shade and shafts of direct sun through the canyon. So bracket exposures
    or shoot RAW and pull highlights later.'
  region: Martigny
  access: Drive, paid entry
  effort: Easy
  best_light: Overcast midday
  wildCamping:
