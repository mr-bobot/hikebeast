- id: moiry_glacier
  chapter: valais
  kicker: A HUT ABOVE THE ICE
  title: Moiry Glacier
  deck: A small lake at the foot of the glacier, a hut perched above, and light that hits the ice face at sunset.
  body:
  - Drive or take the bus from Grimentz up to Lac de Moiry, then hike up the moraine trail. Steep but well-marked. The cabane at the top is a good lunch stop and a solid base for photos late in the day
    when the glacier goes pink.
  - Bring a wide lens for the hut-and-glacier composition and a tele for the ice detail. The glacier is retreating visibly. The hiking approach shifts a bit year to year, so follow current signage.
  region: Val d'Anniviers
