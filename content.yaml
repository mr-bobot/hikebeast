  gps:
    lat: 46.6136385
    lng: 8.3085363
- id: guttannen_valley
  chapter: central
  kicker: CAMPER SPOTS
  title: Guttannen Valley
  deck: Quiet, scenic, easy to park in for the night. A sleeper base camp for the Grimsel and Gelmer runs.
  body:
  - The valley between Innertkirchen and the Grimsel Pass is quiet and scenic, with plenty of spots to park and sleep in a camper van. Low traffic, good cell signal along the main road.
  - If you are visiting Gelmersee, this valley makes a great place to spend the night nearby. Thirty minutes to the funicular in the morning.
  region: Innertkirchen, Central Switzerland
  access: By car
  effort: Easy
  best_light: Any time
  maps_url: https://www.google.com/maps/place/3864+Guttannen/@45.1662212,2.7371613,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x478f866862eefd51:0x6187a636359a2900!8m2!3d46.6552082!4d8.2892297!16zL20vMGRqY2wx
