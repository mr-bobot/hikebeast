- id: pointe_du_tsate
  chapter: valais
  kicker: SUMMITS
  title: Pointe du Tsaté
  deck: A long hike to a quiet summit overlooking the Moiry Glacier. The kind of view you earn.
  body:
  - The summit looks straight onto the Moiry Glacier from the ridge above the cabane. Long approach, real elevation gain, but the perspective on the glacier is one you cannot get from the hut viewpoint.
  - Plan a full day or split it with a night at Cabane des Becs de Bosson. Solid hiking shoes, water, and check the weather. The ridge is exposed.
  region: Val d'Anniviers, Valais
  access: Long hike from Grimentz or Becs de Bosson
  effort: Hard
  best_light: Sunrise from the ridge
  maps_url: https://www.google.com/maps/place/Pointe+du+Tsat%C3%A9/@46.3126581,2.6026627,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x478f2f60dbe88dcd:0xda318e579dad731!8m2!3d46.109369!4d7.5488781!16s%2Fm%2F047prqz
