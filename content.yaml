- id: creux_du_van
  chapter: western
  kicker: HUGE CLIFFS IN THE JURA
  title: Creux du Van
  deck: A natural amphitheatre of vertical cliffs 150m tall. Feels nothing like the rest of Switzerland.
  body:
  - Drive to Restaurant Le Soliat, park there, and walk to the rim. Don't run to the edge. The drop is severe and there's no railing in most places.
  - Sunrise is the best light, or any overcast morning when the mist pools inside the bowl. It can be booked-solid busy on sunny weekends; weekday mornings you might have it alone.
  - A resident herd of ibex lives on these cliffs. Mornings are the best window, 200 to 400mm lens, no baiting, keep distance.
  region: Jura, Neuchâtel
  access: Drive to Le Soliat + walk
  effort: Easy
  best_light: Sunrise or cloudy
  wildCamping:
    verdict: forbidden
    reason: Inside Creux du Van nature reserve (cantonal protection in NE/VD); wild camping prohibited inside the cirque. Tolerated only well outside the reserve.
