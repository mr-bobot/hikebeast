- id: salanfe_lake
  chapter: valais
  kicker: A HIDDEN LAKE IN A HANGING VALLEY
  title: Salanfe Lake
  deck: A reservoir that sits in a bowl between the Dents du Midi. Harder to reach than it looks on the map. That is the point.
  body:
  - 'Accessible via Van d''en Haut above Salvan. Park where the road ends and hike about 2 hours up. Alternative: approach from Mex in the Rhône valley, longer but quieter. Either way, the climb opens out
    suddenly to a huge still lake ringed by walls of rock.'
  - Stay overnight at the Cabane de Salanfe if you can book it. Dawn on the lake is among the best in the canton. A drone works well up here but the winds can pick up fast, so keep your eye on the treeline
    and do not fly far.
  region: Val d'Illiez
  access: 2 hr uphill hike
  effort: Moderate
  best_light: Sunrise
  maps_url: https://www.google.com/maps/place/Lac+de+Salanfe/@46.3126581,2.6026627,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x478eb09715e870fb:0x95c0e82cbe14e900!8m2!3d46.1410515!4d6.9567844!16s%2Fm%2F02rf7k_
