- id: riffelalp
  chapter: valais
  kicker: VIEWPOINTS
  title: Riffelalp
  deck: One stop before everyone else gets off. The Matterhorn layered with larches. Fog if you are lucky.
  body:
  - Same Gornergrat Bahn as for Riffelsee, but get off earlier at Riffelalp. Ten to fifteen minutes on the trail brings you to a quieter viewpoint.
  - Cloudy mornings are the flex. Fog moving through the larches gives you layers you cannot get on a clear day. And fewer tourists in every frame.
  - Pack a small tele (70 to 200mm) if you have it. The compression stacks the ridge, the trees, and the peak in a way a wide angle cannot.
  region: Zermatt, Valais
  access: Gornergrat Bahn + walk
  effort: Easy
  best_light: Sunrise or cloudy
  wildCamping:
    verdict: forbidden
    reason: Riffelalp sits on the Gornergrat plateau directly under the Riffelalp Resort and the Gornergrat Bahn. Same Zermatt no-camping policy as Riffelsee — rangers patrol the plateau.
      Tolerated bivouac would be far above the resort, not at the Riffelalp viewpoint itself.
    canton: Valais (VS)
