- id: piz_gloria
  chapter: central
  kicker: SUMMITS
  title: Piz Gloria
  deck: The Schilthorn summit station, cable car straight to a 360 degree view of the Bernese Alps. The Eiger, Mönch and Jungfrau line up across the valley.
  body:
  - Take the cable car all the way up to Piz Gloria. The view from the terrace is hard to beat, mountains in every direction, with the Eiger, Mönch and Jungfrau standing in a row across
    the valley.
  - Drone shots work especially well from the saddle just below the summit station. Sunset is the one to chase. The light catches the snowfields and the whole face turns gold.
  region: Mürren, Central Switzerland
  access: Cable car from Stechelberg via Mürren
  effort: Easy
  best_light: Sunset
  wildCamping:
    verdict: forbidden
    reason: Schilthorn at 2,970 m is a cable-car summit with the Piz Gloria revolving restaurant — wild camping at the summit area is not feasible or legal. Tolerated bivouac would be
      far away from the cable-car infrastructure and Mürren village, on the surrounding ridges above tree line in BLN.
    canton: Bern (BE)
  maps_url: https://www.google.com/maps/place/Schilthorn/@45.1662212,2.7371613,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x478fa0aa046345b1:0xe0ac87e82a107f2!8m2!3d46.5574809!4d7.8352793!16zL20vMDMxMnk2
