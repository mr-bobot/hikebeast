- id: gelmersee
  chapter: central
  kicker: GLACIER LAKES
  title: Gelmersee
  deck: Easy to reach, and the funicular that gets you there is one of the steepest in the world. A photo spot in itself.
  body:
  - Drive to the base of the Gelmerbahn, where you will take one of the steepest funiculars in the world up to the lake. It only runs in summer and gets busy. Check if it is open, and
    book your seat in advance.
  - Morning light paints the far cliffs gold and turns the water glassy. Worth the early start.
  region: Haslital, Central Switzerland
  access: Funicular (summer only)
  effort: Easy
  best_light: Morning
  wildCamping:
    verdict: restricted
    reason: Reservoir with tolerated single-night bivouac above tree line on the surrounding ridges. Avoid the dam infrastructure.
    canton: Bern (BE)
    protections:
    - BLN landscape — Berner Hochalpen und Aletsch-Bietschhorn-Gebiet (nördlicher Teil)
  maps_url: https://www.google.com/maps/place/Gelmersee/@45.1662212,2.7371613,7z/data=!4m10!1m3!11m2!2s4A_3J2iHSzu6zl1rtFMQPQ!3e3!3m5!1s0x47857df2744e7e09:0xeb6bf0e43466b46f!8m2!3d46.615792!4d8.3302012!16s%2Fm%2F02qw9z3
