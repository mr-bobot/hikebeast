author:
  name: Leon Helg
  handle: leon.helg
  bio: I have lived in Switzerland for 26 years. The last few I have spent finding the best photo and hiking spots in the Alps. Some famous, most of them hidden gems. If a spot is in
    here, I would recommend it to my friends.
  socials:
  - platform: instagram
    handle: leon.helg
    url: https://instagram.com/leon.helg
    bio: Photos of the Swiss Alps. Hidden gems and the occasional famous one.
    screenshot: front_matter/instagram_profile.png
  - platform: tiktok
    handle: leon.helg
    url: https://tiktok.com/@leon.helg
    bio: Hiking videos and outfits. All locations in the captions.
    screenshot: front_matter/tiktok_profile.png
  hero_image: front_matter/leon_camping.jpg
  hero_credit: leon.helg
cover:
  title: Gems of Switzerland
  subtitle: The best spots in Switzerland
  image: front_matter/hidden_gems_cover.jpg
  image_credit: xxx
front_matter:
- id: viral_but_secret
  kind: ethos
  kicker: A NOTE BEFORE YOU START
  title: Viral but Secret
  deck: The spots in this guide are not meant to become the next tourist magnets.
  body:
  - That is why it is better not to tag the exact location when posting on Instagram or TikTok. The more people share pins and names, the faster these places get crowded. Eventually
    they get ruined.
  - 'Basic respect for nature should go without saying: do not leave trash, do not start fires, do not damage anything just to get a better shot. If you see trash, take a second to pick
    it up.'
  - Most of this is common sense. Still, it is worth repeating.
  image: front_matter/page_02.jpg
  image_credit: xxx
- id: plan_your_trip
  kind: four_col
  kicker: BEFORE YOU GO
  title: Plan your trip
  deck: Four things to figure out before you arrive. Keep it simple. The mountains reward preparation, not plans.
  columns:
  - number: '01'
    heading: Where to stay
    text: Hotels are expensive. Airbnbs, campsites, or a camper van are better options if you want freedom and save money.
  - number: '02'
    heading: How long to stay
    text: You could spend months here and still miss things. But 2 to 4 weeks is enough to see a lot, especially if you focus on one region.
  - number: '03'
    heading: What to pack
    text: Solid hiking gear, warm layers (even in summer), and camping essentials if you plan to wild camp.
  - number: '04'
    heading: How to get around
    text: Trains work, but a rental car saves time and gives you access to more corners than you would reach otherwise.
- id: camping
  kind: ethos
  kicker: WILD NIGHTS, QUIET MORNINGS
  title: Camping
  deck: Wild camping in Switzerland is a bit of a grey area. Tolerated, usually, if you know the rules.
  body:
  - 'The general rule of thumb: it is allowed if you are above the treeline and not inside a Naturschutzgebiet (wildlife protection zone). Official rules vary by canton.'
  - When we want the best light for photos or videos, we camp directly at the spot. That way we catch both sunset and sunrise. Set up late, leave early. Stay out of sight. No fires.
    No noise. Leave no trash behind.
  - If done right, no one notices and no damage is done. The goal is to be there and gone, leaving nothing but footprints and taking everything with you.
  image: front_matter/page_05.jpg
  image_credit: xxx
- id: map_summary
  kind: map_summary
  kicker: SIX REGIONS, ONE COUNTRY
  title: Map Summary
  deck: Where to find each chapter.
  region_order:
  - eastern
  - central
  - valais
  - fribourg
  - western
  - ticino
  - beyond
chapters:
- id: eastern
  number: '01'
  name: Eastern Switzerland
  intro: Appenzell chalets, Glarus waterfalls, turquoise dam lakes, and the Engadin glaciers. This is where Switzerland gets quieter, higher, and a bit stranger. My favourite part of
    the country to explore at my own pace.
  description: Appenzell, Säntis, lesser-known summits.
  color:
  - 0.49
  - 0.71
  - 0.66
  cover_image: chapters/eastern.jpg
  cover_credit: leon.helg
- id: central
  number: '02'
  name: Central Switzerland
  intro: Waterfalls, glacier lakes and iron bridges strung across gorges so deep they hum. The heart of this guide. Twelve spots from Adelboden to the Grimsel Pass.
  description: Waterfalls, glacier lakes, the Hardergrat ridge.
  color:
  - 0.69
  - 0.65
  - 0.48
  cover_image: chapters/central.jpg
  cover_credit: dimitri_karastelev_unsplash
- id: valais
  number: '03'
  name: Valais
  intro: High alpine. Zermatt and the Matterhorn, glacier lakes, Riffelsee reflections. The chapter where Switzerland looks like its postcards. With room still for the ones nobody has
    printed yet.
  description: Matterhorn country. Glaciers, ice caves, high passes.
  color:
  - 0.92
  - 0.72
  - 0.75
  cover_image: chapters/valais.jpg
  cover_credit: ernst_burki_unsplash
- id: fribourg
  number: '04'
  name: Fribourg
  intro: Cheese country, jagged pre-alps, and a handful of lakes that should be more famous than they are. The canton that looks like the cover of every Swiss guidebook. And still has
    corners all to yourself.
  description: Hidden lakes and the Gastlosen limestone wall.
  color:
  - 0.85
  - 0.85
  - 0.82
  cover_image: chapters/fribourg.jpg
  cover_credit: xavier_von_erlach_unsplash_2
- id: western
  number: '05'
  name: Western Switzerland
  intro: The Léman arc, the Jura, and a slice of the Chablais. Vineyards down low, limestone cliffs up high, and a lake at the middle of everything. The most underrated quarter of the
    country for photographers.
  description: Vineyards, lakeside cliffs, quieter roads.
  color:
  - 0.8
  - 0.88
  - 0.62
  cover_image: chapters/western.jpg
  cover_credit: tcheucestbeau
- id: ticino
  number: '06'
  name: Ticino
  intro: The south side of the Alps. Stone villages, turquoise rivers, and a whole valley built around cold water and dry sunshine. A short chapter, because this book focuses on the
    north. But a vital one.
  description: Alpine lakes, turquoise rivers, Italian mountain style.
  color:
  - 0.58
  - 0.52
  - 0.73
  cover_image: chapters/ticino.jpg
  cover_credit: nadine_marfurt_unsplash
- id: beyond
  number: '07'
  name: Beyond the Border
  intro: The spots that aren't in Switzerland. But close enough that leaving them out felt wrong. Chamonix and the Mont Blanc range, plus one view from the French side of Lac Léman.
    Pack the passport.
  description: Chamonix, Mont Blanc, and one French side of Léman.
  color:
  - 0.35
  - 0.35
  - 0.35
  cover_image: chapters/beyond.jpg
  cover_credit: leon.helg
