- id: brienzer_rothorn
  chapter: central
  kicker: SUMMITS
  title: Brienzer Rothorn
  deck: The peak above Brienz. Cable car to the top, and a camp lake below the summit that almost nobody photographs right.
  body:
  - Two ways up. The Brienz Rothorn Bahn is a steam cog railway from Brienzersee, slow and scenic. The Sörenberg cable car is the fast side. Both drop you within a short walk of the summit.
  - The shot is not from the top. Walk down toward the tarns below the south face in the evening. On a still day the whole ridge reflects in the water. Bring a tent, the light at first wind is the quiet
    window.
  - This is also the starting point for the full Hardergrat traverse. If you are camping here anyway, you are already halfway to that hike.
  region: Brienz, Central Switzerland
  access: Cog railway or cable car
  effort: Easy to summit
  best_light: Evening, still wind
