- id: crans_montana
  chapter: valais
  kicker: THE SKI STATION IN SUMMER
  title: Crans-Montana
  deck: Off-season, the empty slopes look like someone drained a golf course and left it. In the best possible way.
  body:
  - From Crans-Montana village, take any of the lifts up (most run summer service). The interesting photos are on the upper slopes above 2,000m. Wide-open meadows, scattered chalets,
    and long sightlines toward the Valais Alps across the valley.
  - I come here for moody morning fog that rolls up the slope and disappears by 10am. The Plaine Morte glacier is just above. Worth a full-day visit if the weather holds. Avoid weekends
    in mid-summer; it is crowded with Swiss families.
  region: Crans-Montana
  access: Lifts / drive
  effort: Easy
  best_light: Morning fog
