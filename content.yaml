- id: oeschinensee
  chapter: central
  kicker: LAKES
  title: Oeschinensee
  deck: The famous turquoise lake above Kandersteg. Not a hidden gem anymore, but if you walk past the platform it gets quiet fast.
  body:
  - Almost every reel I ever recorded here went viral. Postcard Switzerland. Creators like myself made it crowded. Not a hidden gem, still worth a visit if you do it right.
  - Plan a whole day. Walk up the hill on the left side of the lake, past where most people stop. Bring cash because card payments do not work at the restaurants near the gondola.
  - You need decent weather for the lake to be that blue. Cloudy days kill the colour.
  region: Kandersteg, Central Switzerland
  access: Gondola + 20 min walk
  effort: Easy
  best_light: Anytime, clear sky for the colour
  wildCamping:
    verdict: forbidden
    reason: Wild camping at Oeschinensee is prohibited by court order — the lake and its surroundings are a protected wildlife reserve. Rangers patrol the area regularly and ask campers
      to leave; legal repercussions apply. Use Camping Rendez-Vous at the valley station in Kandersteg.
    canton: Bern (BE)
    protections:
    - BLN landscape — Berner Hochalpen und Aletsch-Bietschhorn-Gebiet (nördlicher Teil)
    - UNESCO World Heritage — Schweizer Alpen Jungfrau-Aletsch
