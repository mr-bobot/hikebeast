- id: valle_verzasca_kayak
  chapter: ticino
  kicker: IF YOU HAVE THE LEVEL. OR A FRIEND WHO DOES
  title: Valle Verzasca Kayak
  deck: The Verzasca is famous for whitewater kayaking. Not something you just try. But if you have the skill, or a friend who does, the shots are unreal.
  body:
  - The valley holds serious whitewater. Only experienced kayakers should be on the water here; the rocks and currents don't forgive mistakes. If you're shooting and not paddling, team up with a kayaker
    who knows the lines.
  - A drone captures the scale. Turquoise water, bleached boulders, a tiny kayak tracking through the curves. Mid to late summer is when flow eases to navigable levels; spring runoff is expert-only.
  region: Valle Verzasca, Ticino
  access: Along the valley road
