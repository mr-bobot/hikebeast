- id: dent_doche
  chapter: beyond
  kicker: THE PEAK YOU SEE FROM LAVAUX
  title: Dent d'Oche
  deck: Across the lake from Lavaux, on the French side. A long hike to a steep summit. The view back across Léman is everything.
  body:
  - The hike starts at the restaurant called Fétiuière. It's long and gets very steep toward the top. Bring poles, food, and time. Round trip is most of a day.
  - From the summit, Lac Léman spreads out below and the Alps roll north toward Switzerland. Sunset, sunrise, and moody conditions all deliver; pick a day with a stable weather window and you'll get one
    of the best Léman views of your life.
  region: Haute-Savoie, France
  access: Drive + long hike
  effort: Hard
  best_light: Sunset, sunrise, or moody
