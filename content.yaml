- id: le_doubs
  chapter: western
  kicker: RIVERS
  title: Le Doubs
  deck: A cliff-top view of the Doubs river canyon, above the village of Les Brenets.
  body:
  - Park at the Restaurant Les Roches de Moron and walk to the cliffs above the river. The view drops onto the canyon and the river bend below.
  - This is a Jura spot, windier and moodier than alpine areas. Overcast light really suits it, or catch the sunset when the canyon walls glow.
  region: Les Brenets, Western Switzerland
  access: Drive + short walk
  effort: Easy
  best_light: Overcast or sunset
  wildCamping:
    verdict: forbidden
    reason: Cliff-top above the Doubs river canyon, inside Parc du Doubs. The Doubs river corridor is a federally protected floodplain (Auengebiet). Wild camping forbidden in the reserve.
  maps_url: https://www.google.com/maps/place/47%C2%B005'31.0%22N+6%C2%B045'04.4%22E/@47.091939,6.7486421,17z/data=!3m1!4b1!4m4!3m3!8m2!3d47.091939!4d6.751217
