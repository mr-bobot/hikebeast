<!doctype html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<!-- Public, indexable on purpose: /full/ is noindex'd, so social scrapers
     (Instagram, Facebook, X, Threads) can't fetch its OG card. /login/ is
     the share-friendly landing instead. -->

<link rel="canonical" href="https://hikebeast.ch/login/" />
<meta name="referrer" content="strict-origin-when-cross-origin" />

<meta property="og:type" content="website" />
<meta property="og:site_name" content="Hikebeast" />
<meta property="og:title" content="Hidden Gems · Hikebeast" />
<meta property="og:description" content="Log in to Hidden Gems · Hikebeast." />
<meta property="og:url" content="https://hikebeast.ch/login/" />
<meta property="og:image" content="https://hikebeast.ch/images/og-home.jpg" />
<meta property="og:image:width" content="2464" />
<meta property="og:image:height" content="1386" />
<meta property="og:image:alt" content="Switzerland alpine ridge at sunrise" />

<meta name="twitter:title" content="Hidden Gems · Hikebeast" />
<meta name="twitter:description" content="Log in to Hidden Gems · Hikebeast." />
<meta name="twitter:image" content="https://hikebeast.ch/images/og-home.jpg" />

<link rel="icon" type="image/jpeg" href="/images/favicon.jpg" />
<link rel="apple-touch-icon" href="/images/favicon.jpg" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --fg: #1d1d1f;
    --muted: #6e6e73;
    --hairline: rgba(0,0,0,0.08);
    --hairline-strong: rgba(0,0,0,0.14);
    --accent: #0071e3;
    --error: #ff3b30;
    --radius-card: 22px;
    --radius-btn: 980px;
  }
  body {
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: 24px;
    background: #fbfbfc;
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.01em;
    overflow: hidden;
    position: relative;
  }
  /* Soft blurred blobs in shades of the accent blue (#0071e3) -- on-brand
     warm wash without making the card hard to read. */
  body::before {
    content: '';
    position: fixed;
    inset: -120px;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(460px 420px at 18% 22%, rgba(0, 113, 227, 0.45) 0%, transparent 70%),
      radial-gradient(420px 380px at 82% 28%, rgba(96, 165, 250, 0.38) 0%, transparent 72%),
      radial-gradient(520px 480px at 50% 92%, rgba(56, 132, 220, 0.40) 0%, transparent 70%),
      radial-gradient(380px 360px at 92% 78%, rgba(180, 210, 255, 0.55) 0%, transparent 75%);
    filter: blur(70px) saturate(1.1);
    opacity: 0.9;
  }
  .card { position: relative; z-index: 1; }
  .card {
    width: 100%;
    max-width: 380px;
    padding: 36px 32px 32px;
    border-radius: var(--radius-card);
    background: rgba(255,255,255,0.86);
    -webkit-backdrop-filter: saturate(180%) blur(18px);
    backdrop-filter: saturate(180%) blur(18px);
    border: 1px solid var(--hairline);
    box-shadow: 0 24px 60px rgba(0,0,0,0.10), 0 4px 14px rgba(0,0,0,0.04);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .brand img {
    width: 32px; height: 32px;
    border-radius: 999px;
    object-fit: cover;
    object-position: 70% 45%;
  }
  .brand b {
    font-family: "SF Pro Display", -apple-system, system-ui, sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  h1 {
    font-family: "SF Pro Display", -apple-system, system-ui, sans-serif;
    font-size: 26px;
    line-height: 1.1;
    letter-spacing: -0.025em;
    margin: 0 0 8px;
    font-weight: 600;
  }
  p.lead {
    margin: 0 0 22px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.5;
  }
  form {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  input {
    width: 100%;
    height: 50px;
    padding: 0 18px;
    border-radius: var(--radius-btn);
    border: 1px solid var(--hairline);
    background: #fff;
    color: var(--fg);
    font-size: 16px;
    font-family: inherit;
    outline: none;
    letter-spacing: -0.01em;
    transition: border-color 150ms ease, box-shadow 150ms ease;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(0,113,227,0.15);
  }
  input.shake {
    animation: shake 320ms cubic-bezier(.36,.07,.19,.97) both;
    border-color: var(--error);
  }
  @keyframes shake {
    10%, 90%   { transform: translateX(-1px); }
    20%, 80%   { transform: translateX(2px); }
    30%, 50%, 70% { transform: translateX(-4px); }
    40%, 60%   { transform: translateX(4px); }
  }
  button.submit {
    margin-top: 4px;
    height: 50px;
    border-radius: var(--radius-btn);
    border: 0;
    background: var(--fg);
    color: #fff;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: -0.01em;
    cursor: pointer;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 120ms ease, transform 100ms ease;
  }
  button.submit:hover { opacity: 0.92; }
  button.submit:active { transform: scale(0.98); }
  button.submit:disabled { opacity: 0.5; cursor: progress; }
  .error {
    margin: 12px 0 0;
    color: var(--error);
    font-size: 13px;
    text-align: center;
    height: 18px;
    opacity: 0;
    transition: opacity 200ms ease;
  }
  .error.show { opacity: 1; }
  .footnote {
    margin: 24px 0 0;
    color: var(--muted);
    font-size: 11px;
    text-align: center;
    letter-spacing: 0;
  }
  .footnote a { color: var(--muted); text-decoration: underline; }
</style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <img src="/images/avatar.jpg" alt="" />
      <b>Hikebeast · Hidden Gems</b>
    </div>
    <h1>Log in</h1>
    <p class="lead">Hidden Gems is in early access. Log in with the username and password Leon shared with you.</p>
    <form id="loginForm" novalidate>
      <input
        id="user"
        name="username"
        type="text"
        placeholder="Username"
        autocomplete="username"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
        required
      />
      <input
        id="pass"
        name="password"
        type="password"
        placeholder="Password"
        autocomplete="current-password"
        required
      />
      <button type="submit" class="submit" id="submitBtn">Log in</button>
    </form>
    <p class="error" id="error" role="alert" aria-live="polite">Wrong username or password.</p>
    <p class="footnote">Stay logged in for 30 days on this device.</p>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const btn  = document.getElementById('submitBtn');
    const err  = document.getElementById('error');
    const u    = document.getElementById('user');
    const p    = document.getElementById('pass');

    // The middleware redirects unauth'd /full/ visits here with ?next=,
    // so a successful login restores the originally requested URL.
    const params = new URLSearchParams(window.location.search);
    const next = params.get('next') || '/full/';

    function showError(msg) {
      err.textContent = msg || 'Wrong username or password.';
      err.classList.add('show');
      u.classList.add('shake'); p.classList.add('shake');
      setTimeout(() => { u.classList.remove('shake'); p.classList.remove('shake'); }, 360);
    }
    function clearError() { err.classList.remove('show'); }

    [u, p].forEach(el => el.addEventListener('input', clearError));

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      btn.disabled = true;
      btn.textContent = 'Logging in…';
      try {
        // /api/login validates against per-user Convex accounts (when the
        // body carries `username`+`password`), sets the hb_full_auth cookie
        // middleware.js checks on /full/*, and returns a Convex session
        // token we persist for HB.session to pick up on the /full/ paint.
        // The same endpoint also handles the legacy shared-password flow
        // and the logout action; we just hit the right shape for our case.
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: u.value.trim(),
            password: p.value,
            next,
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.ok) {
          if (data.sessionToken) {
            try { localStorage.setItem('hb:session:v1', data.sessionToken); } catch {}
          }
          window.location.replace(data.next || '/full/');
          return;
        }
        if (res.status === 503) {
          showError('Login is not configured yet. Try again in a minute.');
        } else {
          showError('Wrong username or password.');
        }
      } catch {
        showError('Network error. Try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Log in';
      }
    });
  </script>
</body>
</html>
