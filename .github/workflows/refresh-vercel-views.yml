name: Refresh Buyer tab from Vercel + Sheet sources

# Two-step hourly refresh of the Buyer tab in the Hikebeast Email
# List sheet:
#
# Step 1 (pull_vercel_views): fetches top-pages devices from Vercel
# Web Analytics and pushes them to Apps Script, which writes
# Buyer!Q3:Q45 (Views column).
#
# Step 2 (refresh_buyer_extras): triggers an Apps Script action that
# reads Signups + AllVisits (both Google Sheets) and writes Buyer!N
# (Hero Variant column, joined per buyer email) + Buyer!V3:Y17 (Map9
# and Gems A/B test blocks). No external fetch.
#
# Architecture: step 1 lives in GH Actions because Apps Script can't
# call UrlFetchApp without an OAuth scope that requires user-driven
# editor authorization. Step 2 lives in Apps Script and just gets
# triggered from here for consistency (same cron, same secret).

on:
  schedule:
    # Hourly at minute 5. Avoid :00 because GH Actions delays crons
    # heavily when traffic spikes at the top of the hour.
    - cron: '5 * * * *'
  # Manual trigger for ad-hoc refresh + verification runs.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: refresh-buyer-tab
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Fetch Vercel + push to Apps Script
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          APPS_SCRIPT_SECRET: ${{ secrets.APPS_SCRIPT_SECRET }}
        run: |
          python3 <<'PY'
          import json, os, sys, time
          import urllib.request, urllib.error
          from datetime import datetime, timedelta, timezone

          VERCEL_PROJECT_ID = "prj_EFoTeUOZ2rej58RZwOG91UVgRpqJ"
          VERCEL_TEAM_ID = "team_alYbeJUJDGocxwQs3LFFaqqf"

          def with_retry(fn, label, attempts=3, base_delay=4):
              """Retry on HTTPError 5xx / 429 / URLError. Exit codes:
                 1 = Vercel API failure, 2 = Apps Script failure."""
              last = None
              for i in range(attempts):
                  try:
                      return fn()
                  except urllib.error.HTTPError as e:
                      last = e
                      if e.code < 500 and e.code != 429:
                          raise  # non-retriable client error, fail fast
                  except urllib.error.URLError as e:
                      last = e
                  print(f"{label} attempt {i+1}/{attempts} failed: {last}", file=sys.stderr)
                  if i < attempts - 1:
                      time.sleep(base_delay * (2 ** i))
              raise last

          token = os.environ["VERCEL_TOKEN"]
          apps_url = os.environ["APPS_SCRIPT_URL"]
          apps_secret = os.environ["APPS_SCRIPT_SECRET"]

          now = datetime.now(timezone.utc)
          frm = (now - timedelta(days=30)).strftime("%Y-%m-%d")
          to = now.strftime("%Y-%m-%dT%H:%M:%SZ")
          vercel_url = (
              "https://vercel.com/api/web-analytics/stats"
              f"?projectId={VERCEL_PROJECT_ID}&teamId={VERCEL_TEAM_ID}"
              f"&from={frm}&to={to}&type=path&limit=200"
          )

          def fetch_vercel():
              req = urllib.request.Request(vercel_url, headers={"Authorization": f"Bearer {token}"})
              with urllib.request.urlopen(req, timeout=30) as r:
                  return json.loads(r.read())

          try:
              data = with_retry(fetch_vercel, "Vercel API")
          except Exception as e:
              print(f"Vercel API failed after retries: {e}", file=sys.stderr)
              sys.exit(1)
          rows = data.get("data") or []
          pages = {row["key"]: int(row.get("devices") or 0) for row in rows}
          if len(pages) >= 200:
              print("::warning::Hit Vercel limit=200, some paths may be missing", file=sys.stderr)
          print(f"Fetched {len(pages)} paths from Vercel", file=sys.stderr)

          body = {"secret": apps_secret, "action": "pull_vercel_views", "pages": pages}

          def push_apps():
              req = urllib.request.Request(
                  apps_url,
                  data=json.dumps(body).encode(),
                  method="POST",
                  headers={"Content-Type": "application/json"},
              )
              with urllib.request.urlopen(req, timeout=60) as r:
                  return json.loads(r.read())

          try:
              result = with_retry(push_apps, "Apps Script")
          except Exception as e:
              print(f"Apps Script failed after retries: {e}", file=sys.stderr)
              sys.exit(2)

          print(json.dumps(result, ensure_ascii=False))
          if not result.get("ok"):
              sys.exit(2)
          print(f"::notice::Wrote {result.get('rows_written')} rows, skipped {result.get('rows_skipped_no_data')} (no data)", file=sys.stderr)
          PY

      - name: Refresh Buyer extras (Hero Variant column + A/B blocks)
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          APPS_SCRIPT_SECRET: ${{ secrets.APPS_SCRIPT_SECRET }}
        run: |
          python3 <<'PY'
          import json, os, sys, time
          import urllib.request, urllib.error

          apps_url = os.environ["APPS_SCRIPT_URL"]
          apps_secret = os.environ["APPS_SCRIPT_SECRET"]
          body = {"secret": apps_secret, "action": "refresh_buyer_extras"}

          def push():
              req = urllib.request.Request(
                  apps_url,
                  data=json.dumps(body).encode(),
                  method="POST",
                  headers={"Content-Type": "application/json"},
              )
              # 5 min timeout — full pass over Signups (~10k) + AllVisits
              # (~9k) typically lands around 60s but the script lock can
              # add wait time if a write-action is mid-flight.
              with urllib.request.urlopen(req, timeout=300) as r:
                  return json.loads(r.read())

          last = None
          for i in range(3):
              try:
                  result = push()
                  break
              except urllib.error.HTTPError as e:
                  last = e
                  if e.code < 500 and e.code != 429:
                      print(f"Apps Script HTTP {e.code}: {e.read(800).decode(errors='replace')}", file=sys.stderr)
                      sys.exit(2)
              except urllib.error.URLError as e:
                  last = e
              print(f"refresh_buyer_extras attempt {i+1}/3 failed: {last}", file=sys.stderr)
              if i < 2:
                  time.sleep(4 * (2 ** i))
          else:
              sys.exit(2)

          print(json.dumps(result, ensure_ascii=False))
          if not result.get("ok"):
              sys.exit(2)
          hv = result.get("hero_variant_column", {})
          ab = result.get("ab_blocks", {})
          print(f"::notice::HeroVariant {hv.get('filled')}/{hv.get('rows')} filled; Map9 A/B {ab.get('Map9 A/B',{}).get('total_buyers')}/{ab.get('Map9 A/B',{}).get('total_visits')}; Gems A/B {ab.get('Gems A/B',{}).get('total_buyers')}/{ab.get('Gems A/B',{}).get('total_visits')}", file=sys.stderr)
          PY
